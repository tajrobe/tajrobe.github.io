# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # New reviews are committed straight to master and must rebuild the site
  # immediately, with no pull request in the way. Keep this trigger.
  push:
    branches: ["master"]

  # Code, unlike content, arrives as a pull request — so the checks have to run
  # there. Catching an injected ad script after it is on master is too late.
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  # Lets check-push-policy.sh ask whether a code change came from a merged PR.
  pull-requests: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Refuses to let unapproved third-party code reach users. Gates the build, so
  # a page that loads an unknown script never gets deployed in the first place.
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          # The push policy diffs this push against the previous commit.
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
      - run: npm ci
      - name: Check for unapproved third-party code
        run: npm run check

      # Content (_data/, _posts/) deploys on a direct push — that is how a new
      # review goes live, and it stays that way. Code pushed straight to master
      # is refused: that is how the 2025 ad script got in.
      - name: Check push policy
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        # Called through bash so it does not depend on the executable bit, which
        # does not survive a commit made from Windows.
        run: bash ./script/check-push-policy.sh "${{ github.event.before }}" "${{ github.sha }}"

  # Build job
  build:
    runs-on: ubuntu-latest
    needs: check
    # Pull requests are validated by `check` but never deployed.
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
      - run: npm ci
      - run: npm run build
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
