description: "من حدود ۴ ساله در این شرکت بود و رفتم، برداشت کلی خودمو از این مجموعه میگم، خالی از لطف نیست،\r\nخود اک تک زیرمجموعه هلدینگ سپاهان باتری میشه،\r\nخود این هلدینگ هم کلا یه بیزنس خانوادگیه، یعنی از مدیرمیانی به بالا همه یا فامیل یا قدیمیای اینجان\r\nسیستم تصمیم گیری تو کل هلدینگ و شرکت‌های زیرمجموعه سیستم حاجی بازاریه، خیلی آرایشش کردن و ماتیک مالیش کردن ولی اگر بیایید تو مجموعه می‌فهمید چی به چیه،\r\nاک تک به نوعی فقط زیرساخت IT هلدینگ رو تامین میکنه و هیچ مشتری خارجی نداره،\r\nسه تا واحد کلی داره، نرم‌افزار،  پشتیبانی، امنیت و..\r\nاک تک جاییه که برای ورود خوبه ولی برای موندن نه\r\nبه قول همه کسایی که اینجان، یه دانشگاه و محیط تسته\r\nهمه تست و خطا میکنن یادمیگیرن و میرن،\r\nچرا میرن؟\r\nجو محیط سمیه،\r\nثبات تصمیم گیری اصلا وجود نداره،\r\nمدیریت ورک‌لود اصلا نیست، یکم بخوایید خوب کار کنید، هزار جور کار رو میریزن سرتون،\r\nمنابع انسانی، افتضااااااح، به شدت پر مدعا و بی ادب، هنرشون اینه که مدام تهدید کنن\r\nهمه هم با هم فامیل، درنتیجه برای اعتراضات شما هیچ گوش شنوایی نیست و بد ماجرا خودتون میشین،\r\nبد قولی خیلی زیاده، کار مدیرا کلا اینه هر روز بیان بشین پا دوربین بقیه رو دید بزنن و اتو بگیرن،\r\nحقوقی که باتون میبندن رو نصف میکنن، یه پایه حقوق خیلی کم میدن و بقیه حقوق رو به نام های کارانه، پشت‌کارتی و.. میدن، که اضافه کار و سنوات و.. کم بدن،\r\nتبعیض به شدت زیاده و سوگولی‌ها زیادن\r\nهرچی بیشتر خبرچینی کنین و زیرآب بزنین بقیه رو بیشتر بازی بدین عزیزترین و به اصطلاح خودشون تراست سازمانین،\r\nسازمان به شدت مافیایی شده تو خودش، کسی که سرش به کار خودش باشه اصلا اجازه رشد نداره\r\nنه افزایش حقوقی و نه ارتقای جایگاهی میدن(با سد فامیلا و سوگولیا روبه‌رو میشین)،\r\nخیلی هم حس بد بتون القا میکنن تا بتونن کنترل‌تون بکنن، تو بازیشون نرید،\r\nدخترشون مدیرعامل، عروسشون مدیر امن..،  پسرخالشون مدیر فلان جا و...\r\nکسایی که هرکدوم بیان تو بازار عمرا بتونن کار کنن \r\nمزایا هم گفتم، این‌قدر خر تو خره میتونین یادبگیرین رشد کنین و برین\r\nحقوق هم سعیشون این بوده همیشه سرتایم بدن، بیمه هم به موقع میریزن\r\nدیگه چیز به درد بخوری نداره، گول حرفای قشنگ HR رو نخورین...\r\nسر رفتن هم خیلی اذیت میکنن، مراقبت کنین،\r\nبیشتر هدفم این بود فرهنگ سازمان رو روشن کنم تا زیرساخت فنی.\r\nامیدوارم به کارتون اومده باشه\r\n"
