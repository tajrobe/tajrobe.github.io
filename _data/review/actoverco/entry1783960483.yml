description: "بابت مصاحبه رفتم به ادرسی که دادن یک ساختمان بی نام نشون که چندبار پرسیدم کجاست طبقه دوم یک داروخانه هیچ تابلویی نداشت داخل شدم استاندارد ها در حد صفر. داشتن با یکی مصاحبه میکردن چون اتاق مصاحبشون داغون بود تمام دیالوگ ها شنیده میشد خلاصه نوبت من شد سرپرست جذب ***** ک ای کاش ظاهر این اداها رو حداقل داشت با یک لپ تاپ اومد و کنارش ***** که از اول تا اخر مصاحبه هیچ نگفت و نگاه کرد بدون هیچ وارم آپ شروع کرد سوالا در حد جونیور جذب و دیکته شده عین ربات فقط تو ذهنش بود اینارو بپرسه و جواب بله خیر بگیره اصلا دانش مناسبی برای کشف استعداد رو مداشت اصلااااا و هر جواب ک دادم همون لحظه داشت تایپ می کرد تلاق تولوق کیبورد اخه بیسواد اون لحظه تمرکزت بهم نیخوره صرف تایپ میشه نمیتونی بفهمی طرف جی میگه تایپتم که ۱۰ انگشتی نبود همش مطمعنم غلط نوشتی  اخر سر نه من فهمیدم چی شد نه اون فهمید چیکار کرد رد کرد  خداشاهده ناراحت نیستم رد شدما از این ناراحتم که استاندارد ها برای این شرکت مطرح رعایت نمیشه و گند زده میشه تو برند کارفرمایی بخاطر یه ادم بی سواد ایشون سطحش کارشناس بود نمیدونم چرا هد بود شاید واس اینکه قبلا تو شرکت کوبل بوده که اصلا کافی نیست باید تجدید نظر بشه در موردشون چون استعداد ها الکی رد میشن الان ۷ ماهه خداشاهده آگهی این شغل فعاله همه جا هم گذاشتن اونم برای این شغل مه کلی متقاضی داره باید شک کرد به توانایی این خانم و تو ارزیابیش تاثیر داد قبل از اینکه ویکی تجربه بپره کلی ادم از تجربه افتضاحی که از مصاحبه با ****** داشتن نوشته بودن حیف شد که پرید کاش برگرده دیتا واقعا مفید بود"
