description: "من ۲ ساله اومدم\r\nطبق گفته بعضی همکارها قبل مدیر جدید اوضاع بهتر بوده ولی انگاری آخراش همه چیز بهم ریخته بوده و دیگه حقوق و مزایا درست داده نمیشده.\r\nتو این ۲ سال که حقوقشون به موقع بوده ولی کارانه ها و اضافه کارها همیشه خرد خرد و با تاخیر خیلی زیاد پرداخت میشه، در حدی که دیگه ارزش ریالیش از بین میره. به هر بهونه و دلیلی سعی کردن کارانه و اضافه کاریارو کم کنند و به نظرم به زودی با سیاست زیر زیرکی قطعش کنند.\r\nشرکت مثل شترمرغ عمل میکنه، وقتی تعطیلات میشه میگه ما خصوصی هستیم و باید بیاید سر کار و حتی تو جنگ هم به زور مارو کشیدن سر کار و برای مدیرها جون آدمها ارزشی نداره و فقط کار کشیدن براشون مهمه که البته به نظرم کار کشیدنم بلد نیستند و با سیاستهای ناراحت کننده در مقابل پرسنل باعث میشن پرسنل یه جاهایی بهشون ضررهای غیر قابل مشاهده بزنن چون تعهد قلبی وجود نداره. در کل قول زیاد میدن ولی عمل خیلی ضعیفه.\r\nسیستم مالی بسیار بسته و سخت گیر هست و تجهیزات مورد نیاز به سختی خریداری میشه که البته ممکنه به علت مقابله با فساد مالی دوره مدیر قبلی باشه ولی اینبار از طرف دیگه بوم افتادن.\r\nاگه پرسنل حس بی ارز بودن برای مدیرها بهشون دست بده بی انگیزه میشن و اینجا همینطوره.\r\nمدیر عامل آدم خوبیه ولی بجای انجام کارهای بزرگ و رشد دادن شرکت وارد جزییات شده و فقط به چند نفر مدیر قدیمی که دورشو گرفتن اعتماد داره و فکر میکنه اونها نباشند شرکت زمین میخوره و به همین دلیلم اون مدیرها هرکاری دلشون میخاد با زیر دستهاشون میکنند. به راحتی اخراج میکنند، اجازه نمیدن حرف زیر دستهاشون جایی شنیده بشه و دقیقا سیستم دیکتاتوری راه انداختند.\r\nمخصوصا یکی از مدیرهاشون که واقعا همه انگشت به دهن هستند که اصلا چرا انقدر بی ادب و تند و بی سواد هست ولی مدیر ارشد هست و خیلی هم مدیر عامل به حرفش گوش میده و جرات تغییر دادن ایشونم نداره چون فکر میکنه محیط کارگریو فقط چنین آدمی میتونه کنترل کنه. این باعث شده که سطح یک شرکت به اصطلاح مهندسی و الکترونیکی شده شرکتی در سطح خدمات رسانی و نظافت منزل و یکی از دلایل بد گویی های آدمهایی که از شرکت میرن همین آدمه نور چشمی عزیز دوردونه هست.\r\nجالبه که مدیر عامل آدمهای زیادیو عوض کرد که حال شرکت بهتر بشه ولی آدمهای اشتباه تریو جای اونها گذاشت.\r\nدر مورد اینکه مدیر عامل خواهر و خواهر زن و پسر و فک و فامیل و آشناهاشو آورده هم به نظرم این از حقوق یک مدیر شرکت خصوصی هست و به کسی ربطی نداره و منم اگر مدیر چنین شرکتی بودم و دستم باز بود و آدمهای لایق اطرافم بود هم همین کارو حتما میکردم. ضمن اینکه به نظرم تموم این آدمها و مخصوصا خواهر ایشون بسیار اشخاص دقیق و حرفه ای و باسواد تو کارهای خودشون و بسیار مودب هستند و با اینکه شدیدا زحمت میکشند امتیاز خاصی نسبت به سایر پرسنل ندارند و خیلی با شخصیتهایی مثل پسر و دختر و اقوام مدیر قبلی تفاوت دارند.\r\nاین شرکت پتانسیل زیادی داره مثل کشور ایران و با اینکه روابط و رانت زیاد بانکی داره ولی مدیران میانی انقدر دستشون بازه و قوانین شاملشون نمیشه که شرکت مثل یک آدم خنگ با بدن گنده شده که داره تو بانکها زمینو جارو میکنه.\r\nمدیرها توانایی تحلیل اینکه تکنولوژی در حال رشد هستو ندارند و مدیر عامل هم با اینکه آدم دنیا دیده ای هست و سایر کشورهارو دیده ولی قابلیت تغییر دادن شرکتو ندارند و چشمشون به دهن مدیرانبه که بیشترشون سواد دانشگاهی دارند ولی قابلیت ارتقای سیستمو ندارند و مدیر هم همه انرژیشونو گذاشتند روی محدود کردن مزایای سطوح پایین شرکت و صرفه جویی های کم ارزشو حیف و میل کردن منابع و زمان از طرف مدیرهای ارشد از سمت ایشون کاملا نادیده گرفته میشه، ایشون نگران حقوق دادن به پرسنلشون هستند ولی سعی هم نمیکنند که کاری کنند که حال پرسنل بهتر بشه و درآمدشونو بیشتر از چیزی بکنند که وزارت کار میگه و فقط به مدیرهاشونه که حقوق و مزایای خوب میدن.\r\nاگر برخورد مدیرهای مغرور و بی ادبو در نظر نکیریم محیط کار تو این شرکت بسیار محترمانه و سالم هست و به نظرم برای خانمها بسیار محیط امنی وجود داره و نشنیدم آدم چشم ناپاکی تو پرسنل آقا باشه.\r\nپنجشنبه تعطیله که خودش مزیته\r\nداخل دفتر مرکزی بخش بندی ها مشخصه و اداری و تمیز هست. کارها و شرح وظایف کاملا مشخص و مهندسی شده هست و کسی کار خارج چارچوب از کسی نمیخاد.\r\nسیستمها و کامپیوترها بسیار فرسوده و قدیمی و خسته کننده هست و عجیبه که چطور تا الان هک نشده و نترکیده ولی محدودیت مصرف اینترنت و سخت گیری های این مدلی تو شرکت وجود نداره.\r\nمنابع انسانی همیشه از پرسنل طلبکاره و بیشتر مصارف انسانیه.\r\nخیلی کم دیدم کسی با سلام و صلوات با شرکت خداحافظی کرده باشه و معمولا یک طرفه و بدون در نظر گرفتن شرایط مالی و خانوادگی طرف مقابل و فرصت دادن به طرف مقابل اخراج میکنند و ورود و اخراج افراد تو سازمان زیاده.\r\nشرکتی نیست که جای رشد داشته باشی چون مدیران ثابت هستند و فقط پرسنل اخراج میشن و تو تا ده سال هم همونی یه کارمند ساده ای و ارتقای شغلی معنی نداره.\r\nهرکاری کنی وظیفته و چیزی به اسم تشویق وجود نداره و فقط یه کارانه داغون بهت میدن که سر وقتش داده نمیشه.\r\nاگه اخراج بشی شاید تا یک سال طلبهات هنوز داده نشه.\r\nتو شرکت حدودا همه مشغول کار کردن هستند و اینطور نیست که یکسری مفت خور داشته باشه و یکسری زیر فشار کار له بشن و همه سرشون گرمه و براشون برنامه کاری هست ولی محیط خفه نیست که نتونی یه قهوه هم بخوری یا به صبحونه و نهار خوردنت کسی گیر بده و اگه کسی گیر بده اون شخص فقط مدیر عامله\r\nدمای شرکت همیشه مناسب و شرکت تمیزه و میز و صندلیها هم سالم و تمیزن\r\nشرکت مذهبی نیست و کسی کاری به پوشش کسی نداره ولی جالبه پرسنل اداری و با مانتو و مقنعه حجابو رعایت میکنند و آقایون هم لباس ساده دارند و اونطور نیست که همش با دوربین کنترلت کنند.\r\nاگه تو آدونیس و چیزی یاد بگیری مطمعنن فقط بدرد کار تو خود آدونیس میخوره نه جای دیگه.\r\nبالاخره هرجایی خوبی و بدی های خودشو داره\r\nخسته شدم انقدر نوشتم ولی گفتم شاید بدرد کسی بخوره"
