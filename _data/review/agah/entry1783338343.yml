description: "من جزو نیروهای تعدیل شده آگاه هستم. \r\n\r\nمزایا: آگاه کارگزاری بزرگی هست و برای افراد دارای سابقه کاری کم میتونه خیلی تجربیات خوبی رو بسازه. مدیران رده بالا پاسخگو هستن و هد چند وقت یکبار جلساتی تحت عنوان عرشه برگزاز میشه تو سازمان و یه سری مسائل شفاف بیان میشه از سمت اعضای هییت مدیره و این مزیت خوبیه. حقوق ها به موقع پرداخت میشه و حتی یه روز هم تاخیری نداشته. زمانی که اوضاع اقتصادی خوب بود و درآمد کارگزاری بالا بود امکانات نسبتا خوبی در اختیار ما بود مثل ناهار و صبحونه و میان وعده رایگان که خیلی از شرکت های دیکه نداشتن ولی ما داشتیم. بعد از خراب شدن اوضاع مجبور شدن یه سری آیتم ها مثل میان وعده رو حذف کنن. خیلی رو ساعت کاری سفت و سخت نیستن و باهاتون راه میان. در واقع task oriented هست بیشتر. راحت میتونین مرخصی بگیرین و مدیران خیلی اذیت نمیکنن سر این موضوع. هر واحد فرهنگ سازمانی خودش رو داره و میدونم که  واحد مالی یه مقدار خشکه و جو سنگینی داره ولی واحدهای دیگه جو صمیمی برقراره. \r\n\r\nمعایب: اگاه بزرگه ولی کار خیلی حرفه ای توش انجام نمیشه. یعنی انتظار کار حرفه ای نداشته باشین اصلا و واسه همینم شاید برای کسی که مثلا چندسال سابقه و تجربه داره کسل کننده باشه. این اواخر بودجه غذا افزایش پیدا نکرده بود و باتوجه به قیمت غذاها نمیشد همه روزهای ماه رو رزرو کرد. بعضی از مدیران نسبت به نیروهای جوون تر گارد دارن و پذیرای نقد و نظرشون نیستن. پیشرفت کردن و ارتقای شغلی هم به نظر خیلی سخت میاد تو آگاه مگه جزو افراد قدیمی باشی.\r\n\r\n"
