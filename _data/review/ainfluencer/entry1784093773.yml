description: "اگر به دنبال یک محیط کاری حرفه‌ای، امن و قابل اعتماد هستید، تجربه من از همکاری با AInfluencer یکی از بدترین تجربه‌های کاری‌ام بود و به هیچ عنوان همکاری با این شرکت را توصیه نمی‌کنم.\r\n\r\nبزرگ‌ترین مشکل شرکت، مدیریت آن است. از تجربه من، مدیرعامل شرکت (سایرس) نه درک مناسبی از مارکتینگ دارد و نه از توسعه نرم‌افزار، اما تقریباً در تمام تصمیم‌های تخصصی دخالت می‌کند. نتیجه این سبک مدیریت، تصمیم‌های متناقض، بی‌نظمی، فشار روانی مداوم و فضایی بود که در آن تقریباً هر روز صحبت از اخراج کارکنان می‌شد و هیچ احساس امنیت شغلی وجود نداشت.\r\n\r\nبدترین بخش ماجرا مربوط به دوران بحران و جنگ بود. در شرایطی که کشور با بحران، ناامنی و حتی قطعی گسترده اینترنت مواجه بود، شرکت همچنان از کارکنان انتظار داشت به کار ادامه دهند. پس از آن، بخش بزرگی از کارکنان بدون دریافت حقوق معوقه، عیدی، سنوات و سایر مطالباتشان از شرکت کنار گذاشته شدند.\r\n\r\nحدود ۲۰ نفر از اعضای شرکت نزدیک به چهار ماه برای دریافت حق و حقوق خود پیگیری کردند، اما در نهایت به آن‌ها اعلام شد که اخراج شده‌اند و بخش قابل توجهی از مطالباتشان پرداخت نشد.\r\n\r\nیکی از ناراحت‌کننده‌ترین بخش‌های این ماجرا، نحوه برخورد شرکت با کارکنان بود. به‌جای اینکه مدیران شرکت مستقیماً پاسخگوی وضعیت پرداخت مطالبات باشند، ارتباط با کارکنان عمدتاً از طریق چند نفر از افراد نه چندان با سواد، اما بسیار مطیع باقی‌مانده در شرکت انجام می‌شد. بارها به کارکنان گفته می‌شد که «این هفته حقوق پرداخت می‌شود» یا «کمی دیگر صبر کنید»، اما این وعده‌ها بارها تکرار شد و در عمل بسیاری از افراد ماه‌ها منتظر ماندند، بدون اینکه مطالباتشان پرداخت شود. \r\n\r\nنکته دیگری که برای من بسیار آزاردهنده بود، اجبار به نصب نرم‌افزار TopTracker روی لپ‌تاپ شخصی بود. از همان روزهای اول همکاری از کارکنان خواسته می‌شد این نرم‌افزار را روی سیستم شخصی خود نصب کنند؛\r\n\r\n برنامه‌ای که به‌صورت دوره‌ای (حدود هر پنج دقیقه) از صفحه‌نمایش لپ‌تاپ شخصی (اگر فکر می‌کنین که به شما لپتاپ داده میشه کاملا در اشتباه هستید و هزینه خاصی هم برای استفاده از لپتاپ شخصی به شما داده نمیشه) اسکرین‌شات ثبت می‌کرد.\r\n\r\n این موضوع برای من حس نظارت دائمی و بی‌اعتمادی مطلق ایجاد می‌کرد و فضای کار را بیشتر شبیه یک محیط کنترل‌شده و تنبیهی کرده بود تا یک محیط حرفه‌ای. علاوه بر این، به ما گفته می‌شد که اگر تعداد اسکرین‌شات‌های ثبت‌شده کمتر از حد انتظار باشد یا برنامه به هر دلیلی به‌درستی کار نکند، روی محاسبه حقوق یا میزان پرداختی تأثیر می‌گذارد؛ موضوعی که استرس مضاعفی به کارکنان وارد می‌کرد.\r\n\r\n\r\nفرآیند منابع انسانی نیز از نظر من بسیار غیرحرفه‌ای بود. مسئول استخدام و مدیریت داخلی (س.پ) که خواهر زاده مدیر اصلی بود، در پایان همکاری به جای پاسخگویی و حل مسائل، ارتباط بسیاری از کارکنان را قطع و شماره تلفن آن‌ها را بلاک و تمامی گروه‌های تلگرامی و شخصی را پاک کرد؛ رفتاری که برای من و بسیاری از همکارانم کاملاً غیرحرفه‌ای و غیرمسئولانه بود.\r\n\r\nدر نهایت، اکثر اعضای تیم بدون دریافت مطالبات خود از شرکت جدا شدند و تنها تعداد محدودی از کارکنان در شرکت باقی ماندند. چیزی که برای من عجیب است این است که با وجود چنین تجربه‌ای که من و بسیاری از همکارانم داشتیم، هنوز هم آگهی‌های استخدام این شرکت در پلتفرم‌هایی مانند جابینجا منتشر می‌شود.\r\n\r\n به نظر من، این پلتفرم‌ها باید نظارت بیشتری بر سابقه شرکت‌ها در برخورد با کارکنان و پایبندی آن‌ها به تعهداتشان داشته باشند تا افراد جویای کار بتوانند با آگاهی بیشتری تصمیم بگیرند.\r\n\r\nاین متن صرفاً بیان تجربه شخصی من از همکاری با این شرکت است و هدفم این است که افرادی که قصد همکاری با AInfluencer را دارند، پیش از تصمیم‌گیری از این تجربه نیز مطلع باشند.\r\n"
