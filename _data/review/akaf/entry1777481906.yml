description: "من حدود دو سال با شرکت آکاف همکاری داشتم. این همکاری در ابتدا به‌صورت یک دوره‌ی سه‌ماهه آغاز شد تا دو طرف بیشتر با یکدیگر آشنا شوند، و پس از آن نیز دو بار، هر بار به مدت یک سال، تمدید شد.\r\nدر مجموع مشکل جدی خاصی وجود نداشت، اما نکته‌ای که خودم هم با مجموعه مطرح کرده بودم این بود که فرآیند ورود به شرکت کمی بیش از حد آسان بود. به‌دلیل اینکه سطح حقوق برای نیروهای جونیور مناسب به نظر می‌رسید، افراد زیادی جذب می‌شدند. این موضوع باعث می‌شد زمان قابل توجهی از تیم باتجربه صرف آموزش و همراهی این افراد شود، اما در بسیاری از موارد پس از حدود یک ماه مشخص می‌شد که توانمندی‌های فرد با آنچه اعلام کرده بود همخوانی ندارد و در نهایت از تیم کنار گذاشته می‌شد. این روند انرژی زیادی از تیم اصلی می‌گرفت."
