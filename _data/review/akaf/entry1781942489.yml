description: "من چهار قرارداد داشتم؛ یکی سه‌ماهه، دو تا یک‌ساله و در نهایت قراردادهای شش‌ماهه که تمدید شد. حجم کار در آکاف بالا بود و انتظار خروجی روزانه قابل‌توجهی از تیم وجود داشت.\r\nتقریباً تایم‌شیت‌ها را خودمان برای خودمان ثبت می‌کردیم و اعلام می‌کردیم و سپس برای تأیید نهایی از آن دفاع می‌کردیم. در برخی مواقع هم ممکن بود در میانه یک پروژه از شما خواسته شود کار را متوقف کنید و به دلیل فورس بودن، به پروژه دیگری منتقل شوید.\r\n\r\nبه نظر من، شرکت‌هایی که روی یک پروژه مشخص کار می‌کنند شرایط ساده‌تری دارند تا جایی که در طول سال مجبور باشید روی تعداد زیادی پروژه با سناریوهای متفاوت کدنویسی و تسک انجام دهید. با این حال، در مجموع همکاری خوبی با هم داشتیم و دلیل جدایی من از شرکت هم همین موضوع بود.\r\n"
