description: "اگر میخواهید بدترین تجربه کاری تون رو داشته باشید و شخصیت تون رو له کنن حتما استخدام ارگ جدید بشید....\r\nشرکت ادایی، بی فرهنگ ، ... بی در و پیکر و یهویی بخاطر تحریم ها مطرح شده. اصلا شرکت دانش بنیان نیست پس گول این موضوع رو نخوردید. کلی لابی کرده و دخترخاله فلانی و پسرعمه بهمانی که تو ایران خودرو و سایپا و اپراتورهای همراه و .... هستند در تمام واحدها حضور دارند.  به مشت آدم بیسواد. مدیرعاملی که ادعا میکنه از هیچ به اینجا رسیده و ویترین شرکت کراواتش است. !!! قائم مقام که جا نماز آب میکشه و نگم از معاونت منابع انسانی که هیچکس رو آدم نمیدونه. ناگفته نمونه که همسر مدیرعامله و هیچی نمیدونه فقط کافی شاپ ،مال، و بوتیک برند رو میشناسه با ظاهر غیر موجه و مدام تو تمام اموری که اصلا سر درنمیاره دخالت میکنه. واحدها بسیار ضعیف هستند چون مدیرایی که راس کارند کارشناسانی بودن که شرکت بزرگ شده ولی سطح دانش و درک شون تغییر نکرده.\r\nحقوق با یک ماه و نیم تاخیر پرداخت میشه چون با اون پول دلار خریدن و نکنه خدای نکرده ضرر کنن یا سود بانکی شون لطمه بخوره . فقط شرکت ادای اینو درمیاره که به آدمها بها میده و احترام براش مهمه وگرنه روزی که بگید دیگه نمیخوایید باهاشون کار کنید بی احترامی و بی اخلاقی می بینید که هرگز تصورش رو نمی‌کردید.\r\nتنها برگ برنده این شرکت کارخونه بم است که مدیر بسیار قابل و توانایی داره وشرکت تا اینجا همه چی رو مدیون اونه وگرنه مدتها قبل این شرکت پکیده بود."
