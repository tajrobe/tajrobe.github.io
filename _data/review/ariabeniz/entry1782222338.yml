description: "اگر به دنبال محیطی هستید که در آن مدیریت، برنامه‌ریزی، احترام به نیروی انسانی و پرداخت منظم حقوق اهمیت داشته باشد، پیشنهاد می‌کنم قبل از همکاری با این مجموعه چندین بار تصمیم خود را بازبینی کنید.\r\nیکی از عجیب‌ترین تجربه‌های کاری که می‌توان داشت، حضور در سازمانی است که تقریباً هیچ بخشی وظیفه خود را به شکل اصولی انجام نمی‌دهد و نتیجه تمام این ضعف‌ها در نهایت روی دوش کارکنان اجرایی و کارگران تخلیه می‌شود. مشکلاتی که باید در لایه مدیریت حل شوند، به پایین‌ترین سطح سازمان منتقل می‌شوند و در نهایت کسانی باید پاسخگو باشند که کمترین نقش را در ایجاد آن مشکلات داشته‌اند.\r\n\r\nدر این مجموعه(البته دوره همی عنوان مناسب تریست) به جای اینکه فرآیندها اصلاح شوند، اشتباهات تکرار می‌شوند. به جای اینکه برنامه‌ریزی وجود داشته باشد، بحران مدیریت می‌شود. به جای اینکه مشکل ریشه‌یابی شود، صورت مسئله جابه‌جا می‌شود. نتیجه هم چیزی جز فرسودگی نیروها، نارضایتی گسترده و خروج مداوم افراد متخصص نیست.\r\n\r\nموضوع پرداخت حقوق و انجام تعهدات قانونی نیز از مواردی است که هر متقاضی کار باید قبل از همکاری درباره آن به دقت تحقیق کند. هیچ چیز بدتر از این نیست که ماه‌ها برای یک مجموعه وقت و انرژی صرف کنید اما در نهایت برای دریافت ابتدایی‌ترین حقوق قانونی خود مجبور به پیگیری‌های طولانی شوید و با التماس فراوان بخشی از مطابه معوق خود را در قالب مساعده دریافت کنید!!!!! اگر بتوانید دریافت کنید !!!!\r\nمتأسفانه یکی از ویژگی‌های رایج در چنین محیط‌هایی این است که مدیران به جای پذیرش مسئولیت تصمیمات خود، همیشه دیگران را مقصر می‌دانند. وقتی همه اشتباه می‌کنند جز مدیران، معمولاً مشکل از کارکنان نیست؛ مشکل از سیستمی است که سال‌هاست حاضر نیست به ضعف‌های خودش نگاه کند.\r\nنرخ بالای خروج نیروها، نارضایتی کارکنان و حجم بالای مشکلات داخلی معمولاً اتفاقی نیست. این‌ها نشانه‌هایی هستند که هر فرد جویای کار باید قبل از امضای قرارداد به آن‌ها توجه کند.\r\nبرای کسانی که قصد همکاری دارند فقط یک توصیه دارم: قبل از هر تصمیمی تا حد امکان تحقیق کنید به عنوان شخصی که چند سال در این بلا نسبت سازمان مشغول به کار بوده فریب ظاهر و ویترین این شرکت رو نخورید.\r\n گاهی هزینه فهمیدن واقعیت قبل از ورود بسیار کمتر از هزینه‌ای است که بعداً با زمان، اعصاب، درآمد و آینده شغلی خود پرداخت خواهید کرد.\r\n\r\n"
