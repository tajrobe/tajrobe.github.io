description: "امیدوارم تجربه کاریم براتون کارآمد باشه\r\nاگر هنوز وارد آریا بنیز نشدید و این سایت و می بینید باید بهتون بگم فقط در صورتی براتون خوبه که یا منبع درآمد دیگه ای داشته باشید یا از جای دیگری ساپورت مالی بشید(مثل یکی از بچه ها که صفر تا صد هزینه رو والدینش پرداخت میکنن) و یا اینکه بی تجربه باشید بیاید اینجا سابقه کاری جمع کنید و در غیر این صورت یه باخت بزرگ محسوب میشه براتون\r\nحقوق 6 ماه یه بار، بدون بیمه\r\nمحیط غیر حرفه ای و غیر اصولی\r\nکاری که میکنید انقد هولد می مونه تا هم شما خسته میشید هم طرف حساب \r\nمیخواد پرسنل شرکت باشه یا طلبکار بیرون از شرکت\r\nبه عالم  ادم بدهکارن و توانایی پرداخت هیچکدومو ندارن\r\nهیچ مزایایی ندارند حتی نیاز اولیه کارگر مثل حقوق و بیمه هم پرداخت نمیشه موندم تو کارخونه کارگرها چطوری دارند زندگی میکنن\r\nاز همه مهم تر مدیرعامل یجوری تو فضا سیر میکنه که از یه ادم عادی بعیده\r\nبه جای نگهداشت نیرو فقط به فکر پز و دیزاین شرکته\r\nبه جای خرج ادا اطفار نمیاد حق و حقوق مردم و بده آه و نفرین مردمو از گردن خودش باز کنه\r\n\r\nدر کل آریا بنیز یه خوبی داره فقط اونم اینکه برید شرکت دیگه ای کار کنید قدر اونجارو می دونید و متوجه نکات مثبتش میشید\r\nچون هیچ شرکتی رو نداریم که همه ی نکات منفی رو باهم داشته باشه به جز اینجا\r\n\r\nجایی که حتی یه روزهایی چایی (نوشیدنی رایگان) و دستمال کاغذی هم پیدا نمیشه\r\nولی محیط دوستانه ست و با حاشیه ی پرسنل حسابی سرتون گرم میشه\r\nاصلا خیلیا بخاطر همین حواشی موندگار شدند\r\n\r\nاگه مسئولین این پیام منو میبینن تسویه ماهایی که یه ساله رفتیم و بدین\r\nگناه کردیم اومدیم اونجا کار کردیم؟\r\nشما که ندارید چرا نیرو میگیرید؟ گند زدین تو زندگی کلی ادم\r\nبی عرضه ها"
