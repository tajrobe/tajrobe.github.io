description: "خیلی واقعا هنر میخاد این همه نیرو دستت باشه این همه منابع هم دستت باشه اما تو ۳۰ ماه یه پروداکت بالا نیاری. وقتی نه مدریت بلدی نه سافت اسکیل داری نه هارد اسکیل نه حتی مهارت کار با کامپیوتر بلدی (تایپ کردنش رو یادتونه دوستان؟ خخخ) نتیجه میشه اتلاف منابع سازمان و تومخی دادن به کارمندها که یا استعفا میدن یا پرفورمنسشون بشدت میاد پایین. اونوقت خانم بجای اینکه بره اینارو یاد بگیره ۲ تا جیمیل ساخته میاد اینجا از طرف کارمندها کامنت میزاره. میدونی چیش جالبه؟ اینکه کل کارمندها جمع میشن به چیزی که از طرفشون نوشته شده میخندن!! کامل مشخصه کی نوشته. الانم شیلنگو گرفته سمت اقای پ.ش که بالاخره یه شفافیتی تو سازمان برپا کرده اما حیف که دیر اومده. همه اینایی هم که داره مینویسه بخاطر حسادت و گزارشیه که تو این مدت خروجیش فقط ضرر به شرکت بوده. یعنی اگه مثل این مسجدیا کار رو جهادی هم جلو میبرد حداقل یه چیز لایو اما بی کیفیت داشتیم اما شما ببین این چه اعجوبه ایه که اینم نداره!! اره با شمام خانم ا.ش.ر.ف! دلمم نمیاد بیشتر از این بنویسم چون که کار شما یه جور دیگه درست میشه نه از راه آموزش. انشالله خدا همه رو عاقبت بخیر کنه. فقط از مدیر عامل متعجبم چرا سره ۶ ماه ایشون رو اخراج نکرد. اصلا چرا هیچ شاخصه ای برای سنجش عملکرد مدیران و کارمندان نداشت تا همون سال ۴۰۳ جلوی این ع*کبوت رو بگیره. "
