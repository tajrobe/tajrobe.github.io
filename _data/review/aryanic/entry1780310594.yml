description: "این شرکت نمونه واقعی جایی هست که نباید از صد کیلومتریش هم رد بشید.\r\nتحت هیچ شرایطی حتی اگر قول یک میلیارد حقوق هم بهتون دادن این خریت رو نکنید\r\nمدیریت افتضاح خانم به اصطلاح دکتر پژوم\r\nبدقولی، بددهنی، بدرفتاری، تمام مشکلات ممکن رو داشتن، هیچکس تاکید میکنم هیچکس جز یکی دو نفر بیشتر از دو سه ماه نتونستن توی این شرکت کار کنن، منم یک ماه کار کردم، انقدر همه‌چیز وحشتناک بود که دمم رو کولم گذاشتم و فرار کردم، هیچ پولی هم نتونستم ازشون بگیرم\r\nهمون موقعی که استخدام شدم با هرکس از همکارام صحبت میکردم هیچکدومشون بیشتر از سه ماه نبودن اونجا و وقتی دو ماه بعد برای پس گرفتن سفته‌م رفتم دیدم همه نیروهای جدیدن، کلا کارشون این بود که نیروها رو بیارن، یه مدت نگه دارن و بدون دادن حق و حقوقشون مجبورشون کنن که استعفا بدن.\r\nمن تو یک ماه سه بار کلانتری رو توی شرکت دیدم که توی ۵ سال سابقه کاریم هیچ جای دیگه همچین چیزی ندیده بودم. به هیچ عنوان کلاهتونم افتاد اون سمت نرید. امتیاز یک هم براشون خیلی زیاده. صفر."
