description: "من از نیرو های قدیمی شرکت بودم و فکر میکردم جای سالمی دارم کار میکنم تا اینکه با اتفاق های اخیر متوجه شدم نیرو انسانی، مهارت و سابقه و تعهد شما هیچ اهمیتی نداره و در نهایت شرکت به دو دسته خودی و غیر خودی تقسیم میشه\r\nبا اتفاق هایی که اخیرا افتاد و با شروع جنگ تقریبا نصف نیروهای شرکت از جمله دو تیم تقریبا به صورت کامل تعدیل شدن که اعم این نیرو ها نگرش سیاسی و مذهبی متفاوت با مدیر عامل و افرادی که در اصل هیچ وظیفه ای در این زمینه ندارن داشتن که بعد از تعدیل دوباره شروع به جذب همون پوزیشن ها شد و افرادی که موندن در تیم های تاثیر گذار اصلا بر پایه شایسته سنجی نبود \r\nمنابع انسانی در این شرکت بعد از دو سال کار خوب از بین رفت و عملا الان واحدی به اسم HR وجود نداره \r\nشما به عنوان مدیر فقط تا حدی میتونی راهبردت رو پیش ببری و از یک جایی به بعد کار سخت میشه جایی برای ارتقا و ترفی در 95 درصد پوزیشن ها وجود نداره"
