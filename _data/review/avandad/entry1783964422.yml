description: "- این شرکت برای 4 تا شریک هستش ، که هرکدوم ساز خودشو میزنن.\r\n- جای شرکت تو شهرک صنعتی صنایع چوب ایران تو احمدآباد مستوفی هستش. مسیر خیلی بدی داره. | یک دفتر هم تو خیابان خدامی در ونک دارن.\r\n- محیط شهرک خوب بنظر میاد.\r\n- مدیر اصلیش ****** هستش اونجا. به همه نظر داره. همیشه دور خودشو پر میکنه با دخترا. اخلاق بسیار بدی داره. خیلی خاله زنک هستش.\r\n- مدیرش **** و مهمونی میگیره *****\r\n- سرپرست منابع انسانیش ****** که به شیطون گفته زکی، از اون عوضی های روزگاره. حرف هیچکس رو قبول نداره و فقط دور ****** میپره.\r\n- محیط کاری بشدت سمی داره.\r\n- سفته های سنگینی میگیرن برای استخدام.تازه بعداز 2 سال بهت پس میدن \r\n- قسمت فروش چندتا دختر هستن که همیشه دهنشون سرویس میشه، بابت کار زیاد و بی برنامگیشون.\r\n- یه مدیر دارن برای استراتژی!!! یعنی هرکاری میکنه به مدیریت ربطی نداره و اوضاع رو خراب تر میکنه، با اون CRM مضخرفش.\r\n- تو قسمت تولید از بس هوا آلوده هستش، کارگرها چندماه نشده مشکل ریه پیدا میکنن. برش سنگ خیلی سخت هستش.\r\n- جابجا کردن سنگ های سنگین با بالابرهای مختلف همیشه در حال انجام هستش. تا حالا چندین نفر انگشتو دست و پاهاشونو از دست دادن. امنیت جانی تو این بخش صفر هستش.\r\n- خلاصه اصلا توصیه نمیکنم برای کار بری اونجا. از بیرون خوب بنظر میاد ولی بشدت داغون هستش."
