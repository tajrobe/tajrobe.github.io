description: "\r\n\r\n«این مجموعه با وجود ادعای توسعه و بهره‌گیری از مشاوران، متأسفانه دارای فرهنگ سازمانی متناقض و محیطی غیرحرفه‌ای است. مدیریت ارشد بر رویکرد کنترل‌گرایانه و رفتارهای تحقیرآمیز نسبت به منابع انسانی تأکید دارد و سیاست جایگزینی سریع نیروی کار جایگزین استراتژی حفظ و توسعه سرمایه انسانی شده است. همچنین، در فرآیندهای خروج از سازمان، شاهد تضادهای قانونی در بخش حسابداری و منابع انسانی هستم؛ به‌گونه‌ای که دسترسی به مدارک قانونی کارکنان مشروط به پذیرش تعهدات محدودکننده و غیرقانونی در دفترخانه است. این مجموعه در تضاد کامل با استانداردهای اخلاق حرفه‌ای و حقوق قانونی کارکنان عمل می‌کند.»\r\n"
