description: "بعنوان مسئول دفتر کار میکردم متوجه شدم مسئول دفتر قبلی با سابقه دوازده سال اونجا بخاطر حداقل حقوق اداره کاری دیگه نتونسته بمونه درحالیکه به آدمای بی مصرف، دستمال به دست، دروغگو و کاملا بیکار حقوق بالا پرداخت میشد.\r\n\r\nدقیقا با منم همینطور رفتار کردن\r\n\r\nانقدر مدیریت کارخونه ضعیفه که کارگر انبار به خودش حق میده برای همه کارمندا تصمیم بگیره فاز مدیریت برمیداره کمترین میزان کار و بازدهی رو در کارخونه داره اما از لحاظ اخلاقی خانم کثیف و حیله گر و سلیطه و سمی و فوق العاده فضول و سطح پایین هست.\r\n\r\nمتاسفانه چنین شخصیت سطح پایینی که حتی سواد دانشگاهی نداره و بلد نیست با کامپیوتر کار کنه جای مدیر بی عرضه کارخونه قوانین تعیین میکنه\r\n\r\nاصلا محل مناسبی برای یک خانم تحصیل کرده نیست محیط کاملا سمیه کل کارهای کارخونه فقط با مسئول دفتره حتی جای منابع انسانی هم باید کار کنه و حقوقش از ابدارچی کمتره\r\nاگه انسان سالمی هستید اصلا سمت این کارگاه نرید\r\n\r\nهیچ مزایایی نداره\r\nفقط حقوق و بیمه تامین اجتماعی داره"
