description: "متاسفانه برای این شرکت رزومه فررستادم که پشیمونم این افراد ناشی رزومه منو دریافت کردن و بابت مصاحبه تماس گرفتن روز مشخص رفتم که هوا بارونی بود اولا در ورودی نفررو نبود از محوطه پارکینگ رفتم اتاق نگهبانی هماهنگ نشده بود من برای چی اومدم سردرگم به من گفتن برو از ساختمون داخل بپرس رفتم همه اتاقا درش بسته بود یا کسی داخل نبود بالاخره بعد چند دقیقه الاف شدن اتاق مصاحبه رو پیدا کردم که تو حیاط ضلع شمالی طبقه پایین بود .دیدم یک پیرمرد با موهای سفید شبیه امین تارخ داخله ولی در از بیرون قفله حالا منم زیر بارون در زدم که بیاد دیدم توجه نمیکنه بالاخره بعد ۵ دقیقه که خیس شدم حسابی به خودش زحمت داد اومد پشت در انگار طلبکار بود مردک احمق که چرا اینقدر در میزنی چخبره ! واقعا شعور در حد صفر پیرمرد نادان هیچی از تشریفات مصاحبه نمیدونست که هیچ انگار مدیر منابع انسانیم بود !!! خلاصه چیزی نگفتم سعی کردم رفتار حرفه ای داشته باشم رفتیم نشستیم فضای اتاق شبیه سنگر جبهه پر عکس شهیدو المان های جنگ و پاچه خواری که قشنگ ریاکاری موج میزد هم تو ظاهر اون مرد هم تو فضای اتاق حالا نشستیم کلی حرف مفت که اینجا مال بنیاد مستضعفانه فلان سردار سهام داره و… بعد رزوممو دیده میگه ما برای فیلد دیگه ای غیر از تخصص شما نیرو میخواهیم بلدی بسم الله !!! آخه ادم نفهم ریا کار بی سواد مگه مردم مسخره شمان مگه رزومه منو ندیده بودین منو زیر بارون کشوندین الاف کردین آخرشم اینطور . پشبمونم چرا نشستمش همونجا و‌الکی احترام گذاشتم جالب اینجاس موقع برگشت انتظامات گفت چی شد گفتم هیچ گفت ببین داداش اینا تیپ شما رو نمیگیرن باید ریش کله قندی و تیپ برادر گونه داشته باشی ادکلن زده کت شلواری قبول نمیکنن خلاصه اصلا نرید سمت این شرکت به هیچ وجه منم فکر می کردم برند معتبریه نگو یه مشت ادم رانتی اونجان\r\nادمین جان خواهشا نظرمو کامل بزار رفتار بسیار بدی داشت و ناراحت شدم"
