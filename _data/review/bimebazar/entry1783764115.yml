description: "چند سال به سختی به خاطر قرارداد و مشکل هایی که برامون به وجود آوردن اونجا بودیم. به معنای واقعی کلاهبردارن و نه تنها حق مردم بلکه حق کارمندای خودشونم میخورن. حقوق ها رو نصفه و با تاخیر میدن، بدون دلیل، اگه از کسی خوششون نیاد اخراجش میکنن. بچه های ۱۸-۲۰ ساله که تجربه ای ندارن رو استخدام میکنن که با تهدید ازشون کار بکشن و مثل برده ها باهاشون رفتار میکنن. هر ۶ ماه افراد مختلف رو اخراج میکنن و برده های تازه نفس استخدام میکنن. مسابقه های داخلی میذارن و به کارمندا میگن با ایمیل های مختلف برن تو گوگل بهشون امتیاز ۴ و ۵ ستاره بدن و نظرای خوب بذارن، در آخر به چند نفر برنده ساعت هوشمند و پول و ... جایزه میدن. هر چند وقت یه بار هم یدفعه یه موج اخراج و استعفا میبینید توی شرکت. نحوه پیشرفت اونجا فقط پارتی بازی و پاچه خواری هست و هیچ ارزشی برای مهارت قائل نمیشن، شما بهترین هم باشین ولی پاچه خواری سرپرست ها و مدیرها رو نکنید، اخراج میشید آخرش یا انقدر اذیتتون میکنن و دردسر براتون درست میکنن که خودتون استعفا میدین. محیط شدیدا سمی ای داره، طوری که همه دنبال زیرآب زدن هستن و میچسبن به سرپرست ها‌. اگر مسئولیت و اجاره و ... دارید ازشون فاصله بگیرید چون به خاک سیاه میشونن شما رو. امیدوارم هممون از شر این شرکت ها راحت بشیم و کار خوبی پیدا کنیم."
