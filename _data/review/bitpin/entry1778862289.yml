description: "یک روز، مدیرعامل شرکت در جمع کارکنان از تجربه‌ صعود به اورست گفت؛ اینکه کسانی که موفق به فتح قله شده‌اند، به جای آنکه ذهنشان را درگیر قله کنند، فقط به قدم بعدی فکر می‌کردند. بلافاصله پس از این الهام‌بخشی، اعلام کرد که همان روز قرار است با چهل نفر خداحافظی شود. دلیل رسمی؟ شرایط جنگی و بحران اقتصادی کشور.\r\nاما واقعیت چیز دیگری بود. اخراج‌شدگان عمدتاً کسانی بودند که از مسیر معمول و با گذراندن مصاحبه فنی وارد شرکت شده بودند. آن‌هایی که از طریق آشنایی و بدون مصاحبه جذب شده بودند، کوچک‌ترین تکانی نخوردند. اگر با مدیران شرکت در جای دیگری همکار بوده‌اید و از این طریق وارد بیت‌پین شده‌اید، جای شما کاملاً امن است.\r\nادعای بحران مالی هم دیری نپایید که رنگ باخت؛ شرکت بلافاصله پس از این تعدیل‌ها، حقوق کسانی را که می‌خواست نگه دارد افزایش داد. سؤال ساده این است: چطور سازمانی که ادعا می‌کند با بحران مالی دست‌وپنجه نرم می‌کند، همزمان حقوق‌ها را بالا می‌برد؟\r\nاگر به دنبال ثبات شغلی هستید، بیت‌پین گزینه مناسبی نیست.\r\nاز بیرون، شرکت جذاب و پویا به نظر می‌رسد؛ مسیر پیشرفت شفاف، حقوق رقابتی، فرهنگ سازمانی دوستانه. تیم منابع انسانی هم در جلسات جذب، با اشتیاق از نردبان ترقی و رشد حقوقی متناسب با آن صحبت می‌کند، که البته دروغ هم نمی‌گویند، اما آنچه نمی‌گویند این است که این مسیر برای همه یکسان طی نمی‌شود. در عمل، آینده شغلی افراد بر اساس نظر شخصی مدیران تعیین می‌شود، نه عملکرد واقعی، و این را «ارزیابی عملکرد» می‌نامند.\r\nبیت‌پین شرکتی است که ممکن است چند ماه تجربه خوبی داشته باشید، اما یک روز، بدون هیچ مقدمه منطقی، از شما خواسته شود که دیگر سر کار نیایید؛ حقوقتان واریز می‌شود و پرونده بسته است.\r\nخلاصه اینکه: اگر با مدیران ارتباط دارید، بیت‌پین بهترین جای ممکن است. اگر ندارید و ثبات شغلی برایتان اهمیت دارد، جای دیگری را انتخاب کنید."
