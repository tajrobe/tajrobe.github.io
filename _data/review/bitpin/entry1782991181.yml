description: "کل ساختار این شرکت بر اساس پارتی بازی رفیق بازی و غیر حرفه ای بودن بنا شده\r\nمدیرعاملش که طبق رزومه خودش بدون هیچ سابقه قبلی در مدیریت بیزینس امور مالی یا تکنولوژی اینجا یهویی شده مدیرعامل. میگن معلم زبان بوده که من تو همینشم الان شک دارم. چیزی که شنیدم تنها شانسی که آورده تونسته با روابطش مخ سرمایه گذار اولیه رو بزنه. بعدشم تمام رفقاش رو جمع کرده با خودش برده تو این شرکت. همه هم یکی از یکی کارنابلدتر.\r\nمدیران ارشد فنیشون (مخصوصا CTOها) که اگر یه شرکت درست حسابی برای جونیور مصاحبه بدن همون مرحله اول در جا رد میشن. بعد همینا کدهای داغون اولیه شرکت را زدن و خیلی هم بهش افتخار میکنن. با آدمای کاربلد فنی هم فوری به مشکل میخورن چون نمیتونن با گندکاریشان کنار بیان و مخصوصا تو ارزیابی عملکرد تلافی میکنن.\r\nیه دوسالی هم هست یه نفرو رو با عنوان من درآوردی Excecutive VP of Product آوردن که طبق لینکدین خودش بدون حتی یه روز سابقه مدیریت محصول از منابع انسانی یهویی شده VP of Product بعدشم اومده اینجا یا طبق معمول به خاطر رفاقت یا این که با چاخان کردن که توش استاده تونسته سر اینا رو شیره بماله. هیچ کسی هم نمیدونه دقیقا چه کار مفیدی میکنه.\r\nمدیر منابع انسانی هم بازم رفیقشونه. اصلا حال نداره دو کلمه درست با یکی حرف بزنه. اصلا به درد منابع انسانی نمیخوره چه برسه به مدیرش!\r\nو همین طور لیست رفیق بازی ادامه داره\r\nاگر رفیقشون باشی و پاچه خاری کنی که جات کاملا امنه و حقوقت زیاد هم میشه و گرنه حتما به فکر شغل بعدیت باش مهم هم نیست چقدر حرفه ای و کاری باشی. نمونه ش هم همین آخرین تعدیلی که انجام دادن کاملا طبق همین معیارهایی که گفتم بود\r\nکدها و زیرساخت فنی هم که کاملا داغون و افتضاح. همه بچه های فنی خصوصی همینو میگن. من موندم با این همه مشکل و نقص چطور هنوز هک نشدن. احتمالا به سیستم نفوذ شده منتظر فرصت مناسب برای خالی کردن موجودیا هستن وگرنه نوبیتکس که اصلا به این داغونی نبود هک شد\r\nکاربرا هم ناراضین و دهنشون سرویس شده. مدام سیستما میاد پایین مدام اشتباه توی حسابا و معامله ها پیش میاد و ...\r\nمن فقط موندم چطور هنوز اینجا سر پا مونده! ولی هر لحظه ممکنه که ..."
