description: "من در خراب شده بوتان کار می کنم.\r\nاصلا برای کار مناسب نیست مخصوصا برای خانمها ها که استفاده ابزاری دارند.\r\nتوی یک مراسمی داخل شرکت صاحب مجموعه بوتان گفت پرسنل برای ما مثل آدامس می مونن. می جویمشون و وقتی شیرینیشون رفت می ندازیم دور و یکی دیگه.\r\nمدیران با پارتی و رابطه مدیر شدن. مثلا مدیر تحقیقات شوفاژ برادرش توی وزارت صنایع بود. به همین ترتیب.\r\nیکی از مثلا مدیران (ر - ع) فساد اخلاقیش زیادی داره اما چون منابع انسانی خودش خرابه کاری نمی کنه.\r\nاون کسی هم که اومده تو سایت گفته شرکت خوبیه توی جنگ به ما حقوق سر وقت دادن و خیلی خوشحاله این طرف داستان هم ببینه که یکی از همکاران فقط شش ماه تا بازنشستگی داشت به خاطره جنگ تعدیل شد."
