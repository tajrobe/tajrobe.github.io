description: "سلام\r\nمن تو یکی از شرکتهای زیرمجموعه بوتان به اسم کالا و قطعات کار میکردم. با اینکه حقوق بالایی نداشتم ولی به دلیل مشکلات زندگیم به ناچار کار میکردم که در بدترین موقع و بدون اطلاع قبلی اخراج شدم. برام جالب بود که نیروی خوب با حقوق پایین اخراج میشه ولی نیروی مازاد و نالایق با حقوق بالا میمونه. مدیر شرکت که اکثر نیروهاشو بر اساس سلایق شخصیتش اونجا جمع کرده از هر کی خوشش نیاد و یا باهاش موافق نباشه بالاخره به ی طریقی مدیرعامل رو برای اخراج اون نیرو قانع میکنه و همیشه ادای آدمای دلسوز شرکت رو درمیاره ولی در واقع تنها چیزی که براش مهم نیس همون شرکته. یک سیستم دیکتاتوری مطلق درست کرده و تا همین الان نیروهای خیلی خوبی رو اخراج و نیروهای مطیع و نون ب نرخ روز خور رو برای خودش نگه داشته و الان هم برای اخراج بقیه نیروها که سلیقه اش نیستن در حال توطئه اس.منابع انسانی هم فقط نقش ماله کش رو داره،حتی براشون اسناد محکمی هم ببرید باز هم توجهی  نمیکنن. کار کردن تو اون شرکت مثل اینه که پاتون هر لحظه بره رو‌ پوست موز. هیچ وقت نمیدونی که کی قراره اخراجت کنن و زندگیت رو وارد چالش کنن."
