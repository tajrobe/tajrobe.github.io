description: "نصف بیشتر مدیرها به خاطر روابط خانوادگی و فامیلیشون تو بوتان اومدن سرکار و گواه این موضوع ضعف و عقب موندن بوتان از سایر رقیب هاش تو این چند سال هست. هرکی هر آشنایی داشته برداشته اورده یه پست خوب بهش داده. \r\n این موضوع در خصوص کارمندای عادی هم صدق میکنه. اگر فامیل و آشنا داشتی حقوقت بالاست و خروجی کارتم هیچی نباشه، واسشون مهم نیست. ولی اگر اشنا نداشتی با یه حقوق پایین ، باید همه مدل کاری انجام بدی، آخرشم باز‌ ازت راضی نیستن و توقع بیشتری دارن. \r\nدر کل تبعیض بیداد میکنه. \r\nهر قسمت شرکت دوربین داره و شما مدام تحت نظر و کنترل هستید. البته بازم اگر شما اشنا داشته باشید و گردن کلفت باشید ازادید هر نوع رابطه و کاری رو تو شرکت انجام بدید. به هرحال کم دیده نشده از این روابط. به خصوص در واحد منابع انسانی که گل سرسبد فساد شرکت هست. \r\nهیچ مزایا و پرداختی خوبی وجود نداره. فقط حقوق رو سر تایم میدن و تمام. نه بن کارت، نه اقلام. هیچی نمیدن.\r\nآقا صادقانه اگر سلامت روان ، جسم، شخصیت براتون مهمه، هرجا اسم بوتان و شرکتهای زیر مجموعه رو شنیدید ، فقط فرار کنید. "
