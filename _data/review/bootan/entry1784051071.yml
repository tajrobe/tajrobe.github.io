description: "سلام و درود\r\nمن به دلیل مشکلاتم، علی رقم راهنمایی دوستان مدتی از عمرم را در بوتان حروم کردم، البته شرکت قطعات و کالای بوتان TAP با مدیریت نالایق و کودکانه که واقعا منافع سازمان اصلا براش اهمیت نداشت و فقط منافع شخصی خودش و منافع چاپلوسان و فامیل های بی سوادی که به زور وارد سازمان کرده بود و با حقوق های بالا و بدون داشتن خروجی ازشون حمایت میکرد براش اهمیت داشت. واقعا روانشناس ها حرف قشنگی میزنن که ریشه بی ثباتی شخصیت و عقده ها و کمبود ها و مشکلات اخلاقی برخی از افراد نشان دهنده دوران کودکی سخت و پر از چالش ها و عقده ها بوده که شرح حال مدیر این مجموعه است.\r\nواقعا برای منابع انسانی این شرکت خیلی متاسفم، چون اگر از حداقل معیار های روانشناسی ، سواد و تخصص و حتی حداقل های رفتار انسانی در جذب یا انتصاب این شخص استفاده میکرند، واقعا چنین شخصی چنین پستی تو این شرکت نداشت و نهایتا بعنوان نیروی خدمات یا حراست مشغول بکار بود.\r\nدر واقع سیستم بیمار هست که چنین انسان های مریضی را در خودش رشد میده و شاخص پیشرفت در مجموعه را بجای تخصص و مفید بودن، رابطه و سطح چاپلوسی افراد مشخص میکنه.\r\n\r\nشرکت در سخت ترین شرایط که داشتم با من قطع همکاری کرد، اونم بخاطر اینکه مدیر نالایق  مجموعه حس خوبی به من که سرم را مینداختم پایین و کارمو بدون نقص انجام میدادم و بلد نبودم چاپلوسی کنم نداشت.\r\nاز مریضی این مدیر نما همین را بگم که حتی بعد از جدا شدن از شرکت هم ول کن نیست و تا میتونه نمیذاره جای دیگه مشغول بشی و به هر طریقی با سنگ اندازی و خراب کردنت، نمیذاره جذب شرکت دیگه ای بشی، و پیگیرت هست تا وجهت را با حرفهای نامربوطش خراب کنه. واقعا خیلی مریضه\r\nجالب اینکه کمترین پایه حقوق تو قسمت برای من زده بودن و بیشترین کار را من براشون انجام میدادم، به امید بهبود اوضاع و پیشرفت شغلی ولی موقع تعدیل نیرو بنده با این حقوق پایین شدم نیروی مازاد و فامیل ها و چاپلوسان خودش که اکثرا پایه حقوقشون تا 3 برابر من هم بود و تخصص و خروجی خاصی هم نداشتن شدن نیروی حیاتی شرکت، واقعا شرکت بی صاحبی هست (خدا رحمت کنه صاحب اصلی را که ندید شرکتش دست کی ها افتاده ) که تخصص و کار نیرو را معیار و شاخص نمیدونن و صرفا بر اساس معیار های غیر منطقی و سلیقه شخصی عمل میشه و اصلا منافع سازمان برای کسی اهمیت نداره و فقط خودشون را در ظاهر دلسوز و غم خوار شرکت نشون میدن ولی در عمل ...\r\n\r\nخلاصه اگر به دید یه شغل موقت که فقط به کمکش بتونید موقتا گذران کنید تا شرکت بهتری پیدا کنید، خوبه ولی اگر تخصص بالایی دارین و آینده نگر هستین و با چاپلوسی و زیرآب زنی رابطه خوبی ندارین، به هیچ عنوان پیشنهاد نمیکنم با همچین مدیر مریض و سازمان بیماری کار کنید که حتی کوچکترین ارزشی برای شما و تخصصتون قائل نیست کار کنید و عمرتون را مثل من حرام این شرکت نکنید.\r\n\r\nدر نهایت من امیدوارم روزی برسه که چنین مجموعه بزرگی با این پتانسیلی که داره دست مدیران لایق، با سواد، دلسوز و متخصص بیفته که با اصلاح اساسی ساختار شرکت بتونن دوباره روحی جدید بر پیکر نیمه جانش بدمند و کارخانه را از وجود چنین مدیر نماهای بیسواد و نالایق و سایر سربارهای بی تخصص و چاپلوس پاک کنند تا شاهد پیشرفت روز افزون این شرکت باشیم.\r\n                                                                                                                                                                                  با تشکر"
