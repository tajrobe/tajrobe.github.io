description: "اسکار بی در و پیکرترین شرکت میرسه به این شرکت\r\nبه نظر من خیلی وقت ها ادم ها به خاطر چند درصد حقوق بیشتر سازمان رو ترک نمی کنند\r\nاما به خاطر بی احترامی و کار کردن با یه مدیر نامناسب ،خیلی زود تصمیم به رفتن می گیرن\r\nدقیقا مصداق همین شرکت هست\r\nمنابع انسانی که نداره در واقع ۴ تا مترسک نشستن به خاله زنک بازی به خصوص اقای م.ز که رزومه رو نمیدونه برای چه واحدی ارسال کنه،یعنی در این حد بی سواد هست که رزومه طرف رو میفرسته یه بخش و واحد غیر مرتبط.\r\nشرکتی بسیار شلوغ ،همه تو هم نشستن،و پر از روابط نامشروع،برای همین دوربین هم خیلی جاها نذاشتن\r\nوقتی وارد شرکت میشی پوشش خانم ها به شدت نامناسب هست، که یه لحظه فکر میکنی اشتباه وارد مجموعه بانکی شدی\r\n"
