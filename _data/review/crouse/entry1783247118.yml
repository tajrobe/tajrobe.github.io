description: "واحد ماشین سازی کروز بدترین و منفورترین واحد شرکته. اگه میپرسید چرا؟ توضیحاتم رو بخونید و قضاوت با خودتون!\r\nاینجا حجم کار به قدری بالاس که اگه هر روزم تا ساعت 7 شب بمونید ممکنه نرسید به موقع پروژه هایی که مث آوار رو سرتون میریزن رو تحویل بدین. ساعت کار 7 صبح شروع میشه و کارشناسا 1 ساعت شناوری دارن اما اینجا اگه چند مرتبه دیر بیاید رییستون بهتون گیر میده. تایم کار ساعت 4 بعد از ظهر تموم میشه و اگه بخواید زودتر از 7 شب برید باید با رییستون هماهنگ کنید و اغلب مجبورید حداقل 3 روز در هفته تا ساعت 7 بمونید که دهنا بسته بشه. پنج شنبه ها از 7 صبح تا 3 بعد از ظهر کلا اضافه کاره و کارشناسای اغلب واحدا نمیان اما اینجا شما نخواید بیاید باید با رییستون هماهنگ کنید و ازش یجوری اجازه بگیرید که اغلبم با غرغر رییستون روبرو میشید. بنابراین تعادل بین کار و زندگی تو این واحد اصلا معنی نداره و شما مث یه ربات خستگی ناپذیر فقط و فقط باید بمونید و کاری که برا 3 نفر هستش رو 1 نفری جلو ببرید. \r\nشرکت ماهانه یه پاداشی بر اساس عملکرد میده که نمرش از 100 ئه و دست رییسه ولی تو این واحد مزخرف رییست مث کسی که باهت پدرکشتگی داره بهت نمره میده. تو شروع کار کمترین نمره ممکن رو چند ماه بهت میدن و بعد که یکم سابقت رفت بالاتر قطره چکانی اون نمره رو زیاد میکنن و منتشم سرت میذارن درحالی که اگه نمره یه فرد هم سابقه خودتو تو واحدای دیگه با خودت مقایسه کنی میفهمی که اختلاف فاحشی وجود داره و نمره تو چقدر کمتره و همین قشنگ گند میزنه تو مبلغ پاداش ماهانه ات. اما جالبه که این داستان به پاداش ماهانه ختم نمیشه. شرکت یه پاداش پایان سالم داره که اونم بسته به عملکردت و نمرات پاداش ماهانه و نظر رییس و مدیرت مبلغش تعیین میشه که تو این زمینه هم اگه با بقیه واحدا حتی افراد هم سابقه خودت مقایسه کنی اختلاف فاحش رو به وضوح میبینی. این در حالیه که تو در طی سال حجم کار خیلی بیشتری داشتی و ساعتای خیلی بیشتری اضافه کار موندی. بنابراین اینجا هم باید کار بیشتری بکنی هم پول کمتری بگیری و حق اعتراضم نداری!\r\nمورد بعدی بحث ارتقا و پیشرفت شغلیه که تو این واحد اصلا نباید حتی بهش فکر کنید! واحدای دیگه اغلب کارشناسای 3 سال سابقه به بالاشون رو ارشد میکنن که حداقل از نظر مالی یه حالی به طرف بدن و انگیزه بشه براش اما اینجا کلی کارشناس بالای 8-7 سال سابقه داره که نه تنها رییس و مدیر و ... نشدن بلکه حتی ارشدشونم نکردن و با این سابقه شون واقعا کارشناس ساده موندنشون فاجعه اس.\r\nدر مورد رییس شدن هم باید بگم که داستان خودشو داره و باید تو باند مدیر و معاون و ... باشی تا رییست کنن. نزدیک 3 سال پیش اغلب رییسای ماشین سازی رو تو هر 3 کارخونه عوض کردن و گلچینی از آدمای بیسواد و نالایق رو گذاشتن تا هم خطری برا مدیر نباشن هم به خاطر حالی که بهشون دادن بله قربان گوی تمام و کمال مقامای بالادستی باشن و بتونن با کمترین هزینه، بیشترین کار رو از افراد زیر دستشون بکشن و هرگونه اعتراضی رو در دم سرکوب کنن.\r\nاین مواردی که گفتم برا ماشین سازی هر 3 تا کارخونه برقراره و همه واحداهای طراحی ماشین آلات، ماشین سازی کارخانه 1، ماشین سازی کارخانه 2، تجهیزات تولید دسته سیم و ماشین سازی کارخانه 3 رو شامل میشه. بنابراین اگه برا چنین واحدایی اپلای کردید و میخواید مشغول کار بشید حتما قبل دیر شدن تو نظرتون بازنگری کنید."
