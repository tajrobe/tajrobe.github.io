description: "من فقط چند ماه توی اون واحد کار کردم، اما توی همین مدت کوتاه فهمیدم که بدترین واحد کل شرکت همون گروه بیو سوئیچ بود. واقعاً احساس می‌کردم این گروه بی‌صاحب‌ترین بخش شرکت هست. مدیرش انگار اصلاً وجود خارجی نداشت؛ کاملاً منفعل و بدون هیچ مدیریتی. رئیس گروه هم بیشتر از اینکه درگیر کار و مدیریت باشه، حواسش دنبال حاشیه و دختر‌بازی بود. این موضوع اون‌قدر جدی شده بود که حتی داخل واحد دوربین نصب کرده بودند. تا جایی که می‌دونم، تنها واحد شرکت بود که دوربین داشت. \r\nبرای من، کار کردن توی اون گروه چیزی جز جهنم نبود. شاید تنها شانسم این بود که رئیس از من خوشش نیومد و در نهایت قراردادم رو تمدید نکرد؛ اتفاقی که بعدها بابتش واقعاً خدا رو شکر کردم.\r\nجالب اینجاست که تمام این موارد رو توی جلسه خروج با منابع انسانی صریح و بدون تعارف مطرح کردم. از واکنششون کاملاً مشخص بود که خودشان هم از وضعیت اون واحد خبر دارند، اما ظاهراً یا نمی‌خواهند یا نمی‌توانند اقدامی برای اصلاحش انجام بدهند."
