description: "این واحد بر خلاف اسمش که خیلی دهن پر کن و با مسماست و تو اکثر شرکتا جزو واحدای کلیدی و نورچشمی حساب میشه، اینجا اینقد زدن تو سرش و ریدن بهش که بوی تعفنش همه رو خفه میکنه. کمتر پارامتر کاری میشه پیدا کرد که تو این واحد در حد مطلوب باشه.حجم کار بسیار بالاس و مجبوری اکثر روزا تا 7 اضاف کار بمونی و پنج‌شنبه هام که کلا اضاف کاره هم هرهفته بیای سر کار. این واحد چون طراحی و ساخت قطعات یدکی و تجهیزات و ماشین‌آلات خطوط تولید رو بر عهده داره تقریبا با همه واحدای شرکت در ارتباطه و هر واحد از طرف خودش یه فشاری وارد میکنه و این وسط، بازار کشمکش و زیرابزنی هم داغ داغه که حسابی میره رو مختون. وضعیت واحد مث جنگل میمونه. هرکی بتونه از زیر کار در میره و کارشو میده تو پاچه دیگری و این وسط نیروهای تازه وارد از همه بیشتر ضرر میکنن چون هنوز راه و روش های دور زدن و زیرورو کشیدن رو کامل یاد نگرفتن. مشکل اصلی واحد مدیر نالایق واحده که نه سواد فنی بالایی داره و نه سواد مدیریتی. بیشتر گوشش به دهن یکی از رییسای کارخونه 1 ئه و همش دنبال اینه از اینور و اونور اخبار جمع کنه و با کمترین هزینه بیشترین کار رو از زیرمجموعه اش بکشه. در حالی که خیلی از واحدا در اثر ازدیاد نیرو رو آوردن به کارای جانبی مثل خواندن زبان خارجه یا چرخ زدن تو دیجی کالا با نت شرکت، اینجا کار 3 نفرو میدن به 1 نفر و نیرو هم نمیگیرن. تو بحث نمره پاداش ماهانه هم هرچقدرم تلاش کنی حسابی نسبت به واحدای دیگه پایین میدن به خصوص به افراد تازه وارد یجور پایین میدن که هم گند میخوره تو مبلغ پاداشش هم انگیزش نابود میشه. تو بحث پاداش پایان سال هم تعیین مبلغش بسیار پرحاشیه و بی حساب و کتابه. اگه طرف طی سال شوآف خوبی راه انداخته باشه، برا رییس و مدیر خوب پاچه‌خاری کرده باشه، خوب خبرچینی کرده باشه و کارشون رو خوب چاق کرده باشه، سهم خوبی از بودجه پاداش پایان سال دریافت میکنه وگرنه بازم در مقایسه با واحدای دیگه اختلاف زیادی داره و خیلی کمتره. اگه بخوام عددی بگم مثلا طرف با بالای 3 سال سابقه اینجا زیر 100 تومن میگیره ولی فلانی مثلا تو جذب و استخدام که بیشتر سالم بیکاره با 1.5 سال سابقه بالای 140 میگیره و این اختلاف هیچ جوره منطقی نیس. تنها دلیلشم اینه که مدیر نالایق واحد میخواد تا حد امکان از هزینه ها کم کنه و با یه شوآف در مقابل معاون، خودشو شیرین کنه و بگه من فقط با فلان قدر هزینه کارو از آب درآوردم و خودشو بکشه بالا و عزیز کنه. رییسای این واحدم اکثرا آدمای ضعیف و نالایق ان و با اجرای سیاست چماق و هویج، مث گیر دادن به ریش و سبیل و لباس و ... فقط و فقط میخوان ازت کار بکشن و جلو هرگونه اعتراضی رو هم بگیرن. محیط واحد بسیار خشک و مردونه اس و در کنار خطرات واحد مث رفتن دست زیر فرز یا پریدن پلیسه داغ تو چشم، واحد، افراد خبرچین و زیرابزن و متکبر کم نداره و اگه کوچکترین خطایی ازت سر بزنه با سرعت نور به دست رییس و مدیر میرسونن. بنابراین در کنار خطرات و آلودگی های محیط کارگاهی واحد، باید مراقب خطرات و آلودگی‌های ناشی از همکاران سمی هم باشید. امیدوارم انتشار این تجربه ام کمکی به افرادی که بعدها میخواستن تو این واحد مشغول بشن بکنه و با انتخاب واحدای دیگه برا کار کردن، قربانی این واحد کثیف نشن!"
