description: "میشه گفت یکی از بدترین شرکت هایی بوده که کار کردم. خانم میربابایی مدیر عامل شرکت و همسر رییس هیت مدیره فکر میکنن که هنوز در زمان مصر باستان زندگی میکنیم و کارمند هارو به چشم برده میبینه جالبی قضیه اینجاست که وقتی پرسنل طبق رسم همیشگی چندین ماه حقوق نگرفته ایشون جلوی چشم همه برای خودش چیز سفارش میده و اماده سفر به خارج از کشور میشه و تمامی مدت هم با دوربین در حال نظارت مجموعه هستش. شرکت فرقی با مهد کودک نداره و همیشه یکی اونجا استخدام میشه تا از دو تا بچه های ایشون مراقبت کنه و نازشون رو بکشه و هیچوقت تاکید میکنم هیچوقت از کارمند ها راضی نیستن حتی وقتی که روزهای تعطیل سرکار بیای و تا  دیروقت کار کنی واقعا در زندگیم انسان هایی مثل اینا ندیده بودم امیدوارم هرکی تجربه من رو میبینه به هیچ وجه وارد دام آرمین اکسیر نشه چون هم زندگیش مختل میشه هم کارش چرا که شما با آدم های تازه به دوران رسیده و ظالمی طرف هستید که جز به خودشون و منافعشون به چیز دیگه ای فکر نمیکنن"
