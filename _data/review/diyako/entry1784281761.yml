description: "اگر حوصله خوندن نداری باید بگم اگر به توام گفتن بیا آزمایشی یعنی نه از حقوق خبری هست و نه بیمه\r\nیک ماه مفت ازت کار میکشن و بعدشم خدافظی میکنن باهات\r\nحالا گوش کن:\r\nمن یک ماه به صورت آزمایشی در این شرکت کار کردم\r\nبعد از اتمام یک ماه با اینکه تمام تسک ها انجام شده بود و فایل ها تحویل داده شد با نارضایتی اقای قهرود مواجه شدم و بیرون اومدم\r\nبعد از حدود دوهفته تسویه حساب من انجام نشد\r\nبعد از پیگیری گفتند که شما اینجا مطالباتی ندارید\r\nاز پرسنل و کارکنانش نگم که آدمای به شدت غیر حرفه ای و حسودی داره\r\nجوری که بعد از اینکه از اون شرکت بیای بیرون همچنان سنگ میندازن بهت\r\n\r\nخلاصه که کار کردن توی این شرکت میشه یکی از بدترین و بدترین شرکت های که توی رزومته."
