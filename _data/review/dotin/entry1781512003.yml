description: "من چند سال هست در این شرکت مشغول به کار هستم ، نمیخوام بگم اینجا نیاید اما مشکلات شرکت رو که به چشمم اومده میگم تصمیم با خودتون ...\r\n\r\nاگه دوست دارید در یک شرکت که داره برای نهاد های بالا دستی پولشویی میکنه کار کنید بنظرم داتین از بهترین شرکت های پولشویی ایران هست .\r\nبه جز ویپاد ، هیچ پروژه ای قرار نیست به نتیجه برسه . اما حقوق شما رو سر وقت پرداخت میکنند .\r\n این شرکت پر است از مدیران نالایق که فقط میخوان کمبود های خودشون رو در اینجا پر کنند \r\nبعد از هک شدن سپه و پاسارگاد  ، اکثر شرکت ها همکاریشون رو متوقف کردن با اینجا و  دیگه داتین نتونست کمر راست کنه و مشکلات مالی کم کم داره بروز میکنه  \r\nاز نظر فنی هم بسیار ضعیف هستند  ( تمام نیرو های فنی که به حد خوب میرسند اینجا رو ترک میکنند)\r\nیه نکته ای هم بگم برای دوستانی که جاوا کار هستند \r\nاینجا اصلا از فریمورک های رایج استفاده نمیکنند  ،با spring و hibernate خدافظی کنید  و مطمئن باشید بعد از داتین اگه بخواید جایی برید باید دوباره وقت بزارید روی این فریمورک ها کار کنید \r\n\r\n\r\n"
