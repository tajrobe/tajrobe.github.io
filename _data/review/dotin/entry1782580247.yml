description: "باسلام بنده چندین سال است که در شرکت داتین مشغول به کار هستم. \r\nیک شرکت بسیار مزخرف با مدیران بی سواد. واقعا بگم مدیران عقده ای و در حد مهدکودک می باشد. امنیت کاری شغلی صفر می باشد. روند کاری در این مجموعه در حد افتضاح می باشد. بنده پروژه نزدیک ویپاد هستم که بدترین بانک ایران است. ما خود کارکنان مجموعه از ویپاد اصلا استفاده نمی کنیم چون خودمون می دونیم چیه\r\nبشدت رانت پولشویی دزدی و حتی سر کاربران را کلاه می گذارد. مدیران مجموعه در حد مدیر مهدکودک می باشد. \r\nرئیس جدید ویپاد اقایان بیاتی و رشیدیان بشدت مدیران ضعیف و بسیار بی بند و باری ازشون موج میزنه فساد، فحشا، شدید . حتی سواد بانکداری هم ندارند. به راحتی ادم ها را حذف می کنند ، بدبخت کارشناسا و کاربرانی که زیر دست این دو نفر هستند"
