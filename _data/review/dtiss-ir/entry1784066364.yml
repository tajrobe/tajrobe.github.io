description: "شرکت تیس تا اواسط سال ۱۴۰۴خوب بود تقریبا .ولی بعد اون تا تونستن حق مارو خوردن.زمان جنگ همه مرخصی هارو سوزوندن ایشالا حرومشون باشه و تاوانشو ببینن تازه کل زمان جنگم بچه های تیس کلا انلاین بودن و پشتیبانی کردن.تنها چیز خوبی که داره تیم اداریشه که دقیق حساب میکنن و خداییشم هوای نیروهای اداریشو دارن و همش حقوقشونو بردن بالا و وام گرفتنو این داستانا.حالا اونا فکر میکنن زرنگن ولی قرارداداشون همه پر از نقص هست و مطمئنن با یه شکایت کوچیک دهنشون سرویسه چون خیلی تخلف دارن .فقط بدرد این میخوره بیای این شرکت ۱سال باشی رزومه جمع کنی و بری .راحت تا الان تو ۱سال خوردی ۲۰نفر ازینجا با رزومشون رفتن جای بهتر .فقط بدرد همین میخوره.کثیف ترین بخششم کسب و کار و رییس ترشیده شون هست.کلا بخش کسب و کارش نیایین اگر برای بخش دیگ خواستن که مربوط به سرپرست کسب و کار نبود برید بد نیست .ولی از اول سال نه دیگ اضاف کار دادن و نه دیگه هیچ چیزی.حتی پک عیدم ندادن .مدیر عامل خوبی داره ولی زیر دستاش خیلی عوضی هستن و چون سر مدیر عاملو شیره میمالن و اونم متوجه نمیشه همیشه کار خودشونو میکنن.عملا مدیر عامل اونجا هیچ نقشی نداره .و این بده واقعا .خداروشکر مدت کمیه از دستشون راحت شدم .البته خبرای دسته اولو بهم میدن همیشه 😂😂😂 تازه حقوقاشونم همیشه دیر میدن .هر ماه باید ۴۰روز کار کنی ولی اونا ۳۰روزشو میدن .تا یکلمه حرف هم میزدی میگفتن هرکی دوس نداره بره.همین الانش ۱۰تا از نیروهای قدیمی باقی ماندش همه رزومه دادن جاهای دیگ و فقط منتظرن یکم مملکت اوکی شه همشون برن .بعدشم انتظار دارن که بعد از کارتم در اختیار این حرومزاده ها باشی .اصلا راجبشون حرف میزنم چندشم میشه .خیلی هارو اذیت کردن و همه نیرو خوباشون الان جاهای دیگ هستن و کلا ۴تا نیرو خوب دارن که اوناهم فقط جای دیگ پیدا کنن با ۲میلیون بالاتر میرن .از قصد اولشم پایه حقوق کم میدن .الان کسی بخواد وارد تیس شه حقوقش نهایتا ۳۰تومنه.تازه بچه هایی که از قبل چند سال بودن الان انقدر میگیرن .با سند و مدرک میگم .من باهاشون حسابی کار دارم بزار سفته خودمو بگیرم فقط "
