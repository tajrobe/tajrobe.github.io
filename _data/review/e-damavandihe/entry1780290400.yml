description: "اقا این دانشگاه اصلا و ابدا تعریفی نداره نیاین اینجا فقط وقت وعمرتون تلف میشه.\r\nهردانشگاهی از اینجا بهتر.\r\nدی ماه۱۴۰۴ که بخاطر شرایط همه دانشگاهای ایران تاکید میکنم همه دانشگاهای ایران مجازی امتحان دادن دانشگاه ارشاد تو این شرایط دانشجوهاشو مجبور کرد حضوری امتحان بدیم .همش تقصیر مدیر اموزش اقا .ی ت هست. هیچ امکاناتی نداره .اگه پاییین ترین معدلو میخواید بیاید اینجا.\r\nتو جنگ اسفند ماهم . چون اصلا ابدا مدیریت درست ندارن کلاسای اسفند ماهو کلا تشکیل ندادن مثلا فک کردن چند روزه تموم میشه ولی جنگ ادامه داشت ، دیگه از15فروردین اولین روز کلاسمون شد ویه ماهه اسفند وقتمون تلف شد. وامتحاناتو انداخت ۱۷ تیر وکل تابستون و وقتمونو تلف کردن.\r\nهمش بدلیل مدیریت نادرست اموزش هست.\r\nما مجازی درس خوندیم ولی امتحان میانترممون حضوری شد درصورتی که کل کشور مجازی هستن.\r\nروح وروانتونو بهم میزنن اینجا ،اولش گفتن امتحانات مجازی الان که اخر کلاساس میگن حضوری هست .\r\nالان که کل دانشگاها مجازی امتحان دادن ومعدلشون خوب شده ما حضوری امتحان دادیم ومعدلمون داغون شده.\r\nخیلی دانشگاه بیخودی هست. کسی نبود به من بگه وگرنه پامو اینجا نمیزاشتم\r\nاساتید اکثرا پیر بالا۶۰ سال واصلا نمیفهمی چیمیگن اساتیدش دانا هستن ولی خیلی پیرن بنظرم باز نشست بشن بهتره.\r\nاساتبد جوون هم داره ولی کم.\r\nولی اصلا دانشگاه تعریفی نداره آزاد بهتره شهریش تغریبا یکی هست با آزاد .\r\nدانشگاهی برین که باروانتون بازی نشه\r\nاساتید اصلا برگه رو تصحیح نمیکنن ویه نمره پایین از خودشون میدن.\r\nتو امتحاناتم مراقبا ازبس دورت میچرخن تا عصبی بشی نتونی امتحان بدی\r\n"
