description: "مطالبی که در ادامه بیان می‌شود، صرفاً در راستای انجام وظیفه و از سر احساس مسئولیت به‌منظور اطلاع‌رسانی درباره واقعیت‌های رخ‌داده و آنچه عملاً اتفاق افتاده است، ارائه می‌گردد....\r\nهدف از بیان مطالب حاضر، صرفاً انعکاس واقعیت‌های موجود و اطلاع‌رسانی درباره وقایع رخ‌داده، بدون هرگونه اغراض شخصی، است....\r\n\r\nشرکت دوار صنعت سپنتا\r\nواقع در پایین تر از میدان ونک- برج خورشید\r\n\r\nهمه چی از تاریخ 20 اردیبهشت ماه 1405 (2585) شروع شد، من رزومه از طریق سایت جاب این جاب برای این شرکت فرستادم و یه عصری هماهنگ شد برم برای مصاحبه...\r\nدر ابتدا یه محیط خوب و اوکی بود، یه خانم بودند که مسئول مشاوره مالیاتی و یه جورایی هم مدیر مالی...... از من یک سری سوالات پرسیدند و منم صادقانه پاسخ دادم ... و ایشون یه سری توضیحات دادند درباره روند کاری و شرکت.... اینکه دو دفتره هستند و خیلی خیلی خیلی خیلی نیروی حسابداری اومده و رفته ( به نقل از ایشان: اکثرا می اومدند شو بازی می کردند و خاله زنک بازی و...) کلیییی سند مونده که باید ثبت بشه چه رسمی ها و چه غیر رسمی ها...... منم گفتم مشکلی نیست من کلا تو زمینه رسمی زیاد کار کردم و از صفر تا صد رو میتونم ( به قول معروف از پی سازی شروع کنم تا استخوان بندی شکل بدیم و..) فقط رسمی رو گفتم\r\nخانمه از این صحبت من استقبال کرد و گفت از فردا (21 ام - ساعت 8.30) بیا شروع به کار\r\n\r\nروز 21ام : من سر ساعت 8.30 رسیدم شرکت ، و یکم صبحانه ای و چایی بخورم شد حوالی ساعت 9 ، یه خانم محترم که حسابدار ارشد بودند، اومدند احوال پرسی و ارائه توضیحات لازم در خصوص نحوه انجام کار ها وسیستم حسابداری که به شکل هست و............\r\nدر ابتدا سند تنخواه رو داند من بزنم و یه چند دقیقه ای که من درگیر سند زدن بودم، ازشون پرسیدم : شما راضی هستید؟ خودتون چند وقته اینجا هسیتد و..........\r\nکه بهم گفت : من امروز روز آخرمه که اینجام.......://// من نزدیک به 2 هفته اینجا بودم و دارم میرم\r\nیکم جا خوردم اولش وگفتم معمولا همه یه هفته ای یا نهایت ی ماهه میرن .... چرا 2 هفته حالا؟؟؟\r\nشروع کردیم به صحبت یکم راجب شرکت و مدیریت و گفت از اوکی هستی بعد از شرکت بیشتر راجبش صحبت کنیم\r\n( شایان به ذکر است: از تایم های استراحت و ناهار و.... صرف نظر میکنم و بیشتر به مطالب مهم می پردازم)\r\nحوالی ساعت 17.30 شد ، رفتیم بیرون از شرکت و مفصل و کامل راجب شرکت صحبت کردیم\r\nمدیر عامل یه آقایی هست به اسم امیر فرا....ز...مند بکه به شــــــــــــــــــــــــدت بی شخصیت و اصلا حیف صد حیف که کلمه مهندس برای ایشون به کار بره\r\nاصلا چیزی به نام شعور، منطق، درک، فهم و از همه مهم تر وجدان نداره و نخواهد هم داشت ( جلوتر اشاره میکنم دوباره)\r\nاین آقا کلا هیزه و توی یه شرکت که همه پرسنل خانم هستند ( مخصوصا قسمت فروش) قفلی و 24 ساعته روی دوربینه\r\nتک تک رفتار و اعمال و حـــــــــــتــــــــــــی شنود میکنه صحبت های کارکنان رو..........\r\nیه لحظه در حد یه استراحتی یا تعارف خوراکی بری پیش بچه های فروش، طوری تخریب شخصیتت میکنه که قابل بیان نیست\r\nبعد جلوتر ، میاد بالا سرت مثلا داری سند مثلا تنخواه میزنی یهووووو میاد تو با یه فاکتور فروش بدوووو بدوووو\r\nبرو مودیان بدوووو اینو بزننن بدووو بدووووو برو جامع تجارت خروج کالا بزن بدوو بدووووو اینو پرینت بگیر\r\nاصلا انگار ن اتگار داری کاری انجام میدی و............ بعد اگه حرفی بزنی مثلا بگی آقا من الان درگیرم حالا یه چند دقیقه بعد میشه لطفاً شروع میکنه به حرف زدن برو بابا کار چیه عرضه نداری همزمان کاراتو مدیریت کنی فلان\r\nمن میگم یعنی همین الان . بحث نکن با من.........\r\nبعدش گفت ساعت کاری تا 17 هست ، یه وقتایی مثلا مثال بالا کارهای بین مریضی میاد و شاید نرسی به کارهای جاری برسی ، میاد میگه به من اصلا ربطی نداره کاراتو بکن بعد برو اضافه کاری هم اصلا بهت نمیدم من دارم بهت حقوق میدم که کارامو درست و به موقع بزنی .. مشکل خودته که نمی تونی مدیریت کنی بشین انجام بده بعد برو\r\nبعد در آخرگفت: پول درسته مهمه و الان هم دوران سختیه واقعا ولی همین که اوضاع سخته این آدم هم داره روح و روانتو میریزه بهم و اصلا آرامش و امنیت شغلی واقعا نداری.... من سر همین بود 2 هفته بیشتر نتونستم تحمل کنم ، قبل از تو ( منظورش من تازه وارد) خیلی ها اومدن 2 روزه، 3 روزه، یه هفته ای.... حتی یه روز کامل هم نموندن\r\nاین آدم ( مدیرعامل) رفتار غیر منطقیش خــــیـــــــلــــــــــی بیشتر از منطقی که نداره بیشتره\r\nحتی بهم پیشنهاد داد اگه واقعا گرفتاری داری و نیاز به این پول اینجا داری باید اعصاب فولادی داشته باشی ،اما نه دغدغه یا مشکلی نداری واقعا برو و فردا هم نیا........\r\nمنم یه چند ساعتی فکر کردم و جدا از هرچیزی واقعا یه دغدغه ای داشتم و مجبور شدم فردا رو برم ولی گفتم با خودم نهایتا یه هفته آزمایشی میرم بعد تصمیم میگیرم....\r\n\r\n22 ام: شروع به کار کردم و واقعا همه چی به معنای خود واژه \"\"بی در و پیکر\" و \" بل بشو\" و \" شلخته و بی نظم\" دیدم\r\nواقعا راست گفته بود ، رکود گینس داشتند ، نیروی حسابداری میگرفتند و سریع هم اخراج می کردند .....\r\nمنم با اینکه دوست داشتم از پی شروع کنم تا اخرش، آستین بالا زدم و شروع کردم به کار کردند......\r\nاز تهیه زون کن بگیر تا اصلاح سندهای حسابداری (ماهیت های اشتباه) یا اصلا ثبت تو سیستم نشده بود و...\r\nاز شانس بد من هم، اخرای ماه بود باید لیست بیمه و حقوق و مالیات درست میکردم.....\r\nروز دوم کاریم بود که مدیر عامل منوصدا کرد گفت بیا اتاقم، یه قرارداد داد سه ماهه جلو با سفته 200 میلیونی!!!\r\nمنم گفتم اگه اجازه میدید ی هفته آزمایشی فعلا پیش بریم بعد قرارداد و سفته!!!!!\r\nباز با یه لحن بدی گفت نخیررر همه روز اول قرارداد و سفته میگیرم ازشون و توی قرارداد هم نوشتم هفت تا ده روز آزمایشی...\r\nخلاصه به زور اینا از من سفته وقرارداد گرفت، منم ازشون عکسی گرفتم و رسید سفته هم ازش گرفتم\r\nفرداش:: وسط کار بودم که یهو دروباز کرد...خببببب چییییکار میکنی.....؟؟؟؟ ها بگو ببینم\r\nگفتم دارم سندهای دریافت و پرداخت رو ثبت میکنم... گفت ولش کن برو سامانه مودیان بدو بدو کد بگیر دوو بدو برو اینارو رد کن بدوو می خواهم پول ازشون بگیرم بدووو\r\nمنم یه سری فاکتور ازش گرفتم رفتم قسمت فروش که یکم راهنمایی و سوال ازشون بپرسم،\r\nصدام کرد ، بیااااا ااینجا .... برو پشت میزت اصلا هم بیرون نیااااا. اصلا با بچهای فروش باهاشون ارتباط نگیر\r\nکاری هم داشتی اونا باید بیان اتاقت ( بعد شروع کرد به غیبت کردن و پشت سر همکارا حرف زدن، حتی از نفرات قبلی هم شروع کرد به حرفای بد راجبشون زدند ..... کلا همه بد عالم فقط این یوسف پیامبره)\r\nیه هفته این طورا گذشت، بنا به درخواست مدیرم، گفت کارای ارزش افزوده داریم و بهم کمک کن ، اضافه کاریت هم بهت میدم\r\nمنم چون مدیرم منو تایید کرد و بهم یک سری کارا سپرده بود به خاطر ایشون موندم ، حتی تا 10 شب و 11 شب موندم به مدت 3 روز.. که به ایشون کمک کن و کارا خوب پیش بره ( از همون اول هم هدفم هم همین بود)\r\nاخرای ماه شد، متاسفانه سر بیمه به یک مشکلی برخودم که جدید بود برای من، برای کارفرما که بیمه رد میکردم هی ارور بازدادند میداد و نیمشد بیمه رو رد کنم......\r\nمدیر عامل هم بهم گفت : من نمیفهم چیه اگه جریمه بشم از حقوق تو هشو کم میکنم :/\r\nهرچه قدر هم بهش توضیح دادم اصلا انگار ( آب توی هاون کوبیدن بود) تو گوش خر یاسین خوندن بود....\r\nسر همین موضوع من 3روز پشت سرهم تا پنج شنبه هم مدام میرفتم شعبه تامین اجتماعی....\r\n( از بس گاو پیشونی سفید بود اون شرکتته، هرکی میرفتم پیشش میگفت: الان اومدی؟؟ این همه ما نامه پیام زنگ اخطاریه فلان که مشکل داره کد بیمه کارفرما به مشکل برمیخورید ... الان آخر ماهی یادتون افتاده بیان....) حتما باید جریمه بشید تا متوجه بشید........ خلاصه با هزاران راه و خوش زبانی و خوش برخوردی درست کردم مشکل رو....\r\nتوی همین اوضاع که من خودم تکی کارامو میکردم، یه نفر آقا هم که حسابدار ارشد به جمع اضافه شد.\r\nطرف اصلا بلد نبود حتی با سپیدار کار کنه..... ( من هم کلا آدمی هستم دوست دارم یادبدم اگه چیزی بلد باشم)\r\nبهشون آموزش دادم برنامه رو .... مودیان هم تا حدودی بهشون توضیح دادم......\r\nیهو وسط های کار دیدم ، داره کارهای منو انجام میده!! گفتم حقوق و دستمزدها باید اصلاح بشه سندشون.....\r\nآخرای ساعت کاری بود مدیر عامل صدام کرد گفت بیا: من ازت می خواهم ( 4تا کارتن موز) تو سندهایی غیررسمی هست که باید توی هلو ثبت بشه........\r\nاز امروز کارهای غیررسمی انجام بده .... اون آقای حسابدار ارشد هم کارهای رسمی.\r\nمن با نهایت احترام و کمال ادب گفتم: من روزی که اومدم برای مصاحبه گفتم فقط تجربه رسمی دارم و تحصیلاتم و حرفه هم فقط برای امور رسمی و قانونی هست ولــــــــی اگه چیزیه باز با مدیر مالی یه صحبتی بکنید.... گفت باشه.... حالا بعدا صبحت میکنیم.((( یادتون باشه فقط)))\r\n\r\n2 خرداد: من طبق اصول خودم همیشه اول و دوم هر ماه تایم شیت درمیارم، لیست حقوق و دستمزد آماده میکنم، مرخصی ، مامویت رو با پرسنل و تایم شیت هاشونو باهاشون چک میکردم ... همه رو حاضر و اماده می کردم و برای مدیرم فرستادم که تایید کنه...... ایشون واقعا با اون همه مشغله و حجم کاری ، لیست های منو بررسی و چک میکرد و تماس میگرفت بدم به مدیرعامل که واریزی هاشو انجام بده ( اخر هفته هم تعطیل بود بچها شارژ بشن)\r\nدادم به مدیر عامل، گفت الان نه بعدا، کارهای مودیان رو انجام ، خروج هارو بزن( کلا گیرش رو مودیان بود فقط)\r\nمدیرم تماس گرفت که برم مالیات پیش ممیز یه سری نامه اینا هست باهاشون هماهنگ کنم و انجام بدم\r\nمنم تا ظهر درگیر مالیات بودم\r\nروز آخر 5 خرداد: همه کارامو انجام دادم، لیست حقوق رو مجدد دادم به مدیرعامل،\r\nداشتم کارهای روز شنبه رو از الان اماده میکردم ( فهمیده بودم سال 1404 برای یک ماه کامل، بیمه پرسنل رد نشده بود- می خواستم پیگیری کنم اونو برای شنبه) حوالی بعد از ظهر بود به همه پرسنل مبلغ علی الحساب واریز شد جزء من\r\nساعت 17 شد و من میخواستم برم، دوباره مدیرعامل صدام کرد گفت بیا:\r\nرفتم پیشش گفت من یه نیروی کمک حسابدار گرفتم از شنبه میاد، تو توی رزومت گفتی غیررسمی بلد نیستی ( سریع گفتم خیر اینو نگفتم، گفتم انجامش نمیدم – من همه درس وقانون و تجربه ای که دارم سر رسمی هست ولی نگفتم انجام نمیدم)\r\nگفت خب من به دردم نمیخوره من یکیو می خواهم هرچی من بگم باید بگه چشم، انجام میدم، من دارم بهت حقوق میدم من دارم بهت نون میدم من مدیرتم من همه کاره ام\r\nگفت از شنبه نیا دیگه ، الان هم میگم تسویه اتو انجام بدن برو به سلامت\r\nمنم گفت عزیز ببخشید قرارداد دارم 3 ماهه!!! گفت نه دیگه توش 7 تا 10 روز آزمایشیه، گفت اره قبول ولی فکر نمیکنید از 10 روز هم بیشتر گذشت ( طرف 30 روز مهلت داده بود، روز 31 ام حمله کرد)\r\nگفت نه ازمایشی بود همش....\r\nمنم گفتم لااقل قبلش میگفتید اخه 5 روز گذشته الان میگید، چرا قبلش اخطاری یا چیزی نگفتی؟؟؟\r\nگفت من کمک حسابدارمو امروز گرفتم\r\nمنم بلند شدم درو محکم بستم رفتم بیرون از اون شرکت\r\nبعد در اولین فرصت اقدام کردم به شکایت ازش کردم......\r\nبعدا هرجا رفتم پرسیدم ( منظورم اداره کار) گفت اصلا همین که گفت غیررسمی انجام بده و تو انجام ندادی، غیر قانونی و غیر موجه قانونی تورو اخراج کرده.... بعد تو 3 ماه قرارداد داری ازش ...\r\nدر کل خواستم بگم با اینکه کوتاه مدت ترین تجربه کاری من بود، من تنها هدفی که داشتم درست کردن کارها بود و انجام صحیح مسئولیتی که در اختیارم بود ( با اینکه تک نفره بودم ولی قد یه تیم نهایت تلاش و کوششمو گذاشتم)\r\nدوم، هوای پرسنل رو داشتن ، پیگیر پورسانت هاشون، واریزی به موقع حقوق ، حق و حقوقشون، کمک کردن کاری و حتی این اخری که یک ماه بیمه براشون رد نشده بود میخواستم براشون یه اقدامی انجام بدم ........\r\nولی همین روز آخری اون مبلغ علی الحساب براشون واریز شد و من توستم اون بت ای که داشت رو بشکونم، همین همه خوشحال شدند و لبخند اومد رو لبشون، آخرهفته اشون رو با خوشی شروع بشه ، برای من قد همه چی ارزشمند بود.\r\n\r\nشرکت دوار صنعت سپنتا\r\nواقع در پایین تر از میدان ونک- برج خورشید"
