description: "جلسه اول مصاحبه، مدیر فنی، مدیر ای تی، کارشناس منابع انسانی همزمان حضور داشتند\r\nقبل از مصاحبه هیچ برگه ای برای پر کردن قرار ندادند و رزومه برایشان کافی بود\r\nگفتند که کار شما به صورت چرخشی در شهر پردیس و مرزداران و ونک است و یکجا ثابت نیستید.\r\nدر آگهی استخدام ذکر شده که سرویس رفت و آمد وجود دارد در صورتی که در مصاحبه گفتند این مورد همیشگی نیست!\r\nمصاحبه در کل بسیار راحت بود ولی بیشتر شبیه به بازجویی و استخراج اطلاعات در مورد شرکت های قبلی ای که کار کردم بود!\r\nمدیر آی تی بیشتر سوالاتی که میپرسید که در مورد استخراج اطلاعات در مورد شرکت های قبلی بود تا سوال در مورد دانش و سواد کارجو.\r\n\r\n نظر شخصی: \r\nشخصیت مدیر آی تی: خنده های سرد، بازجو، استخراج کننده اطلاعات در مورد تجهیزات و اطلاعات و بودجه ها از شرکت های قبلی ای که کار کردید، و بسیار و بسیار سوالات فنی کمی پرسیدند و عملا شاید ۱۰ درصد از کل مصاحبه فنی صحبت کردند.\r\n‌\r\nشخصیت مدیرعامل: از اول تا اخر سرشون داخل گوشی بود و باز هم ایشان در مورد بودجه ی شرکت های قبلی ای که کار کردم سوال کردند!\r\n‌\r\nشخصیت نیرو انسانی: گرم و حرفه ای و مطابق به شغل کاریشان بود."
