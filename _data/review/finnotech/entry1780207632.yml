description: "هر دم از این باغ بری می‌رسد.  \r\nمدیرعامل پشت مدیرعامل عوض شده و نظم و نظام شرکت هم به‌هم ریخته است. از مدیرها و معاون‌هایش هم که هرکدام داستانی دارند. از معاون فروش گرفته تا مدیر فروش و مدیرهای مالی.\r\nاین دو مدیر مالی اخیر واقعاً عجیب بودند؛ هم آقای پ و هم آقای م. این آخری هم یک نیروی جدید آورده با عنوان کارشناس ارشد و سرپرست. پیشرفت‌ها هم که یک‌شبه اتفاق می‌افتد. هر کاری هم از واحد ما به سمت او رفته، گفته: «به من ربطی ندارد» یا «با من نیست».\r\nصدایش هم آن‌قدر بلند است و لحن حرف زدنش را هم بلد نیست که آدم می‌ماند این فرد از کجا آمده است. جالب اینجاست که آن داستان‌های مربوط به مشکلات اخلاقی که قبلاً در واحد محصول وجود داشت، حالا دقیقاً بین مدیر و کارشناس ارشد مالی در حال تکرار است. واقعاً جای تأسف دارد.\r\nفینوتک شرکت خوبی بود و البته می‌تواند دوباره هم باشد. فقط باید حواسشان به این آدم‌ها باشد. ما که رفتیم، و امیدوارم واقعاً مدیرعامل جدید یک کاری بکند؛ هم جلوی این رفتارها را بگیرد، هم به‌جای اینکه مزایای بچه‌ها را قطع کند، مسئله‌های اصلی را حل کند."
