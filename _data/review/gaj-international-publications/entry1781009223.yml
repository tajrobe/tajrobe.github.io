description: "من توی فرم استخدام، حقوق پیشنهادی رو یه مقدار بالاتر از وزارت کار نوشته بودم. زمانی که برای مصاحبه رفتم، مدیرمون گفت تو فعلا با حقوق وزارت کار بیا، هر دو ماه سنجیده می‌شی و به حقوقت اضافه می‌شه. باید بگم همه‌ی این حرف‌ها کشک بود و هیچ مبلغی اضافه نشد. اکثر قدیمی‌های این شرکت یا خودشون استعفا دادن و یا پارسال تعدیلشون کردن. جالبه که اسمش اینه ناشر بین‌المللی هستش، ولی نمی‌دونم چرا کسانی رو استخدام می‌کنن که علاوه‌بر اینکه سابقه کار ندارن و حتی دوره‌ی ویراستاری رو هم نگذروندن، حداقل‌ها رو هم نمی‌دونن. طرف اومده نشسته اونجا و حتی نمی‌دونست کلمه‌ی \"تغییر\" یه دونه \"ی\" داره یا دو تا! اگر با پارتی و آشنا برید اونجا نونتون تو روغنه، کار هم نکردید هیچ ایرادی نداره، همکارانتون حمالی شما رو می‌کنن. اگر دوست دارید اونجا بمونید، باید پاچه‌خواری سرپرست رو بکنید و اگر دوست دارید سرپرست بشید، باید با کسانی که به آقای جوکار نزدیک هستن، رابطه‌ی صمیمانه‌ای داشته باشید! جالبه که آقای جوکار گفتند دانشجو استخدام نکنید، ولی مدیران یواشکی با منابع انسانی هماهنگ می‌کنن و راحت روزهای کاری دانشجوها رو تغییر می‌دن. اگر دیدید همکارتون دانشجو هستش و موقع امتحان‌هاش دو ماه دو ماه می‌آد توی واحد درس می‌خونه، حق اعتراض ندارید، چون پارتیش کلفته و شما تنها کاری که باید بکنید، کارهای ایشون رو باید انجام بدید و ایشون حقوق مفتش رو اول ماه بگیره. حرف هم بزنی متهم می‌شی به بهونه آوردن برای از زیر کار در رفتن. فضا پر از زیرآب‌زنی و خاله‌زنک‌بازی هستش؛ جلوت لبخند می‌زنن و پشت سرت صفحه می‌ذارن. کل ساعت کاری حواسشون به بقیه هست و زیر نظر دارنشون و توی کار همه سرک می‌کشن. البته افرادی هم اونجا هستن که واقعا کار می‌کنن و کارشون رو هم درست انجام می‌دن، ولی اون‌ها تبدیل شدن به آدم‌های سردرگم و دلسرد که نه می‌تونن از اونجا برن و نه می‌تونن این وضع رو تحمل کنن. گاج سال گذشته برای سالروز تاسیس شرکت یه مراسم گرفته بود در حد جشن عروسی، با کلی بریز و بپاش. اون مدیری که خارج از کشور بود با ما تماس ویدیویی گرفت و کلی وعده و وعید داد که می‌خوان کارشون رو گسترش بدن و اصلا تعدیل نیرو ندارن، ولی از ماه آبان شروع کردن دونه‌دونه تعدیل کردن و هر دو ماه یه عده رو انداختن بیرون. اگر با پارتی و آشنا وارد اونجا شدید، خوش به حالتون. اما اگر سابقه کار دارید و کارتون رو دوست دارید، وارد همچین جایی نشید. چون اصلا براشون مهم نیست که شما چه کارهایی انجام دادید و کجاها کار کردید. در حد یه نیروی صفر باهاتون برخورد می‌کنن و اگر هم بخواید به قول خودشون کار اضافه انجام بدید، برخورد بدی باهاتون می‌کنن. این رو هم بگم که این سازمان هیچ برنامه‌ی خاصی برای پیشرفت نداره و هر سال یه عنوان جدید به کتاب‌هاش اضافه می‌شه. شش ماه اول سال روزهای جمعه اضافه‌کار اجباری هستش، البته بعضی نورچشی‌ها می‌تونن اکثر اوقات از زیر کار در برن و مسافرت‌هاشون رو مرتب برن. خلاصه که اگر برای وقت و اعصابتون ارزش قائل هستید، پیشنهاد می‌کنم این شرکت رو جزو گزینه‌هاتون نذارید، چون وارد اونجا که بشید، چیزهایی می‌بینید که بعد از دو ماه شما رو تبدیل به یه آدم افسرده و بی‌انگیزه می‌کنه."
