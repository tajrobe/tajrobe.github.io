description: "شرکتی که مدیریت بسیار ضعیف منابع انسانی بسیار بیشعور بی سواد\r\nبه عنوان یک برنامه نویس اونجا سه سال مجبوری کار کردم که یه سالو نیم اول بد نبود بعد از اومدن CTO جدید تازه متوجه شدم که کل شرکت از نظر برنامه ریزی تو دیواره\r\nاین سال اخرم مجبور شدم بمونم چون اضافه کاری با ما بستن نزدیک به 200 میلیون میشد هی گفتن میدیم میدیم و من دیدم وقتم داره اینجا تلف میشه اومدم بیرون اینقد محیط بیخود و بی لولی بود که بیخیال اضافه کاریم شدم\r\nاز نظر فنی تو واحد فنی مشکلات ایناس که از CTO شروع میکنم:\r\nمهمترین مشکل CTO اونجاس که از چندتا شرکت قبلیش اخراج شده ده تا اسم داره یارو ( امیر رضا, اکبر, امیر, قانع , رضاییان ) قشنگ معلومه یارو چی کارس فردی کاملا دروغ گو مبتدی هیچ بویی از برنامه نویسی نبرده و به قول خودش 24 ساله تو حوزه برنامه نویسیه ولی cansel رو اینطوری مینویسه بلد نیست حتی رو کیبور د تایپ کنه با انگشت اشاره اش دونه دونه کلید ها رو میبینه میگرده دنبال کلید ها تا حرف مناسب رو تایپ کنه این نشون میده تاحالا تو زندگیش کیبورد ندیده اومده شده CTO\r\nهمه چی رو از gpt میپرسه و با gpt کد میزنه\r\n1- چون اسکرام بلد نبود و میترسید سوتی هاش گرفته بشه اسکرام رو کلا حذف کرد\r\n2- توی جلسه های پلن همه تیم رو میگفت بیاین حتی بخش دیتا اگر دستش باز بود حتما به بچه های خدماتم میگفت بیاین\r\n3-نمیدونستی باید چی کار کنی چ تسکی داری همه چی رو هوا پخش بود یهو از انبار یکی میومد بالاسر برنامه نویس میگفت فلان کارو بکن\r\n4- هیچ برنامه ریزی وجود نداشت که قراره اصلا چی کار کنیم یهو 4شنبه ساعت 4 میومد میگفت باید تا شنبه این برسه چون جوکار میخواد (حالا جالبه جوکار اصلا روحشم خبر نداره )\r\n\r\nاز امکانات شرکت بگم : هیج امکاناتی نداره خیالتون راحت\r\n1-ناهار نمیده\r\n2- از شهر دوره اگر ماشین نداشته باشی کلا هیچ ماشینی اون سمت نمیره\r\n3-ساعت کاری 1 ساعت از جاهای دیگه بیشتره\r\n4- میگن اضافه کاری نداریم ولی اضافه نگه میدارن تا 5 صبح بعدش پولشو نمیدن( تعطیل کاری و اینا هم که کلا ندارن)\r\n5- تعداد روز های مرخصی از همه جا پایین تره ماهی 16 ساعت\r\n6- هر 3ماه 60 نفر اخراج میکنن\r\n7- شده طرف پشت سیستم نشسته یهو بهش میگن از الان دیگه تعدیلی چون پول نداریم بدیم\r\n8-وام نداره\r\n9-محیط بسیار داغون تو سوله همه میشینین یه محیط پر سر و صدا بدون سیسم هوای درست انگار وسط خیابون نشستی\r\n10- برنامه نوسی رو سیستم خودش ادمین نیست\r\n11- تا یه چیزی برای کار میخوای سرچ کنی یه ویدیو ببینی که ربطی به کار داره میگن چرا یوتوب میبینی\r\n12- 1ساعت تایم ناهاره که اونو از مرخصیتون کم میکنن\r\n\r\n75 نفر بودیم شدیم 12 نفر هرکسی تونست از اون جا فرار کرد"
