description: "من 4 سال و 7 ماه از شهریور 1394 تا اسفند 98 توی اون شرکت بودم \r\nمدیرعامل که مهندس صداش می کنن برنامه نویس با هوشی هست ولی به شدت خودرای ، خودشیفته و بی ادب هست (خودش رو نفر اول IT کشور میدونه) ابتدا که من رفتم مصاحبه ایشون بیش از نیم ساعت منو توی اتاقش منتظر گذاشت که دارم کد میزنم و سرم شلوغه و در حد یک ربع صحبت کرد و از همین حرف هایی که اینجا برای کارآموز ها خوبه و تجربه کسب می کنی به من گفت و من رو فرستاد پایین (ساحتمان شهدای گل)\r\nدر کل بخوام از رفتار های بی ادبی ایشون بگم توی اونه کمتر از 5 سال خیلی زیاده \r\nشرکت هم به شدت خانوادگی اداره میشد و برادر کوچک تر که مدیر داخلی بود از مهندس هم بی ادب تر و لات تر بود\r\nمن قبل از اونجا کار می کردم به صورت حرفه ای ولی ایشون فکر می کرد من کارآموز هستم و حقوق من رو کارآموز بستن در صورتی که از ابتدا من داشتم روی پروداکشن کار می کردم\r\nافراد اگر به خانواده متصل بودن (حتی دوست یکی از برادر ها) بسیار محیط خوبی برای کار داشتن ولی بقیه واقعا اذیت میشدن من یادمه ابتدا که جیرا اورده بودن ، تایم تسک های ما رو هی میاوردن پایین ولی همون تسک رو اگر وابسسته ها میخواستن انجام بدن تایم بالا بهشون میدادن\r\nاین موارد رو هم از مهندس زیاد میشنیدیم \"اینی کاری که انجام دادی کاری نداشت که\" یا \"یکی با نصف حقوق تو هم این کار رو انجام میده\"  یا \"من دارم به شما آموزش میدم که از اینجا رفتید چند برابر حقوق بگیرید\"\r\nزمان ما دستما کاغذی رو به پیشنهاد زن برادر کوچیکه جیره بنده کرده بودن و ماهی یه رول دستمال میدادن دستت :)\r\nمدیران هم فامیل های مهندس بودن و به شدت نا بلد و نا فهم ، یه بار دعوا شده بود بین مدیران (4 تا برادر) من خودم شنیدم مهندس می گفت من پول بیشتر به تو میدم (افزایش حقوق) چرا به مامان میگی :) اونوقت سال 98 من که مدیر 3 تا پروژه بودم کلا 100 هزار تومن افزایش حقوق داشتم و مهندس بهم گفت که شرکت نداره و کمک کن به شرکت جبران میکنیم برات ولی مشخص شد برادر ها حداقل 2 میلیون و وابسته ها حداقل 500 هزار تومن افزایش داشتن و وقتی گفتم جبران کن با داداش دومی که مدیر منابع انسانی هم بود اومدن گفتن تو هر چی داری از ماست و هرکیو بیاریم با نصف حقوق تو کار هات رو انجام میده\r\nپیشرفت اصلا نداره و شما رو ایزوله میکنن که یوقت مشتری ها شما رو نشناسن که بخوان جذب تون کنن \r\nبعد از خروج من از شرکت هم مهندس به پدر من زنگ زد و پشت من کلی صحبت کرد که ایشون آدم بی تعهدی و کار بلد نیست و ول کرده رفته با این وجود که من از 15 بهمن 1398 بهشون گفتم بیاین برای سال بعد صحبت کنیم ولی مهندس میگفت بعد از سال که قرارداد رو دادیم اون موقع اگه صحبتی داشتی با داداش کوچیکه بکن\r\nمن خودم بعد از بیرون اومدن از اونجا مدیر فنی یکی از شرکت هایی که مشتری شون بود بهم گفت من میخواستم جذبت کنم ولی مهندس نذاشت (گردن خودش)\r\nخلاصه بگم مرخصی با حقوق که نداره بدون حقوق هم بخوای بگیری باید هفت خان رد کنی\r\nاگه یادت بره انگشت بزنی آخر ماه دهنت سرویسه\r\nحقوق رو همه گفتن و درست هست واقعا پایین می بندن حتی نسبت به کارآموز\r\nوام و این حرف ها هم در حد پول تو جیبی میدن\r\nاگه با خانواده مشکل داشته باشی لهت می کنن\r\nمدیرعامل به شدت خود رای و خود شیفته هست\r\nمدیران به شدت بی تجربه و بی دانش\r\n"
