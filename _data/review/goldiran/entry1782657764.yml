description: "دوسال در سمت حسابدار در این شرکت مشغول به کار بودم تقسیم وضایف به شدت ناعادلانه است هرچی بیشتر پارتی داشته باشی تو شرکت کارت کمتره .\r\nاکثر کارمندان با سن های بالا و سابقه های بیشتر از ده سال جلوی رشد و پیشرفت کارکنان جدید رو میگیرن و باز زیراب زنی سعی دارن اونارو از میدون به در کنند .\r\nمدیران به شدت بیسواد که در حد یه کارشناس حسابداری علم دارن ولی فقط بخاطر پارتی و سابقه کاری زیاد مدیر شدن یعنی تو گلدیران مدیرانی که پارتی نداشته باشن و به سمت رسیدن خیلی کم و انگشت شمارن .\r\nو در اخر موج تعدیل و بی احترامی که قبل اینکه تعدیلت کنن اصلا اطلاعی نمیدهند و روز اخر کاری میگن از فردا نیا تعدیل شدی و همون لحظه ام دسترسی سیستمتو قطع میکنن که مبادا ضرری بزنی به شرکت و این اوج بی احترامیه به کارمندایی که وقت و انرژیشوو سال ها برای شرکت گزاشتن منابع انسانی به شدت بی ادب که بعد خبر تعدیل تهدید به ندادن تسویه هم میکنند "
