description: "سلام من در این شرکت سه ماه تپنستم دوام بیارم و چقدر اشتباه کردم که همون چند روز اول که رفتارهای زشت مدیر مثلا عامل رو دیدم، به کار قبلیم برنگشتم، اگر میخواید هر مدل توهینی بشنوید، هر لحظه استرس داشته باشید، یه ادم بی سواد و بی خانواده هر مدلی باهاتون خرف بزنه، آخرشم پولتون رو ندن و سفته هم ازتون بگیرن حتما برید گنجینه پاوان یا اسم جدیدشون کیو پی کت\r\nکیوپیکت، حروم خور و خودشیفته و مریض به معنای واقعی، اخه کدوم شرکتی رو دیدی که بعد بیشتر از دو سال نتونسته باشه یه منشی یا مسئول دفتر بگیره و مدام در حال اگهی دادن باشه؟؟؟؟؟ مدام با دوربین و شنود از لحظه ای که وارد شرکت میشید کنترل میشید، همه نیروها موظفن موقع اتمام ساعت کاری با شازده تماس بگیرن و اجاره رفتن بگیرن!!!!اونم معمولا میگه نه بیا کار دارم باهات، میری یکی دو ساعت علافت میکنه و جلوی چشمت به کارای خودش میرسه بعد میگه برو... عقده داره"
