description: "سلام\r\nبخوام راجع به همروش بگم، هم خوبی داره هم بدی ولی وزن بدی هاش خیلی سنگینو رو مخه، اول موسساش المپیادی شریف هستند و همین موضوع باعث شده که نگاه بالا به پایینشون آدم هایی که شریفی نیستند رو خیلی آزار بده.\r\nمدیرعاملش ف.س یه آدم متظاهر به ارزشی بودن و مومن بودن و خوب بودنه که در عمل مثل همه ی مدیرعاملای دیگه ست، فرصت طلب، تمامیت خواه و جاه طلب، در نگاه اول خیلی آدم خوبی به نظر می رسه، عکس پروفایلشم نگاه کنی می بینی یه لبخند ملیح داره که به دل نمیشینه چون فقط تظاهره، به شدت هم دمدمی مزاجه، هر کی بهش یه حرفی بزنه سریع واکنش نشون میده... دوربین های ضبط صدادار هم توی شرکت هست که خود مدیرعامل چکشون می کنه!\r\nموسس بعدی م.خ که فک می کنه آسمون دهن باز کرده و فقط این تو حوزه ی کوبر افتاده زمین، یه درون گرای از خود راضی که اگه به خاطر موسس بودنش نبود (الان سی تی او) هستش، هیچکی یه دقیقه تحملش نمی کرد،\r\nاز بددهنی شون هم که بگم شرکت جو خوبی برای خانم ها نداره و اصلا امنیت گفتاری در شرکت از بالا به پایین حاکم نیست.\r\nشرایط پرداختی شون نسبتا خوبه ولی دهنتو سرویس می کنند انقدر ازت کار می کشن، باقی بچه هاش هم اکثرا شریفی اند و اونا هم آدم های درون گرای منزوی اند و همین نگاه بالا به پایین رو دارند انگار که هر کس تو اون دانشگاه مزخرفه درس نخونده آدم نیست.\r\nمدیر منابع انسانی ش ح.ل یه آدم لاشیه بی تجربه ی متظاهره ارزشی دیگه است که از منابع انسانی فقط تحکم و انضباط رو برداشته، آدم های عجیب غریب هم زیاد توشون پیدا میشه که تمایلات نامتعراف داشته باشند!\r\nاین شرکت خیلی وصله به واسطه ی اعضای هیئت مدیره ش، س.ب عضو هیئت مدیره 10 جاست و قبلا معاون وزیر بوده و با جهرمی هم رفیق فابه، کاسب تحریمه حتی می گن تحریم های اتحادیه اروپای آروان رو هم این برداشته، دلال پروژه جور کنه واسه هم روش میره شرکت ها رو وادار می کنه بیان از همروش سرویس بگیرند.\r\nاون یکی عضو هیئت مدیره شون ش.و یکی از قالتاق های صنعت مخابرات که به واسطه ی پدرش شدیدا وصله، خیلی از سفارشات خاص همروش رو تو دیتاسنترهای مختلف با رانت اوکی می کنه، اتهام کلاه برداری از پروژه ی مشارکت با مخابرات ایران رو هم داره، انقدر رابطه داره که اینترنت بین الملل به خارج از ایران داره، پروژه هایی که به هیچکس نمی تونند بدن رو به این میدن.\r\nکلا با این ارزشی نماها کار کردن اصلا خوب نیست، با آغوش باز می برنت تو شرکت و هیچکی با دل خوش از شرکت نمیاد بیرون،\r\nمن توصیه نمی کنم حتی از نزدیک دفترشون هم رد بشید چون بوی کثافت و رانت و بی شرفی حالتونو بهم می زنه.\r\n"
