description: "پروسه مصاحبه خیلی طولانی بود فرم پر کردم، چند روز بعد تماس گرفتن و تسک فرستادن، بیشتر از سه هفته طول کشید تا بالاخره بررسی کردند و به مصاحبه حضوری و تسک ریویو دعوت شدم. با اینکه تمام سوالات رو درست و کامل جواب داده بودم و جلسه حضوری هم به نظرم خیلی خوب پیش رفته بود، چند روز بعدش ایمیل ریجکت شدن رو دریافت کردم.کاش حداقل تو این دوران سخت کارجوها رو انقدر منتظر نگه ندارند."
