description: "من چند وقتی هست از این شرکت اومدم بیرون خداروشکر\r\nو امیدوارم هر کسی که مونده به زودی بیاد بیرون \r\nاین شرکت فقط برای اشخاصی خوبه که نیاز فوری به درآمد داره ، حاضره هر کاری بکنه که پول دربیاره و توانایی خاصی نداره ، تا حالا تو اجتماع نبوده و اعتماد به نفس هم نداره ، این شرکت هر شخصی با هر میزان دانایی و ... استخدام میکنه .\r\nو ارزشی قائل نیست برای افراد شرکت\r\nبه شخصه زمانی که مشاور بودم دیدم که بالاترین مسئول به مسئول پایین تر گفت حق نداری بشینی باید کامل وایسی تا مشاور ۴۰ بزنه\r\nیعنی میخوام بگم برای مسئولش ارزش قائل نیست چه برسه مشاور ."
