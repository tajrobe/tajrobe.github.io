description: "مسئله اصلی امروز در سطح روسای گروهه. بخشی از این افراد سال‌هاست در یک جایگاه ثابت موندن؛ تجربه دارند، اما این تجربه در خیلی از موارد به نوآوری، تغییر روش کار یا ارتقای واقعی خروجی تبدیل نشده.\r\n نتیجه‌اش این شده که در بعضی واحدها بیشتر با حفظ وضع موجود طرفیم تا مدیریت توسعه‌محور.\r\n\r\nنکته مهم‌تر اینه که در برخی موارد، وقتی خطا یا ضعف در تصمیم‌گیری رخ میده، به‌جای اینکه مسئولیت در سطح مدیریت باقی بمونه، فشار به شکل غیرشفاف به کارشناسا منتقل میشه.\r\n این موضوع باعث میشه کارشناسا دائماً با احتیاط کار کنن\r\nطبیعی هم هست که در چنین فضایی، امنیت روانی تیم آسیب ببینه.\r\n\r\nدر حالی که در صنعت Payment که به‌شدت پویا و وابسته به تغییرات بازار و مقررات بانک مرکزیه، این مدل کارکرد پایدار نداره.\r\n رئیس گروه باید فقط عنوان و سابقه نباشه؛ باید واقعاً از جنس این صنعت باشه، با فضای شاپرک و PSP آشنا باشه، \r\nبازار رو بشناسه و توان هدایت تیم رو داشته باشه.\r\n\r\nبه نظر میاد این سطح مدیریتی نیاز به بازنگری جدی داره؛ هم از نظر شایستگی، هم از نظر عملکرد\r\n و در این بین، استفاده از افراد متخصص و شناخته‌شده در صنعت پرداخت، که تجربه عملی در همین فضا دارن، می‌تونه به بهبود کیفیت تصمیم‌گیری و کاهش فشار روی کارشناسا کمک کنه."
