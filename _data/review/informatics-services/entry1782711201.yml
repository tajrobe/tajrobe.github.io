description: "داشتم کامنت‌های این صفحه رو می‌خوندم، واقعاً بعضی‌ها خیلی درست به موضوع اشاره کرده بودن.\r\nسال‌ها کار کردن توی یه شرکت اصلاً چیز بدی نیست؛ اتفاقاً می‌تونه یه نقطه قوت باشه. اما به یه شرط؛ اینکه حواست به بازار باشه، همیشه در حال یاد گرفتن باشی، تکنولوژی‌های جدید رو وارد کارت کنی و روی توسعه فردی خودت سرمایه‌گذاری کنی.\r\nاین روزها نوآوری حرف اول رو توی هر صنعتی می‌زنه. اگه فقط سال‌ها توی یه شرکت مثل یه ماشین کار کنی؛ صبح روشن بشی و آخر وقت خاموش، کم‌کم از تغییرات دنیا عقب می‌مونی. اون موقع هم وقتی تهدیدهای جدید، مثل حملات سایبری، پیش میاد، سازمان آمادگی لازم برای مواجهه با اون‌ها رو نداره و آسیب‌پذیرتر میشه.\r\nحالا اگر خودت هم نمی‌خوای با این مسیر جلو بری، حداقل جلوی پیشرفت نیروی جدید رو نگیر. از ترس اینکه یه روز جای تو رو بگیره، فرصت رشدش رو ازش نگیر.\r\nبهش بها بده، راضیش نگه دار، بهش اعتماد کن و اجازه بده توانایی‌هاش رو نشون بده.\r\nیادت باشه؛ اعتماد به نیروی جدید، در واقع اعتماد شرکت به توئه. وقتی سازمان مسئولیت هدایت و توسعه یک نفر رو به تو می‌سپاره، یعنی به دانش، تجربه و قضاوتت اعتماد کرده. حفظ این اعتماد، ارزشمندتر از حفظ جایگاه با جلوگیری از رشد دیگرانه.\r\nو مهم‌تر از همه، این نگاه نباید محدود به یک مدیر یا یک واحد باشه. اعتماد به نیروهای جدید و فراهم کردن بستر رشد اون‌ها باید به یک فرهنگ در کل سازمان تبدیل بشه؛ فرهنگی که در همه سطوح ساری و جاری باشه. سازمانی که به سرمایه انسانی خودش اعتماد می‌کنه، یاد می‌گیره، نوآوری می‌کنه و آینده رو می‌سازه."
