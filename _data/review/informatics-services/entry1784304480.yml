description: "برای مصاحبه رفتم و با اینکه کلا ۱ ساعت تو محیط بودم ولی با خوندن کامنت بقیه میتونم تایید کنم سعی کردن جو حاکم رو مشابه دولتیا کنن یعنی کار رو بزرگ جلوه بدن خودشونو برتر نشون بدن ولی در اصل ملوم نیست کی داره چکار میکنه یا اصلا کسی کار میکنه یا نه بیشتر تو نقش دولتی ها فرو رفتن فکر میکنن آسمون باز شده این ها افتادن بقیه بیسوادو ناچیزن ولی برعکسه معمولا این جو ها کاملا سمی هستن \r\nحداقل ۳-۴ ماه طول میکشه تا وضعیت مصاحبه یک نفر مشخص بشه نمیگن یه نفر ممکنه فرصت های بعدیو از دست بده اخرم شاید تایید بشه شاید نشه این اداها و مدل کار کردن اصلا تو شرکت خصوصی قابل قبول نیست و پدر منابع انسانیو در میارن ولی اچ ار اینجا هتله انگار کار نمیکنن اصلا نمیدونم چه مدلی کار میکنن عجیبه "
