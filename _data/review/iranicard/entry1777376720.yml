description: "تجربه کاری من در شرکت ایرانیکارت ترکیبی از نکات مثبت محدود و چالش‌های جدی بود که فکر می‌کنم دانستنش برای افرادی که قصد همکاری دارند مفید باشد.\r\n\r\nاز نظر نکات مثبت، محل شرکت از لحاظ دسترسی با وسایل نقلیه عمومی شرایط بسیار خوبی دارد و رفت‌وآمد برای کسانی که از حمل‌ونقل عمومی استفاده می‌کنند راحت است. همچنین فضای همکاران را می‌توان نقطه قوت اصلی مجموعه دانست؛ همکاران عموماً همراه، محترم و دوست‌داشتنی هستند و این موضوع تا حدی فشارهای کاری را قابل تحمل‌تر می‌کند.\r\n\r\nاما در مقابل، چالش‌ها و نقاط ضعف قابل توجهی وجود دارد. مهم‌ترین مسئله، حقوق پایین نسبت به حجم و حساسیت کار است. در برخی دپارتمان‌های عملیاتی، ریسک کاری بالاست؛ به این صورت که شما حقوق را به ریال دریافت می‌کنید اما در صورت بروز خطا ممکن است مجبور به جبران خسارت دلاری شوید، که این موضوع فشار زیادی ایجاد می‌کند.\r\n\r\nساعت کاری نیز از دیگر مشکلات است؛ زمان ورود مشخص است اما زمان خروج عملاً نامشخص بوده و می‌تواند طولانی شود. همچنین زمان پرداخت حقوق و مزایا شفاف نیست و این موضوع باعث ایجاد بی‌نظمی در برنامه‌ریزی مالی کارکنان می‌شود.\r\n\r\nمزایا نیز وضعیت مشخص و قابل اعتمادی ندارند. مواردی که در زمان استخدام اعلام می‌شود، در بسیاری از موارد به شکل وعده باقی می‌ماند. از طرفی، امکان پیشرفت شغلی در شرکت بسیار محدود است و مسیر رشد روشنی برای کارکنان وجود ندارد.\r\n\r\nبرای افرادی که با خودروی شخصی رفت‌وآمد می‌کنند، نبود جای پارک یک چالش جدی است. همچنین واحد منابع انسانی انعطاف‌پذیری لازم را در مواجهه با مسائل و درخواست‌های کارکنان ندارد.\r\n\r\nدر سطح مدیریتی نیز چالش‌های قابل توجهی وجود دارد. به نظر می‌رسد بسیاری از مدیران از دانش تخصصی و مهارت‌های مدیریتی کافی برخوردار نیستند و انتصاب آن‌ها بیش از آنکه بر پایه شایستگی حرفه‌ای باشد، بر اساس ارتباطات شکل گرفته است. این موضوع تأثیر مستقیمی بر کیفیت تصمیم‌گیری‌ها و فضای کاری گذاشته است.\r\n\r\nدر خصوص مزایا:\r\n\r\nوام عملاً وجود خارجی ندارد\r\nبیمه تکمیلی هزینه بالایی دارد اما پوشش آن نسبت به بسیاری از شرکت‌ها ضعیف‌تر است\r\nحمایت از آموزش و توسعه فردی وجود ندارد و دوره‌های آموزشی محدود به مدیران و آن هم صرفاً در راستای نیازهای داخلی شرکت است\r\nتسهیلات رفاهی و گردشگری بسیار محدود (در حد حدود ۱ میلیون تومان در سال و آن هم معمولاً به شکل بن با کاربرد محدود)\r\nامکاناتی مثل کتابخانه عملاً کاربرد خاصی ندارند، چون زمان استراحت کوتاه است و بیشتر صرف صرف غذا می‌شود\r\nهدایای مناسبتی نیز بسیار محدود و ناچیز هستند\r\n\r\nدر مجموع، با توجه به درآمد بالای شرکت، سطح خدمات و مزایای ارائه‌شده به کارکنان تناسب چندانی با این درآمد ندارد و این موضوع یکی از نکات قابل تأمل در مورد این مجموعه است."
