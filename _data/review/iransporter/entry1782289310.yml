description: "این مجموعه در گذشته فضای بهتری داشت، اما به مرور زمان محیط کاری به‌شدت فرسایشی و سمی شد. استخدام برخی نیروها با رویکرد رقابت ناسالم و حاشیه‌سازی باعث شده که تنش و اختلاف به بخشی از فضای روزمره تبدیل بشه. مدیر مجموعه فرد بدی نیست، اما متأسفانه به حواشی توجه زیادی داره و همین موضوع به تداوم برخی مشکلات دامن می‌زند. انتقال حرف‌ها بین افراد و شکل‌گیری فضای پشت‌سرگویی در سازمان بسیار رایجه.\r\n\r\nمجموعه از نظر نظم، فرآیندها و شفافیت مدیریتی با چالش‌های جدی روبه‌روست. در بسیاری از موارد، تصمیم‌ها در سطوح بالاتر گرفته می‌شود اما مسئولیت نتیجه و پاسخگویی آن بر عهده نیروهای اجرایی قرار می‌گیرد. بخش فروش نیز از نظر ساختار و فرآیندها پراکندگی و بی‌نظمی زیادی دارد. نرخ خروج نیروها بالا است و این موضوع به‌خودی‌خود نشانه‌ای از وجود مسائل حل‌نشده در سازمان محسوب می‌شود. درست است که روابط دوستانه و خوبی میان برخی همکاران وجود دارد، اما از نظر من این نکته مثبت به‌تنهایی نمی‌تواند مشکلات ساختاری مجموعه را جبران کند. در مجموع، همکاری با این مجموعه را توصیه نمی‌کنم؛ مگر در شرایط خاصی که فرد آگاهانه این چالش‌ها را پذیرفته باشد."
