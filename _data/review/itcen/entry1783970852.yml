description: "بزرگترین اشتباهی که می‌توانید بکنید، اعتماد به حرف‌های زیبا و ظاهر فریبنده مدیریت این شرکت در روز مصاحبه است. آن‌ها در حرف زدن و وعده دادن بی‌نظیرند، اما وقتی وارد سیستم می‌شوید، با یک فاجعه و به معنای واقعی کلمه با “دست بردن در جیب پرسنل” مواجه خواهید شد.\r\n\r\nدر این شرکت هیچ ارزشی برای نیروی انسانی قائل نیستند. حقوق‌ها با تاخیرهای عجیب و چندماهه (حتی تا ۳ ماه) پرداخت می‌شود. حتی بیمه را هم با تاخیر واریز می کنند. ترفند کثیفشان این است که نسخه قرارداد را عمداً به شما نمی‌دهند تا هر زمان که دلشان خواست، به صورت کاملاً سلیقه‌ای و غیرقانونی از حقوق و مزایای شما کسر کنند.\r\n\r\nعلاوه بر مشکلات مالی وحشتناک، انتظار دارند ۲۴ ساعته و در روزهای تعطیل در دسترس باشید و حجم کار نامعقولی را به شما تحمیل می‌کنند. محیط کار به شدت سمی است و مدیرعامل و قائم مقام مدیرعامل کمترین بویی از رفتار حرفه‌ای نبرده و در صورت کوچکترین اعتراضی به حق وو حقوقتان، با درگیری لفظی و بی‌احترامی مواجه می‌شوید.\r\n\r\nاگر برای عمر، اعصاب و تخصص خود ذره‌ای ارزش قائل هستید، فریب ویترین قشنگ و حرف‌های پرزرق‌وبرق این شرکت را نخورید. کار کردن در اینجا یعنی فرسایش روان و دویدن به دنبال بدیهی‌ترین حق و حقوقتان."
