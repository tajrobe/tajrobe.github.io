description: "در خصوص تجربه ی کاری با شرکت ویستا یا همون شرکت به اصطلاح \"دانش بنیان\" فقط می تونم یک کلمه بگم: از این انتخابم بسیار متاسفم. تجربه ای شد برای آینده تا بدون خواندن نظرات یا گرفتن مشورت دیگران با شرکتی کار نکنیم.\r\n\r\nشفاف کنم که سال ها از این ماجرا می گذره و این طوری نیست که من الان عصبانی باشم. آن چه می نویسم عین ماجراییست که بر سر ما گذشت.\r\n\r\nحجم بی کفایتی ها در اون شرکت به اندازه ای بالاست که تا به حال، در هیچ شرکتی ندیده ام. وقت نوشتن کل داستان نیست و من صرفا راس مطالب رو می گم:\r\n\r\n1- قیمت: بین شرکت هایی که ازشون نرخ گرفتیم، این شرکت با اختلاف گران ترین بود.\r\n2- پروژه ی ما در ابتدای کار اصلا درک نشد و کلا چیز دیگه ای به ما تحویل شد.\r\n3- اصلا مشاوره ی درستی داده نشد. وبسایت از ابتدا برنامه نویسی شد. که کار ادیت در آینده رو سخت می کرد. در حالی که بعدها متوجه شدیم می شد در وردپرس هم طراحی بشه با هزینه ی کمتر و با قابلیت ادیت و انعطاف بیشتر\r\n4- تیم هایی که روی پروژه کار می کرند، از مدیر محصول گرفته تا فنی، همه مرتب تغییر کردند و همین مساله پروژه رو طولانی کرد.\r\n5- جایی برای انتقال سابقه ی قبلی به نفر بعدی نبود. یعنی نفر که عوض می شد، ما باید کل پروژه رو از 0 تا 100 مجددا برای دوستان جدید توضیح می دادیم.\r\n6- شرکت، هیچ سر و صاحبی نداشت. یعنی اگر شما ناراضی باشی، هیچ کس نبود که شما بتونی بالاتر از مدیر محصول بهش مراجعه کنی. حتی تماس هم که می گرفتیم با مدیران بالاتر، هیچ کس پاسخ گو نبود.\r\n7- پشتیبانی ضعیف. بعد از انجام پروژه، اصلا کسی نبود که بخواد به مشکلات رسیدگی کنه.\r\n\r\nاین تجربه ی من بود.\r\nاما صلاح کار خویش خسروان دانند...\r\n"
