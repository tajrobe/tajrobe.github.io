description: "این شرکت یکی از شرکت های معتبر در حوزه مخابرات، تلکام و نرم افزار هست. \r\nیک شرکت به روز و مدرن با امکانات و زیرساخت های قوی که فضایی راحت، شاداب و دوستانه رو فراهم کرده اند.\r\nفرهنگ سازمانی خوبی در شرکت برقرار است و هیچگونه سخت گیری و محدودیتی در موارد  عقیدتی و آزادی بیان و پوشش و حجاب ندارند و از این جهت برای خانم ها فضای مطلوبی دارد.\r\nساختار این شرکت به صورت جزیره ای هستش و متشکل از چندتا تیم مختلف هستند. تیم های اصلی این شرکت در حوزه های دفاعی و نظامی فعالیت میکنند و واقعا هم کار های خوبی در این حوزه انجام میدهند و تولیدات مهم و زیادی دارند و افراد قوی و باهوش اونجا فعالیت دارند. \r\nاز نظر حقوق و مزایا فکر نمیکنم هیچ شرکتی تو ایران در حوزه الکترونیک و مخابرات مثل این شرکت حقوق بده و همچنین پاداش های دلاری هر 6 ماه یکبار به کارمند های گروه های نظامی پرداخت میکنند که اعداد بسیار خوبی هستش. در کنار این باید بگم فضایی بسیار رقابتی هم در اینجا حاکم هست. پرداخت حقوق و پاداش دلاری براساس عملکرد و درصد تسهیم و تاثیر گذاری نیرو ها مشخص میشه و از این جهت فضایی رقابتی بین نیرو ها وجود داره تا بتونند تسک ها و کارهای بیشتری رو در دست بگیرند تا در نهایت بتوانند پاداش بیشتری دریافت کنند.\r\nاما در کنار این مزایا چندتا نکته به نظر منفی هم دارند. اینجا فضای رقابتی وجود دارد پس انتظار زیادی از این که برای شما وقت و انرژی بگذارند و بخواهند نیرو تربیت کنند و به شما کار یاد بدهند نداشته باشید. اگر نتوانید خود را تطبیق بدهید و رشد و ارتقای فنی نداشته باشید به تدریج کار ها و مسدولیت ها از شما گرفته میشود و به افراد دیگر واگذار میشود و شما از جا میمونید و از خصوصیات این فضای رقابتی این هست که بقیه همکاران در انتظار فرصت هستند تا کار و مسئولیت شما را بگیرند تا درنهایت در جدول تسهیم و پاداش ارزی جایگاه بالاتری رو کسب کنند. در نتیجه باید بدونید که تو این گروه ها اگر شما خوب کار نکنید و پیشرفت از خودشتون نشون ندید تعارف ندارند و با نیرو قطع همکاری میکنند و نیرو دیگری جایگزین میکنند. از این جهت همیشه به دنبال بهترین ها هستند.\r\nگروه های دیگر این شرکت در حوزه های اینترنت اشیا، امنیت خودرو (وایزر)، مدیریت ناوبری و سلامت فعالیت میکنند که اونجا هم فضای خیلی خوبی وجود داره و محصولات خوبی ساخته اند. اما از نظر حقوق و پاداش خیلی ضعیف تر هستند و به خوبی تیم های نظامی نیستند اما پاداش های ریالی رو 6 ماه پرداخت میکنند.\r\nدر کل ساختار شرکت به این صورت هست که هر تیمی بر اساس عملکرد خودش سطح حقوق و پاداش ها سنجیده میشه و یک جور فضای رقابتی رو شکل میده که میزان پاداش بر اساس عملکرد باشه.\r\nحتی در دوران جنگ با این که کل مدت شرکت تعطیل بود اما تمام حقوق، عیدی و پاداش های ارزی و ریالی نیرو ها پرداخت شد و از این جهت هوای نیرو هارو داشتند.\r\nفعالیت های تفریحی هم به صورت مرتبط دارند مثل اردو های تفریحی سالیانه، برنامه و همایش های سالیانه، پیاده روی، ورزش، کافه و ... و همچنین بسته ها و هدایای مناسبتی که از این جهت به نظرم جز شرکت های خیلی خوب هستند که متاسفانه خیلی تو چشم نبودند و مطرح نشدند در بازار کار و جا دارد واقعا این شرکت بیشتر از این برای کارجو ها شناخته بشود.\r\nمدیران و موسسان اصلی شرکت چندتا از اساتید دانشگاه های شریف و تهران هستند و توانسته اند ارتباط خوبی بین صنعت و دانشگاه برقرار کنند و همواره دانشجو ماهر اساتید رو در گروه های تحقیق و توسعه مشغول به کار میکنند و توانسته اند به واسطه اعتبار و ارتباطاتی که دارند پروژه های خوبی برای شرکت بگیرند و در 4 سال گذشته شرکت تقریبا 2 برابر بزرگتر شده است و دارای 3 ساختمان مختلف هست و نشون میده شرکت موفق و رو به رشدی هستش."
