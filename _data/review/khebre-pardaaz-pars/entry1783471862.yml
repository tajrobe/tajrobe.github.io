description: "مدیرعامل اینجا فکر کرده چون اوضاع اقتصادی خرابه اینم می‌تونه هر غلطی دلش خواست بکنه.\r\nنحوه پرداخت‌شون به این صورت هست که عدد درخواستی شما رو ضربدر ۱۲ می‌کنن تا عدد سالیانه به دست بیاد، سپس عدد سالیانه رو تقسیم بر ۱۶ می‌کنن و هر ماه ۱/۱۶ عدد سالیانه (یعنی ٪۷۵ عدد درخواستی ماهانه!) رو به عنوان حقوق پرداخت می‌کنن و هر سه ماه یک بار هم ۱/۱۶ عدد سالیانه رو به عنوان پاداش پرداخت می‌کنن! اما چون پاداش هست می‌تونن پرداخت نکنن تو این اوضاع و مدیرعامل گفت یا ۱/۱۶ کامل یا کمتر یا بیشتر رو بر اساس عملکرد پرداخت می‌کنیم.\r\nاما بیمه، مالیات، عیدی، و سنوات شما بر اساس همون عدد ٪۷۵ از حقوق درخواستی محاسبه می‌شه که کاملا به ضرر شماست.\r\nچرا باید تو این وضعیت اقتصادی ٪۲۵ حقوق من و امثال من دست شما بمونه و باهاش کاسبی کنید و بعد از سه ماه، پول خودم رو به عنوان پاداش بهم پرداخت کنید؟! تازه اگه پرداخت کنید، چون از اول دنبال بهانه هستید!\r\nمدیرعامل گفت پرداخت عدد اصلی بستگی به محاسبات مالیات داره که این هم یک بهانه هست که هر بار خواستن عدد کمتری پرداخت کنن.\r\nسه نوع قرارداد باهاتون می‌بندن + سفته! یک قرارداد کار باهاتون می‌بندن که قطعا یک‌طرفه خواهد بود. یک قرارداد NDA برای پروژه‌های شرکت. یک قرارداد تعهدات حرفه‌ای که شما باید تعهد بدید تا پایان مدت قرارداد در شرکت می‌مونید!\r\nاگر داستان گروگان‌گیری و بهره‌کشی از نیروی کار نیست چرا این همه تضمین می‌خواید از یه نیروی کار؟ قطعا دنبال سواستفاده هستید، قبلا در گروه ویکی‌تجربه تلگرام خوندم که گفته بودن جوان‌های مردم میرن این شرکت و گرفتار می‌شن.\r\nموقعیت شرکت جنب میدان نیلوفر در سهروردی هست، جای بسیار شلوغ، و داخل کوچه شرکت شما حتی جای پارک موتور پیدا نمی‌کنید. دو طبقه مجزا از هم فکر می‌کنم ۳ و ۵ دارند که شما احتمالا باید بین این طبقات با آسانسوری در رفت‌وآمد باشید که اندازه‌ی تابوت متحرک هست و به سختی ۳ نفر ظرفیت داره.\r\nدوستان عزیز، می‌دونم فشار اقتصادی روی همه‌مون هست، ولی این شرایطی که گفتم اسمش هرچی باشه کار نیست. برای تخصص و اعصاب و روان و وقت و انرژی و انگیزه خودتون احترام قائل باشید و با این مدل آدم‌های مریض و سمی، و شرکت‌های دوزاری کار نکنید."
