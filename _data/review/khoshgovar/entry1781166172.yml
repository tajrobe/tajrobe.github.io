description: "شرکت خوشگوار که خیلی ها اون رو به عنوان نوشیدنی های کوکاکولا میشناسند ،شرکتی هست که منابع انسانی درستی نداره و بهتره بگیم اصلا منابع انسانی ساختار یافته ای نداره.\r\n\r\nمنابع انسانی هر شرکتی ویترین اون شرکت هست وقتی که منابع انسانی این شرکت به خصوص خانم ن.ف که یک فرد کاملا  مشکل دار هست که مشکلات زندگی اش رو کاملا در کار می آورد و زمانی که پر از مشکل هستی ،تو باید توی خونه بشینی ،نه اینکه بیای سرکار و جو کار هم سمی کنی.\r\nبنده به عنوان همکار این خانم ، اصلا کار که انجام نمیده،معلوم نیس با کدوم بند پ اوردن خانم ن .ف را سرکار.\r\nحتی توانایی این که بتونه یک مصاحبه رو ست کنه نداره،همه ساعت ها رو باهم مختل میکنه و در اخر مجبور هست مصاحبه ها را کنسل کنه . \r\nفقط کافی است که مدیر عامل چند تا رزومه با اسامی مختلف بفرسته و روند این خانم مریض رو رصد کنه و متوجه میشه که چرا اگهی های شغلی منجر به جذب نمیشن و یا چرا خروج نیرو بالا هست این خانم مصاحبه میذاره و ۱۰ دقیقه مونده به مصاحبه ،اون رو کنسل میکنه و این کار رو با خیلی از افراد انجام داده،یک بار میگه مرخصی میخوام برم،یک بار میگه الان حالم خوب نیست که مصاحبه انجام بشه.\r\nهر بار به هر دلیلی وقت کارجو رو میگیره و مردم مثل تو بیکار نیستن که برای لحظه به لحظه شون برنامه ریزی دارن\r\nواقعا وقتی منابع انسانی این باشه ،دیگه داخل شرکت رو تصور کنید چقدر منظم هست\r\nو جالبه بعد از ۶ ماه هنوز نتونسته یک نفر رو جذب کنه.\r\nاز همه ما هم بیشتر حقوق میگیره ولی کارایی اش صفر.\r\n"
