description: "ا سلام و احترام\r\nتجربه کار کردن در شرکت مهیا را بازگو می کنم شاید کسایی که در نظر دارند وارد شرکت شوند بکارشون بیاد.\r\nشرکت مهیا برند نسبتا بزرگ است ولی از نظر مدیریت و تصمیم گیری ها در حد و اندازه شرکت با تعداد سه هزارتا نیرو نیست و هیچ اعتباری و تضمینی برای کار کردن برای سه ماه بیشتر دیده نمی شود.\r\nشاید باورکردنی نباشد اخر سال 1404 با نزدیک سه هزار تا نیرو تسویه کردند و مجدد با تعدیل و اخراج نیروهایی که 10 الی 15 سال مشغول بودند مجدد شروع کردند پس هیچ تضمینی برای آینده شغل نداری.\r\nتصمیم گیرنده اصلی خانمی است که متاسفانه در حد و اندازه شرکت نیست و چون شرکت درامد بالا دارد تصمیم گیری هایی می بینید که اصلا باورکردنی نیست . متاسفانه نیروهایی که بعنوان کارمند و کارگر هستند بعنوان برده دیده می شود. و خدا نکنه این فرد با کسی یا واحدی لج کنه بهترین کار خداحافظی با شرکت است .\r\nاگر سایت های کاریابی را جستجو کنید همیشه در حال استخدام هستند چون مثل ابخوردن اخراج می کنه بدون هیچ دلیلی ممکنه اخراج شوی علت اخراج شاید باورکردنی نباشد لج کردن اون خانم با یک واحد میتونه باشه!\r\nمزایا شرکت حقوق بالا برای کسایی که حکم مدیر و رئیس هستند در نظر گرفته می شود.\r\nهدف اصلیم از بازگو کردن تجربه کاری در این شرکت فقط این بود که به هیچ عنوان به اینده شغلی در این شرکت به هیچ عنوان دل نبندید.\r\nهرلحظه می تونی اخراج بشی چه یکسال و چه 20 سال کار کرده باشی.\r\n"
