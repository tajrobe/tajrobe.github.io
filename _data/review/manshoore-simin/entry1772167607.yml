description: "من چند ساله تو این شرکت کار می‌کنم و واقعاً چیزی که تو بعضی کامنت‌ها نوشته شده با تجربه‌ای که من داشتم خیلی فرق داره.\r\nتو این مدت همیشه محیط کار رو دوستانه و محترمانه دیدم و رابطه بین همکارها کاملاً خوب بوده.\r\nمدیریت هم همیشه سعی کرده فضای آروم و منصفانه‌ای برای کار فراهم کنه.\r\nاز نظر حقوق و شرایط کاری هم شخصاً مشکلی نداشتم و همه چیز روال مشخصی داشته.\r\nاز نظر فنی هم اینجا برای من جای پیشرفت و یادگیری بوده و خیلی چیزها یاد گرفتم.\r\nهمکارها معمولاً هوای همدیگه رو دارن و کار تیمی واقعاً معنا داره.\r\nطبیعیه هر کسی ممکنه تجربه متفاوتی داشته باشه، ولی به نظرم درست نیست با یه دلخوری کل مجموعه رو زیر سؤال برد.\r\nمن خودم از کار کردن اینجا راضی بودم و هنوز هم هستم.\r\nبهتره هر کسی بر اساس تجربه واقعی خودش نظر بده.\r\nاین فقط تجربه شخصی چند سال کار من تو این مجموعه‌ست."
