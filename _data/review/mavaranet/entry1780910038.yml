description: "تجربه من از کار تو ماورانت اصلاً تجربه خوبی نبود. حجم کار خیلی بالاست و انتظاراتی که از کارمندا میره، بعضی وقت‌ها واقعاً با زمان و امکاناتی که در اختیارشون هست همخونی نداره.\r\n\r\nاضافه‌کاری عملاً هیچ معنی‌ای نداره. ممکنه بارها تا ۸ یا ۹ شب شرکت بمونی که کارها روی زمین نمونه، اما آخر ماه به خاطر چند دقیقه یا چند ساعت تأخیر، چند میلیون از حقوقت کم بشه\r\n. افرادی رو دیدم که ده‌ها ساعت اضافه‌کاری داشتن ولی به خاطر چند ساعت تأخیر در طول ماه، با کسر حقوق مواجه شدن.\r\n\r\nسیستم کاملاً تسک‌محوره؛ یعنی مهم نیست چه ساعتی میای یا میری، فقط باید حجم مشخصی کار تحویل بدی. اگر حجم کار بیشتر از توان یک نفر باشه هم عملاً باید خودت یه راهی برای جمع کردنش پیدا کنی.\r\n\r\nاز اون طرف همیشه صحبت از مشکلات مالی و کمبود بودجه‌ست، ولی افزایش حقوق خرداد پارسال هنوز پرداخت نشده. بعضی از افرادی هم که از اواخر ۱۴۰۴ از شرکت جدا شدن، مدت‌ها بعد هنوز تسویه نشده بودن و مطالباتشون باقی مونده بود.\r\n\r\nیه مورد دیگه که واقعاً توجهم رو جلب کرد، برخورد با کارمندایی بود که دنبال مطال\r\nباتشون می‌رفتن یا نسبت به شرایط انتقاد داشتن. بارها دیدم که رفتار مدیر بخش یا افرادی که با مدیریت همسو بودن با این افراد تغییر می‌کرد. فضا برای اون کارمند کم‌کم سخت‌تر می‌شد و این حس به وجود می‌اومد که به جای حل شدن مشکل، خود فرد تبدیل به مشکل شده. در بعضی موارد شرایط به جایی می‌رسید که فرد ترجیح می‌داد خودش استعفا بده.\r\n\r\nنکته عجیب دیگه این بود که وقتی نظرات انتقادی کارمندا توی سایت‌های ارزیابی شرکت منتشر می‌شد، به جای اینکه به ریشه مشکلات پرداخته بشه، بیشتر ناراحتی از انتشار این نظرات دیده می‌شد و از بعضی افراد خواسته می‌شد بیان و نظر مثبت ثبت کنن.\r\n\r\nدر کل حسی که من از این مجموعه گرفتم این بود که همیشه تخصص، تعهد و حجم کاری که انجام میدی تعیین‌کننده نیست. گاهی اینطور به نظر می‌رسید که افرادی که کمتر انتقاد می‌کنن و بیشتر با مدیران همسو هستن، شرایط بهتری دارن. به همین دلیل فضای شرکت برای من جایی نبود که بشه با خیال راحت نظر داد، انتقاد کرد یا دغدغه‌ها رو مطرح کرد.\r\nدر‌انتها اینکه وظایفی رو توقع داشتن که اصلا در‌حیطه کاری کارمند نبود.همه باید با پیج فیک پزشک های مجموعه رو فالوو کنن و روزانه لایک و کامنت بالا بذارن(جدا از کارهای زیادی که داشتیم‌باید این کارو که هرروز‌انجام میدادیم و انجام ندادنش جریمه داشت.در حالی که اصلا جزو وظایف‌ما‌نبود"
