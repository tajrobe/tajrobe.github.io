description: "**وضعیت کلی و فنی شرکت:**\r\nاین شرکت در اصل یک واردکننده سخت‌افزار (چک‌اسکنر، چاپگر کارت و...) است که در این زمینه سابقه دارد، اما به دلیل درخواست مشتریان وارد حوزه نرم‌افزار شده است. به دلیل فقدان دانش فنی و فرهنگ سازمانی مناسب در حوزه نرم‌افزار، تیمی از افراد کم‌تجربه تشکیل شده که خروجی قابل‌قبولی نداشته است. مشاوران و مدیران متعددی در این مسیر جذب و سپس حذف شده‌اند.\r\n\r\n**فرهنگ سازمانی و رفتار مدیرعامل:**\r\nساختار سازمان به شدت سنتی و سلسله‌مراتبی است. مدیرعامل شرکت نگاهی به شدت بالا به پایین دارد و آگاهانه تلاش می‌کند کارمندان را دون‌پایه و فاقد ارزش جلوه دهد. هیچ کارشناسی اجازه ورود به اتاق مدیرعامل را ندارد و توانایی صحبت رودررو در مدیرعامل دیده نمی‌شود. ارتباط مدیرعامل با پرسنل محدود به بازدیدهای نمایشی است؛ به طوری که از قبل دستور مرتب کردن میزها داده می‌شود، کارمندان باید سرپا بایستند و مدیرعامل با دست‌به‌سینه یا دستِ به پشت‌ صحبت‌های کوتاهی می‌کند که بلافاصله با تملق‌گویی معاونین برای توجیه وضعیت شرکت همراه می‌شود. \r\n\r\n**رویکرد مخرب معاون نرم‌افزار:**\r\nمعاون نرم‌افزار فعلی برای تثبیت جایگاه خود رویکردی به شدت حذفی، پرخاشگرانه و بی‌رحمانه پیش گرفته است. او با ایجاد فضایی ناامن و سیاست‌زدگی شدید، به هیچ‌کس رحم نمی‌کند. اخراج مستقیم، ناگهانی و همراه با عصبانیتِ برنامه‌نویسان و اسکرام‌مستر، سرپرست پشتیبانی زمینه‌سازی برای برکناری قائم‌مقام شرکت، و کارشکنی و خیانت سازمانی در حق مدیر کسب‌وکار، نشان‌دهنده سبک مدیریتی مخرب اوست. هرگونه انتقاد با حذف پاسخ داده می‌شود و فضای کار به شدت کنترل‌گرایانه است (حتی مواردی از نقض حریم خصوصی و گوش دادن به مکالمات پرسنل وجود دارد).\r\nبخشی از حذفیات معاون نرم افزار در یک بازه کوتاه:\r\nتیم لید، دواپس کار تیم، کارشناس پشتیبانی، برنامه نویس .net، اسکرام مستر، برنامه نویس هوش مصنوعی، قائم مقام و مشاور شرکت، مدیر کسب و کار، سرپرست پشتیبانی تا این لحظه.\r\n\r\n\r\n**رویکرد مخرب معاون زیرساخت:**\r\nدر مورد معاون زیرساخت همین یک نکته کافی بود که تمام پرسنل شرکت از او و شرکت ناامید شوند. زمانیکه قائم مقام در حال ابراز نگرانی بود وضعیت مناسب نیست و... ایشان با اشاره به پایین تنه ی خودشان با صدای بلند که همه ی کارمندان بشنوند گفت به **** که بعد از قائم مقام عصبانی شد. عدم وجود ادب و احترام در رفتار معاونین مشهود است.\r\n\r\n**تبعیض در امکانات اولیه:**\r\nتبعیض و روابط شخصی در شرکت وجود دارد. حتی امکانات اولیه‌ای مانند سرویس بهداشتی فرنگی در انحصار افراد خاص (مثل منشی و معاون) است و درِ آن قفل می‌شود. سایر پرسنل، حتی در صورت آسیب‌دیدگی جسمی، حق استفاده از آن را ندارند و باید در طبقات دیگر سرگردان شوند.\r\n\r\n**بررسی ادعاهای آگهی استخدام این شرکت:**\r\n\r\n**برند معتبر در حوزه فین‌تک:** در واردات سخت‌افزار شاید، اما در نرم‌افزار حتی در حد یک استارتاپ نوپا هم بالغ نیستند.\r\n\r\n**نرخ ورود و خروج پایین (ادعای دروغ):** نرخ خروج (Turnover) به شدت بالاست. از سال گذشته تاکنون حداقل ۸ نفر از یک تیم ۱۴ نفره جدا شده‌اند. بسیاری از این افراد بدون رعایت حداقل‌های کرامت انسانی (اخراج در لحظه و اجبار به ترک فوری شرکت بدون تحویل کار یا حتی صرف ناهار) بیرون انداخته شده‌اند.\r\n\r\n**معاون منابع انسانی:**\r\nعملا هیچ قدرتی ندارد، تلاش میکند که از سوی مدیرعامل اخراج نشود و با وجود مشاهده رفتارهای توفانی و پرخاشگرانه معاون نرم افزار از طریق منشی های که در هر واحد هستند باز از کنار مشکل عبور کرد و وانمود به ندیدن کردند.\r\n\r\n**پرداخت منظم حقوق:** حقوق پایه معمولاً سر وقت (یکی دو روز مانده به اول ماه) پرداخت می‌شود.\r\n\r\n**مزایای رقابتی و پاداش‌ها:** اضافه‌کاری‌ها به بهانه وضعیت نامناسب مالی کم شد، اما هم‌زمان برای مدیرعامل خودروی لوکس خریداری شد. وعده منابع انسانی که «بعدها شرکت جبران می‌کند» صرفاً یک شعار توخالی است.\r\n\r\n **پاداش سه‌ماهه و ماندگاری:** پاداش سه‌ماهه در عمل حدود 1/4 حقوق پایه است که با کسورات سلیقه‌ای (حدود 20 درصد) و تأخیر فراوان پرداخت می‌شود. پاداش ماندگاری نیز بیشتر بر اساس روابط شخصی و تملق‌گویی توزیع می‌شود.\r\n\r\n*   **کمک‌هزینه‌های رفاهی:** بسیار ناچیز و در حد سالی یک تا دو میلیون تومان است.\r\n\r\n*   **محیط پویا و یادگیرنده:** محیط به هیچ وجه یادگیرنده نیست، بلکه به دلیل فشارهای روانی، سیاست‌بازی و مدیریت خرد، به شدت فرسایشی است.\r\n\r\n**نتیجه‌گیری:**\r\nاین شرکت برای افراد باتجربه و متخصص به هیچ وجه محیط مناسبی نیست. شاید تنها برای افراد بسیار مبتدی که گزینه دیگری ندارند، آن هم برای مدت کوتاه و به شرط مهارت در تملق‌گویی و پذیرش نگاه تحقیرآمیز مدیریت، قابل تحمل باشد.\r\n\r\nخورشید بسوی جایگاه خود روان است.\r\nبا تشکر از  توجه شما"
