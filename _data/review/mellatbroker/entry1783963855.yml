description: "من میخواستم از تجربم تو کارگزاری بانک ملت بگم، افتضاح ترین ادما و عقده ای ترین ادما و خاله زنک ترین ادما تو واحد آیتی اینجا کار میکنند، مثل یه حمال ازتون کار میکشن، کمد و انباری بهتون میدن مرتب کنید، یه کارایی بهتون میدن باورتون نمیشه و اجازه نمیدن حتی خدمتکارام کمکتون کنن، میگن فقط خودتون باید کار بکنید، دو تا آدم بی سوادم گذاشتن اونجا تو واحد آیتی که واقعا هیچ چیزی حالیشون نیس و فقط با پارتی و مذهبی بودنشون که اونجا هستن، آدمای عقده این که میگن ما چون سختی کشیدیم، تو هم باید سختی بکشی، هیچ کسی تو واحد آیتی اونجا دووم نمیاره، هرکی اومده بعد یه سال فراریش دادن، کل شرکت از این واحد و ادماش بدشون میاد، هیچ نظارتی روی این واحد نیس، اصلا پیشنهاد نمیکنم این شرکتو"
