description: "آنچه در مصاحبه وعده داده شد، با قرارداد نهایی تفاوت کامل داشت؛ از عنوان شغلی و حقوق گرفته تا مدت قرارداد. قراردادها کوتاه‌مدت بودند و در تمدید، حتی حقوق کاهش پیدا می‌کرد. هیچ مزایای جانبی‌ای وجود نداشت.\r\nفضای کاری کاملاً غیرحرفه‌ای و آکنده از دشمنی‌های پنهان بین مدیران بود. به‌جای همدلی و همکاری، شاهد بدگویی‌های مداوم پشت سر همدیگر و زیرآب‌زنی میان مدیران بودیم. کل انرژی صرف حاشیه و مدیریت این روابط سمی می‌شد.\r\n\r\nتوصیه‌ام: پیش از امضای قرارداد، همه موارد را کتباً استعلام کنید. محیط سمی، با هر حقوقی ارزش تحمل را ندارد."
