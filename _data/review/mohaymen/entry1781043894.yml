description: "محیط بشدت بی نظم سمی و مدیریت ضعیف\r\nدانشجوهای ترم های پایین شریف و تهران و فارغ التحصیلای ضعیف رو میارن کار کنن براشون که بعدا بتونن بگن شرکت جمعی از دانشجویان شریفه !\r\nهمه فقط دارن میدون ولی به کجا معلوم نیست.\r\nبا کلی رانت و دغل بازی پروژه های ملی رو میگیرن و با ضعفها و بیسوادی ای که دارن میخوان ببرن جلو\r\nعاشق اینن ادای شرکتهای های تک رو دربیارن.\r\nمثلا همینطوری که از مسجد و دعا  اومدن توی شرکت بگن راستی شما آتوریته نداری با من نگوشیت کنی راجع به این فرادی که صورت گرفته\r\nهر کسی ظاهرا یکاری داره میکنه ولی معلوم نیست چی\r\nهمه کارها بزن بره جلو هست یعنی وقتی دوماه بعد برگردی سراغش یا نصف تیم نیستن یا یادشون نیست چکار کردن.\r\nچون اسمشون بد در رفته اولش کلی خودشون رو خوب نشون میدن تا جذبت کنن ولی بعد از چند ماه میبنی توی چه باتلاقی افتادی و موقع خروج کمتر از حداقل حقوق رو بعد از یکسال بهت میدن و توی هیچی باهات همکاری نمیکنن.\r\nهر روز مینیمم ۳ نفر در حال خداحافظی از شرکت هستند\r\nو مدیر عامل و‌مدیران هم در حال سخنرانی و ادا هستند بیشتر تا شرکتداری\r\nهر لحظه هم ممکنه بگن از فردا نیا\r\nرفتارشون یجوریه که دوست دارن بقیه رو مسخره و‌تحقیر کنن و خودشون رو متخصص نشون بدن\r\n"
