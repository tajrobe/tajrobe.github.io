description: "تجربه من در این شرکت نشان داد که نقش مدیران میانی تا چه اندازه می‌تواند در کیفیت فضای کاری تأثیرگذار باشد. در این مجموعه، متأسفانه برخی رفتارهای نادرست در سطح سرپرستی، مانند سوءبرداشت از عملکرد افراد و انتقال ناقص یا اشتباه اطلاعات به مدیریت بالاتر، باعث ایجاد بی‌اعتمادی و سوءتفاهم میان کارکنان شده بود. این موضوع به مرور زمان موجب کاهش همکاری تیمی و افت روحیه کاری شد و در نهایت شرایط به گونه‌ای پیش رفت که ادامه همکاری برای من امکان‌پذیر نبود."
