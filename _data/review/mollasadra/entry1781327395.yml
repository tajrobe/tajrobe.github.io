description: "آشغالترین محل ممکن برای کار کردن.. حق خوری،توهین،بی احترامی به کارمند از اصول اولیه هلدینگ ملاصدراست.  فساد اخلاقی و مالی بین مدیرای این هلدینگ جهنمی بیداد میکنه یکیشون آرش راشدی بود. سه ماه توی این جهنم کار کردم آخرش حقوق که ندادن هیچ بعدم امید، انگیزه اعتماد به نفس منو از بین بردن. کاری کردن که یه روزی کاراشونو تلافی بکنم.. آدم بره اسنپ بهتره تا توی جهنمی به اسم هلدینگ ملاصدرا کار بکنه"
