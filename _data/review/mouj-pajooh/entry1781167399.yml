description: "با سلام،\r\nمن الان به مدت سه و سال و نیم هستش که با این مجموعه همکاری دارم و مثل تمام محیط های شغلی دیگه روزهای خوب و بد زیادی رو تجربه کردم و به نظرم هر شخص حرفه ای که تجربه کار کردن در محیط های شغلی بزرگ رو داشته باشه میدونه که فشار کاری و یا مشکلات ممکن هستش که گاهی پیش بیاد ولی چیزی که باعث میشه افراد با وجود تجربه مشکلات به همکاری با مجموعه ای ادامه بده قدرت مدیریت بحران و ارزش گذاری مدیریت اون مجموعه برای بهبود بخشیدن به شرایط هستش و خوشبختانه موج پژوه جزو اون دسته از شرکت هایی هستش که با بازبینی مدام شرایط و گوش دادن به درخواست های پرسنل همواره در جهت بهتر کردن شرایط برای پرسنل پیش میره. نوشته های من تعریف نیست بلکه تجربه های شخصی بنده در این مدت هستش، مدیر مالی و منابع انسانی مجموعه همیشه به صحبت های پرسنل گوش میدن و برای رضایت پرسنل تلاش میکنند، همچنین این موضوع که با وجود شرایط سخت اقتصادی مدیریت شرکت برای تعداد زیاد پرسنل پک های مناسبتی و پک های ارزاق تهیه میکنه که همگی از محصولات با کیفتی هستند که انتخاب همه ما در خریدهای روزانه می باشند و یا پرداخت به موقع حقوق نشان دهنده میزان ارزش گذاری مدیریت برای پرسنل خود می باشد و حتی در جنگ اخیر با وجود تعطیلی مجموعه علاوه بر پرداخت کلیه حق و حقوق قانونی پرسنل مدیریت مبلغی رو تحت عنوان قرض بلاعوض به ما پرداخت کردند که تو شرایط سخت جنگی تحت فشار مالی نباشیم."
