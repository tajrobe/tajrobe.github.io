description: "سلام حضور همگی \r\n امروز به طور اتفاقی با برنامه تجربه کاری اشنا شدم و از روی کنجکاوی شرکت موج پژوه را سرچ کردم تا نظرات افراد را مطالعه کنم چون من 6 سال در این شرکت فعالیت داشتم و الان 10 روز است که باز نشسته شدم  الان هم مشغول به کار در این شرکت نیستم واقعا نظراتی که ثبت شده به دور از انصاف هست این شرکت یک شرکت دانش بنیان با مدیران جوان و کارافرین ولی کاملا با تجربه میباشد من در زمینه فعالیت این شرکت کاملا بی تجربه بودم اما با اموزش کامل در این شرکت کلی تجربه کاری کسب کردم داشتن سابقه کار دراین شرکت جزءافتخارات سوابق کاریه من محسوب میشود لازم دونستم ازاین تریبون از مدیران و مسئولان شرکت که در زمان جنگ 12 روزه و جنگ 40 روزه با تمامه محدودیتها و شرایط سخت جامعه همچنان به فکرحقوق و عیدی و پکهای سبد کالایی  همه کارمندان بودند تشکر کنم بااینکه 40 روز شرکت تعطیل بود ولی ما تمامه حق و حقوق خودمان را دریافت کردیم و وقتی کار مجدد شروع شد مطالباتی نداشتیم امیدوارم این شرکت و مدیرانش همیشه در سلامتی و پیشرفت باشند تا جوانان جویای کار و فعال بتوانند تواناییهای خودرا به نمایش بگذارند   \r\nموفق و موید باشید عزیزان موج پژوهی"
