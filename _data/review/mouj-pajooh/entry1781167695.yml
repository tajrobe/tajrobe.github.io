description: "سلام و عرض ادب،\r\nتجربه کاری من در این شرکت بسیار مثبت بود مدیریت قوی و فضای کاری دوستانه از مهم ترین ویژگی های آن بود.\r\nامکان دریافت وام برای کارکنان که کمک قابل توجهی در رفع نیازهای مالی ایجاد می کرد. مدیران دلسوز، حرفه ای و توانمند که همواره از کارکنان حمایت می کردند و برای توسعه آن ها اهمیت قائل می شدند.\r\nپرداخت پاداش بر اساس عملکرد و قدردانی از تلاش آن ها  و همچنین فرهنگ سازمانی بسیار مثبت و جو کاری مطلوبی که همکاری بین همکاران را تسهیل می کرد و باعث حس تعلق و رضایت شغلی میشد. همچنین توجه  به رفاه کارکنان بطور مثال  با  ارائه پک ها و هدایای مناسبتی در مناسبت های مختلف که  نشان دهنده ی توجه شرکت به کارکنان بود.\r\n خلاصه به نظر من مدیریت قوی و فضای کاری کاملا حرفه ای این شرکت را به محیطی مناسب برای کار و رشد حرفه ای تبدیل کرده است."
