description: "سلام \r\nحدود چهار سال هست که در این شرکت کار می کنم و در بخشی هستم که با همه پرسنل از اداری تا فنی و تولید ارتباط دارم. همکاران بسیار محترمی دارم که البته گاهی در هر زمان ممکن هست که مشکل ایجاد شود اما با مدیریتی که در شرکت مدیران ارائه می کنند مشکلات به خوبی حل میشه البته به شرطی که شما در مورد مشکل خودتون با مدیر یا مسئول مربوطه صحبت کنید تا مطلع شوند و به فکر راهکار باشند. \r\nاتمسفر شرکت طوری هست که همه سرشون به کار خودشون هست چون دپارتمان ها هم کلا از هم تفکیک شده هستند حتی فضای فیزیکی واحدها با هم ارتباطی ندارند و این یکی از محاسن این شرکت هست کل پرسنل در یک طبقه نیست که برای هم مزاحمت ایجاد کنند.\r\nمدیرعامل بسیار کاربلد و من خیلی وقت ها به خاطر سن کمی که دارم سعی میکنم از ایشون یاد بگیرم که چطور میشه یک شرکت را اداره کرد که شاید در آینده به این آموخته ها نیازمند شوم.\r\nحقوق به موقع پرداخت میشه و به انصاف با افرادی که ترک کار می کنند برخورد میشه \r\n"
