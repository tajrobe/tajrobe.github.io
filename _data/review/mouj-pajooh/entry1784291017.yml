description: "سلام.\r\nبنده تقریبا دو سال در این شرکت کار کردم. مثل همه ی شرکتها مزایا و معایب خودش را داشت که خلاصه بیان میکنم .\r\nمزایا:\r\nدر آمد خوب\r\nکار با تجهیزات پیشرفته\r\nیاد گیری در حین کار\r\nتجربه ی جدید\r\n\r\nمعایب:\r\nفشار کاری بالا\r\nاضافه کاری اجباری\r\nکار در ایام تعطیل و عید\r\nفضای کاری تنگ و پر سر و صدا\r\nاخلاق و رفتار زشت سرپرست\r\nعدم امنیت شغلی\r\nعدم شفافیت در عنوان شغلی در بیمه\r\nدور زدن قانون\r\nتعدیل ناگهانی و جریمه های سنگین\r\nپرخاش و بی ادبی برخی مسئولین\r\nعدم توجه به حقوق انسانی افراد \r\nعدم تعادل بین کار و زندگی افراد\r\nافسردگی و فشار روانی در محیط کار\r\nباند بازی بین برخی افراد مسئولین\r\nسو استفاده از قدرت و نفوذ\r\n\r\nدر کل این شرکت برای کسب درآمد بالا برای مدتی کوتاه مناسب هست. اما فضای کاری به شدت فرسایشی بوده برای بنده. اما برای برخی افراد که زیاد در بند برخی مسائل اخلاقی و روانی نباشند و فقط پول براشون مهم هست شاید مناسب باشد.\r\nمتاسفانه تعداد ۲۵ نفر از همکاران را به بهانه جنگ بدون هیچ گونه پاسخ گویی و اطلاع رسانی مناسب اخراج کردند.\r\n\r\nاین شرکت و برخی مسئولان راحلال نمی کنم. و امیدوارم روزی تقاص بد رفتاری خود را ببینند."
