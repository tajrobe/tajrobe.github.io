description: "\r\nاگر سر تا پاتون رو طلا هم گرفتن اصلا دور و بر این شرکت پیداتون نشه. چه به عنوان کارمند چه حتی به عنوان مشتری.\r\nبسیار خودشون رو حرفه ای جلوه میدن و ادعا میکنن که مثل یه خانواده هستند و... اما مطلقا هیچ ارزشی براشون ندارید. مدیرعامل شرکت در ظاهر **** هست اما در باطن این شرکت و خود این *** میچرخونه. نحوه مدیریت شرکت این شکلیه که معتقدن همه باید فروشنده باشن و مهم نیست که جایگاه شغلی شما چیه. شما باید بتونی به اندازه پول حقوقت بفروشی.\r\nپرسنل زیر نظر شدید با دوربین کنترل میشن. پرداخت حقوق با تاخیر و نامنظم\r\nحتی در تعامل با مشتری هاشون هم یک طرفه و بدون انصاف رفتار میکنن چه برسه به پرسنل\r\nقبلا تو سایت ویکی تجربه تماما نظرات منفی بود ازشون و هرکی رفته بود پشیمون شده بود"
