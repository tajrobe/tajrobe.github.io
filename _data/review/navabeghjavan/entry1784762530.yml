description: "یکی از بدترین تجربه های کاری من، در این شرکت بود.\r\nاز مدیر عامل و رییس هیئت مدیره که یک خانم بی نهایت بی شخصیت و مدعی بود(نمی دونم هنوز هستش یا نه) تا مدیر داخلی گرفته که حتی دیپلم هم نداشت و افتخارش این بود که بخاطر توانایی هاش مدیر داخلی شده، همه و همه بیش از حد از ادب و شعور انسانی دور بودن و تمامی کارمند ها در تمامی بخش ها(حتی همکارانی که در محل اونا دفتر اجاره می کردن) رو تهدید می کردن. اضافه کاری پرداخت نمیشد، به دلایل مختلف و الکی توبیخ صورت می گرفت و کادر کاملا غیر حرفه ای بود.\r\nاگر سلامت روان و شخصیت فردیتون براتون اهمیت داره، هرگز با این مجموعه که به جرات میتونم بگم با باند بازی کارشون رو به جلو می برن، همکاری نکنید"
