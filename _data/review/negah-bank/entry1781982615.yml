description: "در هر شرکتی نقاط قوت و ضعف وجود دارد، اما چیزی که برای من آزاردهنده بود برخی تناقض‌ها در فضای کاری، فرهنگ سازمانی و نحوه مدیریت مجموعه بود.\r\n\r\nزمانی که برای استخدام مصاحبه شدم، فضای شرکت بسیار حرفه‌ای، منظم و امیدوارکننده به نظر می‌رسید. اما پس از مدتی فعالیت، متوجه شدم بخشی از تصویری که در فرآیند جذب ارائه شده بود با واقعیت روزمره شرکت فاصله دارد. با وجود اینکه شرکت چند سالی است فعالیت می‌کند و در سال‌های اخیر نیز تغییراتی در مدیریت ارشد داشته، از نگاه من هنوز به ثبات و بلوغ سازمانی مورد انتظار نرسیده است. در بسیاری از مواقع احساس می‌شد که به ازای هر قدم رو به جلو، چند قدم به عقب برداشته می‌شود.\r\n\r\nیکی از مواردی که باعث نارضایتی من شد، سطح نظارت در محیط کار بود. طبق آنچه در دوران همکاری متوجه شدم، دوربین‌های مداربسته علاوه بر تصویر، صدا را نیز ضبط می‌کردند و این موضوع باعث شده بود بسیاری از کارکنان احساس کنند آزادی و راحتی لازم برای گفتگوهای روزمره در محیط کار را ندارند. همچنین این برداشت در میان کارکنان وجود داشت که برخی از مکالمات ضبط‌شده در ارزیابی‌ها یا تصمیمات مدیریتی مورد استناد قرار می‌گیرد. در مواردی نیز مشاهده می‌شد که صحبت‌های انجام‌شده در محیط کار بعداً به شکل کنایه، تذکر یا برخوردهای غیرمستقیم به افراد منتقل می‌شود. مجموع این موارد باعث ایجاد حس بی‌اعتمادی و کاهش آرامش روانی در محیط کار شده بود.\r\n\r\nاز نظر مدیریتی نیز به عقیده من برخی از مدیران میانی از دانش و مهارت‌های لازم برای مدیریت تیم‌ها برخوردار نبودند. در بعضی موارد به نظر می‌رسید روابط شخصی و نزدیکی به مدیران ارشد نقش پررنگ‌تری نسبت به شایستگی‌های مدیریتی در انتخاب افراد داشته است. نتیجه این موضوع در برخی تیم‌ها به شکل تصمیم‌گیری‌های ضعیف، جلسات کم‌اثر، عدم توانایی در حل مسائل و انتقال فشارها به اعضای تیم دیده می‌شد.\r\n\r\nدر تجربه شخصی من، برخی مدیران به جای تمرکز بر توسعه تیم، حل مشکلات و ایجاد فضای همکاری، بیشتر درگیر حاشیه‌ها، انتقال مشکلات به مدیران بالاتر و ایجاد فضای رقابتی ناسالم بودند. این موضوع باعث می‌شد اعتماد بین اعضای تیم کاهش پیدا کند و افراد احساس امنیت شغلی و آرامش کمتری داشته باشند.\r\n\r\nهمچنین طی مدت حضورم شاهد خروج تعدادی از همکاران از مجموعه بودم که هر کدام دلایل خاص خود را داشتند، اما در مجموع این موضوع باعث شد نسبت به آینده شغلی خودم در این شرکت نیز تردید پیدا کنم. به همین دلیل تصمیم گرفته‌ام مسیر حرفه‌ای خود را در مجموعه دیگری ادامه دهم.\r\n\r\nدر کنار تمام این موارد، انصافاً شرکت نقاط قوتی هم دارد. حقوق و مزایا در سطح مناسبی قرار دارد، پرداخت‌ها منظم انجام می‌شود و برخی مزایای رفاهی و پرداختی‌های جانبی نسبت به بسیاری از شرکت‌ها شرایط خوبی دارند. به همین دلیل ممکن است از نظر مالی برای برخی افراد گزینه مناسبی باشد.\r\n\r\nدر مجموع اگر صرفاً به دنبال حقوق و مزایای مناسب هستید، این شرکت می‌تواند گزینه قابل قبولی باشد؛ اما اگر رشد حرفه‌ای، فرهنگ سازمانی سالم، مدیریت توانمند و فضای کاری مبتنی بر اعتماد برایتان اهمیت زیادی دارد، پیشنهاد می‌کنم پیش از تصمیم‌گیری حتماً با کارکنان فعلی و سابق مجموعه صحبت کنید و تحقیقات کافی انجام دهید.\r\n"
