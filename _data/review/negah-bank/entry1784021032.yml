description: "با درود امیدوارم تجربه من بدرد دوستانی بخوره که قصد دارن به این شرکت ورود کنند و همچنین مدیرانی که در این شرکت تصمیم گیرنده هستند...\r\n\r\nمن شرکت های مشابه زیادی کار کردم و اگر اون شرکتی شرایط مناسبی نداشت یا حداقل برای من مناسب نبود با صحبت و طرح موضوع ، مشکل من تا حدودی برطرف می شد و همکاریمو ادامه میدادم‌‌... [اما اینجا بعد قرارداد هیچ کس به حرفای شما گوش نمیده!!! ]\r\n این شرکت یه فاجعه جدیده که کمتر کسی دیده، یه ظاهر فریبنده با مدیران میانی بی سواد و از طرفی کارمندان به شدت ناراضی با فضای نه چندان خوب و ملتهب ....\r\n\r\nاول اینکه تو واحدی که من کار کردم، اصلا چارچوب و روال مشخصی برای انجام کار نداشت، بهم ریختگی کار به شدت آزاردهنده بود، مدیر واحد همیشه با موبایل بالا سرت میومد و وسط کار بهت تسک جدید میداد و‌توقع داشت در لحظه انجامش بدی، کارا اکثرا تلفنی و ناتمام میرفت جلو ، اما روزی که مشکل پیش میومد مدیر پاسخگو نبود و کارشناسی که از نبود روال و سیستم رنج می‌برد باید پاسخ میداد!! متاسفانه مدیرای واحد این شرکت صرفا بر اساس مدت سابقه کاری انتخاب شده بودن و هیچ دانش فنی [حداقل مدیر واحد شبکه آقای ا.ا ] نداشت!!! اکثر اوقات شمارو به جلساتی میفرستن که هیچ هماهنگی با شما نشده و هیچ اطلاعی از موضوع جلسه نخواهید داشت!! \r\nمنابع انسانی که هیچ!! اصلا آیین نامه نداشتن!! \r\nتبعیض زیاد و  بین کارمندان شرکت بر اساس چاپلوسی از مدیر واحد شکل گرفته بود !! فضای هایتک و حرفه ای جاری نبود متاسفانه!!!\r\nحاشیه زیاد و اکثرا صحبت میکنی ناراضی و صرفا چون حقوق رو به موقع می‌داد یه عده از روی ناچاری مونده بودن! \r\nمتاسفانه مدیران این شرکت رو اگه جای دیگه ای بفرستی حتی سِمت کارشناس هم بهشون نمیدن! \r\nاینجا حتی ارزش تجربه هم نداره ، برای وقت و مهارت خودتون ارزش قائل باشید. \r\nاین شرکت چون برای بانک هست صرفا برای مدیران بالادستی خوب بوده و اکثریت کارمندان پایین دستی ناراضی و فضای کاری به شدت مسمومی داره! امنیت شغلی هم هیچ کارمندای خودشون با ۱۵ سال سابقه رو راحت مینداختن بیرون ، ماهی حداقل ۱۰ نفر از شرکت ۱۵۰ نفری لفت می‌دادند اما مدیرای شرکت عین خیالشون نبود!! "
