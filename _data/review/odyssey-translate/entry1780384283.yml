description: "وقتی به روزهای کاری‌ام در آن دارالترجمه فکر می‌کنم، بیش از هر چیز، تضاد میان «خدمات تخصصی زبانی» و «سطح فکری پایین مدیریت» در ذهنم نقش می‌بندد. مدیریت فوق العاده بی ادب و کلاه بردار این مجموعه که توسط فردی با نام اختصاری «***» اداره می‌شد، مصداق بارزِ نبودِ درکِ استراتژیک و انسانی از یک کسب‌وکار بود.\r\nکار در آنجا شبیه به تلاش برای ساختن یک عمارت روی زمینی باتلاقی بود. تمام دغدغه‌ی مدیریت، نه ارتقای کیفیت خدمات ترجمه یا ایجاد یک محیط پویا، بلکه در دایره‌ی بسیار محدودی از نیازهای روزمره خلاصه می‌شد؛ دایره‌ای که وسعت فکری‌اش گاه به کوچکیِ یک بطری آب معدنی یا یک بسته دستمال‌کاغذی بود. در حالی که ما برای تحویل پروژه‌های حساس و تخصصی با ددلاین‌های فشرده دست‌وپنجه نرم می‌کردیم، اتاق مدیریت پر بود از بحث‌های سخیف و بی‌مایه که نشان‌دهنده عمق نگاه کوچک مدیری کودک فکر بود که تنها برای «امروز» زندگی می‌کرد و هیچ بینشی نسبت به حفظ سرمایه‌های انسانی‌اش نداشت.\r\nبزرگ‌ترین درد این محیط، بی‌عدالتیِ سیستماتیک بود. حقوق‌ها نه تنها ناچیز بودند، بلکه همیشه با تأخیرهای طولانی و بهانه‌های واهی پرداخت می‌شدند. برای ما که هزینه‌های زندگی‌مان به همان حقوق وابسته بود، شنیدنِ توجیه‌های مدیر در حالی که خودش مشغول سفارش دادن غذاهای گران‌قیمت از بهترین رستوران‌ها بود، نمک پاشیدن به زخم محسوب می‌شد. بیمه‌ها هم که داستان خودش را داشت؛ رد شدنِ ناقص و غیراصولی حق بیمه، نشان می‌داد که «***» حتی برای قانونی‌ترین حقوقِ پرسنل‌اش هم ارزشی قائل نیست.\r\nفرهنگِ «آزار»، بخشی از ابزار مدیریتی او شده بود. فشار آوردن‌های بی‌دلیل و برخوردهای تحقیرآمیز، تنها راهی بود که او گمان می‌کرد می‌تواند قدرت‌اش را به رخ بکشد. در حالی که او غرق در سودهای حاصل از استثمارِ ما بود، محیط کار به جای فضایی برای رشد و همکاری، به یک زندانِ فکری تبدیل شده بود.\r\nآن دوران برای من درس بزرگی شد؛ درسِ شناختِ تفاوتِ میانِ «صاحب‌کار» بودن و «مدیر» بودن. حالا که به آن روزها نگاه می‌کنم، خوشحالم که از آن فضای مسموم فاصله گرفتم، اما همچنان برای همکارانِ عزیزی که هنوز در چنبره‌ی این مدیریتِ کوته‌فکر گرفتارند، متأسفم.\r\n\r\nتأسف‌بار است که دارالترجمه‌ای با این سطح از ادعا، توسط فردی اداره می‌شود «***» که جهان‌بینی‌اش در حد هزینه‌های دستمال‌کاغذی و ناهارِ شخصی‌اش محدود شده. وقتی حق‌الناس (حقوق و بیمه) اولویت آخر است، یعنی مدیر فقط یک “جیب‌بُرِ حرفه‌ای” است، نه مدیرِ یک مجموعه فرهنگی"
