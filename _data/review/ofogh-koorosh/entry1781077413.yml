description: "تجربه کاری من در این شرکت در مجموع با چالش‌هایی همراه بود که بخش قابل توجهی از آن‌ها به نحوه مدیریت در سطح سرپرستی برمی‌گشت. متأسفانه برخی رفتارهای غیرحرفه‌ای مانند انتقال نادرست اطلاعات، عدم شفافیت در تصمیم‌گیری‌ها و ایجاد فضای بی‌اعتمادی بین اعضای تیم، باعث کاهش هماهنگی و تمرکز کاری شده بود. این وضعیت به مرور زمان محیط کار را فرسایشی کرد و علاوه بر کاهش انگیزه، بر کیفیت انجام وظایف نیز تأثیر گذاشت و در نهایت ادامه همکاری برای من امکان‌پذیر نبود."
