description: "وقتی پرسنل تازه وارد نیومده استعفا میدهند، از دید بعضی ها اولین متهم همیشه خود اون ها هستند\r\nدر حالی که گاهی ریشه ماجرا خود ساختار سازمان.\r\nشاید مسئله ادم ها نباشه سازمان باشه\r\nسازمانی که مسیر رشدش معلوم نیست و فرصت ها عادلانه توزیع نمیشن\r\nپرسنل حرفه ای خیلی زود این نشونه ها رو میبینه\r\nماندن طولانی مدت پرسنل همیشه نشانه سلامت یک سازمان نیست"
