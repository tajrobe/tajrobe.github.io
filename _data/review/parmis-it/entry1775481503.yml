description: "سلام\r\nمتن چند ماهی هست که در این شرکت کار می کنم.\r\n5 سال پیش مصاحبه داشتم اما با شرکت قبلی توافق کردم و ادامه دادم باهاشونو\r\nسال گذشته که اومدم شرکت جدیدشون زمین تا آسمون عوض شده بود. \r\nالان فضای کاری اینجا هیچ فرقی با شرکت های درجه 1 ایران نداره. خداییش شیک تمیز در آوردند.\r\nالان که زمان جنگ است و من به سختی وصل شدم.\r\nاز اول جنک بلافاصله همه را دورکار کردند و خداییش خیلی همراهی کردند. اصلا فکرش را نمیکردم اینقدر همراهی کنند.\r\nدر این چند ماه هم من موردی باهاشون ندیدم . کارها همه چی روال پیش میره. تلاش میکنند تا 10 هر ماه همه حقوق را تسویه کنند.\r\nپروژه بزرگی دارند. برای من تجربه خوبیه . همیشه دوست داشتم روی نرم افزار حسابداری و انبار و ... کار کنم.\r\nبخش از کد ها قدیمی است که تقریبا داره همش ری فکتور میشه . مشتری های خوبی دارند و شخصا وقتی میبینم روی نرم افزرای کار می کنم که در شرکت ها و کارخونه های بزرگ کار میکنه لذت میبرم. این یک حس شخصیه. توی شرکت قبلی این حسی که بدونم کسی با نرم افزارمون کار میکنه را نداشتم.\r\nاگر ماشین داشته باشید باید قبل از 8 اونجا باشید تا جای پارک پیدا کنید. \r\nاستند آپ های روزانه، گرومینگ و رویو هم داریم \r\nهمین."
