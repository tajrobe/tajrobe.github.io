description: "میخوام یه جمع بندی کلی از وضعیت فاجعه بار شرکت پارمیس در مدت زمانی که من اونجا مشغول به کار بودم ارائه بدم.\r\n1-\tشرکت پارمیس شباهت بسیار زیادی به اردوگاه های برده داری داره. در این شرکت هیچ ارزشی برای کارمند قائل نیستن و خیلی راحت سره کارمند به عناوین مختلف کلاه میزارن و مدیرعامل بیمارش از وضعیتی که درست کرده لذت میبره.\r\n2-\tدر ابتدای ورود شما با چرب زبانی های مدیر منابع انسانی و دیگر اساتید فکر میکنید رسما در حال وارد شدن به بهشت هستید اما با گذشت زمان متوجه میشید که چه اشتباه بزرگی انجام دادید. شرکت نیاز به تعدیل نیرو نداره چون خودش شرایطی براتون درست میکنه که فرار کنید. مثلا داخل جنگ 40 روزه که همه نگران از دست دادن شغلشون هستن، 7 نفر از کارمندای شرکت با استعفا از داخل شرکت فرار کردن. کافیه به پلتفرم جابینجا مراجعه کنید تا ببینید این شرکت همیشه آگهی فعال برای جایگزین کردن کارمنداش داره.\r\n3-\tاگه شما شهریور ماه به استخدام شرکت دراومده باشید تا شهریور سال دیگه افزایش حقوق ندارید و قانون افزایش حقوق وزارت کار در این شرکت نادیده گرفته میشه. تازه بعد از همون یک سال هم افزایش حقوقی حداکثر 25درصدی خواهید داشت. این اولین جاییه که سره شمارو کلاه میزارن و سعی دارن هر روز شمارو فقیرتر کنن. مقدار حقوق که داخل بیمه رد میشه با حقوق اصلی شما تفاوت داره. شرکت حتی سره سازمان تامین اجتماعی هم کلاه میزاره و معلوم نیست چرا بازرسایه تامین اجتماعی یقه شرکتو بابت این کلاهبرداری نمیگیرن. اگه شما بابت این قضایا اعتراض کنید بلافاصله شمارو بیرون میکنن و با نفر جدید جایگزین میکنن. داخل این شرکت امنیت شغلی بیشتر شبیه یک جوک میمونه.\r\n4-\tاگه داخل شرکت با بقل دستی خودتون صحبت کنید بلافاصله توسط منابع انسانی بازخواست میشید. حتی تعداد دست شویی رفتن و چایی خوردن شما هم توسط منابع انسانی شمرده میشه. همه باید ساکت باشین و هیچ کس حق صحبت کردن نداره. تا خودتون نبینید شاید باور نکنید\r\n5-\tشما شدیدن تحت کنترلید. تمامی شرکت دوربین و شنود کار گذاشتن. مدیرعامل بیمارش هر روز میشینه دوربینا کنترل میکنه و صحبتای شمارو گوش میده تا بتونه ذهن بیمارشو ارضا کنه. شما هیچگونه حریم خصوصی داخل شرکت ندارید. \r\n6-\tمدیرعامل شرکت، دکتر روانپزشک خودشو به استخدام شرکت در اورده، این شخص به اصطلاح دکتر با شما جلسات به اصطلاح انفرادی خودشناسی برگزار میکنه تا به شما گوشزد کنه که شما داخل شرکت باید طبق ذهن بیمار مدیرعامل رفتار کنید.\r\n7-\tو اما از اینونت های پر زرق و برق شرکت نگم براتون. در مجموع دوتا اینونت برگزار میشه. اینونت اول سالگرد شرکته که از شما با سالاد اولویه و ناگت مرغ پذیرایی میشه. دومین اینونت مربوط به شب یلداست که به شما 200 گرم آجیل به همراه یک عدد شمع هدیه میدن و در پایان با لبو و باقالی پخته ازتون پذیرایی میشه.\r\nتوصیه ای که من به شما دارم اینه که مثل من مرتکب اشتباه نشید. اگه 2 تا 3 ماه هم بیکار باشید و جایی غیر از پارمیس استخدام بشید، وضعیتتون بسیار بهتر خواهد بود. قبل از انتخاب حتما فکر کنید.\r\n"
