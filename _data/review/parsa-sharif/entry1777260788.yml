description: "اگه برای آبرو، احترام، وقت و توانایی های خودتون پشیزی ارزش قائل نیستین به پارسا شریف بپیوندین. اینجا یه سیرکه با انواع اقسام آدم های پرمدعای بی سواد و دروغگو. قراره کلی چیزای خوب از این خانواده دوست داشتنی یاد بگیرین، از مدیریت کم کاری و بی تفاوتی نسبت به مشکلات و رفتارهای غیر حرفه ای موجود، از مرد ریشوی قد بلند که پایین اشاره کردند دودوزه بازی و بهادادن به افراد بی ارزش، از یکی دیگه دو بهم زنی و فخر به بی سوادی و ....\r\nکل مجموعه هم به طور تخصصی در زمینه فراری دادن افراد حرفه ای و دوستداران پژوهش و کار فنی واقعی فعالیت می‌کنند."
