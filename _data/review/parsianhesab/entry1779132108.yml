description: "\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\nکاملا موسسه ای دروغین و کلاهبردانه هست. \r\nبا آگهي های استخدامی دامی برای کارجو ها پهن میکنن \r\nتو مصاحبه با تنها چیزی که مواجه میشین اینه که ما یه دوره کارآموزی داریم پول بدید و وارد شید و پس از اتمام کار آموزی ما استخدامتون میکنیم که سریعا منشی با دستگاه کارتخوان میاد مبلغی رو ازتون دریافت میکنن و سندی بابت عدم بازپسگیری مبلغ پرداختی میگیرن.  \r\nتازه وقتی وارد کلاس حسابداری میشید ازتون سوالاتی میپرسن که اگر بلد نباشید دوباره ازتون درخواست پول میکنن. \r\nدر صورتی که اجابت نکنید سرکارتون میذارن تا ابد و هیچ کلاسی برگزار نمیکنن تا پول بگیرن حالا پروژه و کلاس هایی که برگزار میکنن هم کاملا بصورت پیش پا افتاده و سنتی و دفتری هست و نه تا بحال هیچ استخدامی داشتن و نه حتی کادری درست و درمان دارن. \r\nتمام مجموعه متشکل از حدودا پنج نفر یعنی سه چهار نفر منشی خانم و اسما مدیر عامل مهندس جلیلی.  \r\nاین شرح اتفاقاتی بود که برای من افتاد \r\nو مبلغی که از من سوخت. \r\nپیشنهاد میکنم از این موسسه فرار کنید و اعتماد نکنید.\r\n \r\n"
