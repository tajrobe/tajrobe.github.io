description: "دوستان میخوام برای شرکت پارت که شرکت سابقم هست تجربم رو به طور منصفانه بیان کنم \r\n۱- شرکت در کل خوبی هست ولی برای جونیور ها و مید لول های سطح پایین یعنی دوستان تازه کار مثل دانشجوها دوستانی که سنشون کمه و تجربه کاری و رزومه قوی ندارن این شرکت برای ساختن رزومه شون عالیه و چون شرکت رو از لحاظ تکنولوژی تقریبا به روز نگه میدارن شما کلی چیز یاد میگیرین \r\n۲- جو شرکت متوسط و اکثرا دوستانه هست و همکارها اکثرا ادم های خوب و با شخصیتی هستن تو اکثر تیم ها و اکثر تیم ها جو سمی ندارن و  مدیرهای شرکت هم ادم های خوبی هستن و سرتون به کار خودتون باشه و روال عادی کار رو برید کسی بهتون کاری نداره\r\nیه نکته : شما هر شرکتی که برید باید یه سری اخلاق حرفه ای کاری رو بلد باشید که به مشکل نخورین و جو عمومی شرکت پارت هم خوبه انصافا که بالا گفتم البته ممکنه ادم هایی سمی هم داشته باشه که کم هستن تو این شرکت ... برای مرخصی اذیتی ندارن و راحت مرخصی میدن \r\nبرای دوستان دانشجو میتونن خودشون ساعتی کنن ولی این ساعتی یه خورده دردسر داره ثبت ساعت هاش ..در کل زیاد به پر و پاتون نمیپیچن اگه کار و تسک هاتون پیش بره ... و ۶۰ درصد بچه ها مذهبی نیستن ... ۲۰ درصد سنتی و کمی معتقد .... ۲۰ درصد سوپر مذهبی که البته به کسی کار ندارن اینم گفتم شاید برا دوستان سوال باشه ولی مدیر ها از بالا ادای ادم های نیمه مذهبی رو برای حفظ ظاهر شرکت در میارن .\r\n۳. اکثر تیم ها جو شون خوبه چون  اکثریت این تیم ها رو باهاشون در ارتباط بودم ولی چندتا تیم که مورد داره از نظرم رو مینویسم براتون .\r\nتیم مانیتورینگ  تو شرکت تیم خوبی نیست چون باید با حقوق قانون کار شیفت چرخشی و شب بدید گاهی و سرپرستش هم ادم استانداردی نیستن . \r\nتیم مدیریت فرایند : اگه سوپر مذهبی هستین تیم خوبیه براتون چون سرپرستش مذهبی و افراد تیم هم مذهبی هستن .\r\n۴-مورد چهارم حقوق هست پاشنه اشیل این شرکت یه تحلیل کامل براتون از این قسمت مینویسم : \r\nدوستان گفتم اگه جونیور و تازه کار هستین براتون این شرکت خوبه چون حقوق تون اکثرا قانون کار هست یا حدود ۲۰ درصد از قانون کار بیشتر . این شرکت تو چند سال اخیر سرمایه گذاری زیادی برای راه اندازی شعبه و اتاق در دانشگاه های خوب مشهد انجام داده و کالج های اموزشی زیادی هم میزاره و سیاست استخدامشون شده جذب از همین کالج ها و یا دانشجو های خوب اون دانشگاه ها ... حالا چرا چون دانشجو رو میگیره ۲ ماه ازمایشی میان بدون حقوق بعد برای سال اول و دوم قانون کار میدن بهشون و اگه سال سوم و چهارم که طرف دیگه حداقل به میدلول سطح متوسط تو زمینه خودش رسیده ۱۰ تا نهایت ۲۰ درصد بیشتر از قانون کار اون سال میدن \r\nاینجا یه نکته بگم بهتون : اومدین تو شرکت دو سال تون تموم شد و به اهداف یادگیری و رزومتون رسیدین جدی دنبال خروج از شرکت باشین و بیوفت دنبال یه شرکت خوب و با استراتژی از پارت برید چون شمایی که جونیور اومدی بعد ۲ سال یا دو سال نیم دیگه هر چی میخواستی اینجا یاد گرفتی و با پروژها و فشار متوسط کاری یا متوسط به بالا شدی یا سطح حرفه ای تو زمینه خودت  بعد این تایم اگه شرایط و وضعیت حقوقت همونی که بالا گفتم بود دیگه وقت تو تلف کردی تو این شرکت ... توی پارت چیزی که من فهمیدم اینه که ۱۵ درصد افراد حقوق بالا میگیرن مثل مدیر تیم ها و معاون شون و یک یا دونفر کلیدی تیم های مهم بعدش ۲۰ درصد افراد حقوق متوسط میگیرن افراد حرفه ای تیم ها و ضروری برا شرکت باز اونا هم البته از شرکت های مشابه پارت مثل وی پاد کمتر میگیرن ...حدود ۶۰ تا ۷۰ درصد شرکت رو هم که قشر دانشجو یا تازه فارغ تحصیل تشکیل میدن رو قانون کار یا یه پلقی بیشتر از قانون کار میگیرن \r\nیه نکته جالب هم این هست که بعد جنگ ۱۲ روزه خیلی از نیروهای قدیمی تعدیل شدن و رفتن که خب میشه گفت حقوق های متوسط داشتن و بعد اون پوزیشن های اون افراد با استخدامی کالج و دانشجو ها پر شد و این روند خیلی اروم تو شرکت ظاهرا ادامه داشت و طبق خبرهایی هم که گرفتم از دوستان سابقم ظاهرا ادامه هم داره یعنی نیروهایی که پاشنه اشیل شرکت نیستن یا رفتن شون اسیب حادی وارد نمیکنه تعدیل میشن یا به خاطر سیاست شرکت خودشون میرن از شرکت و جاشون با یه نیرو دانشجو و حداقل حقوق پر میشه \r\nتا به نفع شرکت تموم بشه از لحاظ مالی ...البته این سیاست احتمالا در اینده ی نزدیک به این شرکت ضربه میزنه و فعلا مدیران ارشدش فکر میکنن استراتژی خوبی  اتخاذ کردن برای گرفتن نیرو جوون و  تازه کار و  اموزش بهش و استفاده به مدت چند سال با حقوق حدود قانون کار \r\nراستی این شرکت سیاست حفظ نیرو رو نداره کلا و به نیروش به جای اینکه به چشم سرمایه نگاه کنه به چشم ابزار نگاه میکنه ... پس شما هم سیاست تون این باشه اگه رفتین تو این شرکت به چشم ابزار نگاه کنین به این شرکت  و در اولین فرصت ایده ال تون از این شرکت خروج بزنین مثل کاری که من کردم و الان در شرکت جدیدم دو برابر اینجا میگیرم ‌‌‌...خب قسمت حقوق تموم شد و یه نکته هم اخرش میگم \r\n۲ تا از همکارام که قبل من از تیم های مختلف شرکت اخراج شدن و خیلی هم ناراحت بودن هر جفت شون توی شرکت با مزایا و حقوق خیلی بهتر از پارت استخدام شدن یعنی میخوام همون نکته خروج به موقع رو بگم و اینکه اصرار به نموندن توی این شرکت نداشته باشین البته گفتم با استراتژی برین نه اینکه بیکار کنین خودتون رو \r\nیه حرف پایانی اگه سنییور هستی و کار برات گیر میاد شرکت پارت نیا دوست من به نفعت نیست ممکنه یه درصد سال اول باهات خوب ببندن ولی سال بعدش برات خوب تموم نمیشه پس اگه مجبور نیستی نیا\r\n۵.مطلب بعدی رفاهیات این شرکت هست \r\nاتاق بازی دارن و کیفیتش خوبه انصافا \r\nخوراکی  فقط چای و ابجوش میدن .\r\nبرای شب عید و یلدا پک اجیل میدادن که بعد جنگ ۱۲ روزه ندادن و دوستان هم گفتن برای عید امسال هم چیزی ندادن \r\nیه جشن پایان سال دارن که اونم دوستان گفتن برای ۱۴۰۵ برگزار نشد \r\nعیدی رو هم دوستم گفت هنوز بعد ۴ ماه بهشون پرداخت نکردن ولی خب شو اف خوبی تو دانشگاه ها دارن و برای این کارها معمولا بودجه خوبی دارن \r\nغذا میدادن که اونم دوستم گفت چند ماهه حذف شده البته یه نکته برای غذا بگم خیلی جالبه  تو پارت میگفتن نصف هزینه غذا رو ما میدیم و نصف شو کارمند \r\nبعد میرفتن با فرا پخت قرارداد غذا میبستن یا رستوران متوسط .. فرا پخت که میدونین غذا اقتصادی میده بعدش تو سایت افیس مثلا میزد چلومرغ ۲۵۰ سهم کارمند ۱۲۵ یعنی نصفش در حالی که ۲۵۰ قیمت رستوران خوب مثل ریخته گر زاده بود تقریبا بعدش اون غذا رو اسنپ فود نگاه میکردی با همون کیفیت میزد ۱۳۰ تا ۱۴۰ البته خب گفتم فرا پخت اقتصادی و احتمالا همون ۱۲۵ باهاشون حساب میکرده این دوستان هم ضرب در ۲ میکردن که بگن نصفش رو ما میدیم این یه حرکت ناشایست تو این شرکت بود که کارمند رو خر فرض میکردن . البته من که غذا از شرکت نمیگرفتم ولی غذا با این وضعیت نمیدادین بهتر بود تا دادنش و منت گذاشتن که ما نصف شو از جیب میدیم در حالی که نمیدادین ...\r\nاینم رفاهیات که خب چیز خاصی نمیدن کلا \r\n۷.خب پیشرفت شغلی\r\nتو این شرکت دنبال پیشرفت و ارتقای شغلی زیاد نباشین مخصوصا تیم شبکه چون حاضرن برن یه نفر که صفر کیلومتر هست از بیرون بیارن و بهش اموزش بدن و تو موقعیت شغلی بهتر بزارن ولی همون جایگاه شغلی رو به شما که کارمند قدیمی تر هستی و منتظر ارتقا هستی و میتونی سریع تر تو اون جایگاه بری پیشنهاد ندن و اون نفر جدید میزارن تو جایگاه بالاتر از تو.. در کل پیشرفت تو این شرکت تا حد زیادی بستگی به شانس و اقبال داره نه یه روال استاندارد و دید مدیر تیم هاش مخصوصا مدیر تیم شبکه ...\r\nخب میرسیم به قسمت پرداخت حقوق ها \r\nتو شرکت پارت از اول سال یه ماه حقوق دیر پرداخت میشه ولی اخر سال ۲ تا حقوق میدن و تصفیه میکنن \r\nپرداخت حقوق ها در طی ماه نامنظم هست و بین ۱۰ تا ۲۵ ماه پراخت میشه .. اینم از قسمت حقوق که نامنظمی داره در ماه\r\nخب سعی کردم خیلی کامل باشه و منصفانه که  به درد دوستان بخوره که میخواین بیان این شرکت\r\nراستی یه حرفی هم دارم با اقای منصوری مدیر عامل شرکت پارت \r\nاول اینکه شرکت پارت اقای منصوری شرکت بزرگی هست و چالش های خاص خودش رو برای سرپا موندن تو این شرایط داره میدونم و درک میکنم منظورم از این حرفم شرایط الان نیست به نیرو به چشم سرمایه در عمل نگاه کن نه در حرف \r\nبعدش هم شما سیدی و ادم مذهبی چرا تو دانشگاه ها و همایش ها میگی ما جنگ دوازده روزه هیچ  کسی رو اخراج نکردیم و به این افتخار میکنی در حالی که به سرپرست کلی از تیم ها فشار اوردی و حدود ۷۰ تا ۱۰۰ نفر رو تعدیل کردین درسته نسبت به شرکت های دیگه کمتر بود ولی بود پس  درست نیست ادعای تعدیل نکردن بکنی ولی در کل ادم خوبی هستی و امیدوارم این نقد های اینجا رو برای بهتر شدن سازمانت بیطرفانه بررسی کنی چون دلم نمیخاد اون شرکت از هم بپاشه چون برای کلی نیرو جوون تجربه و اورده داشته و حداقل بهشون سابقه کار و اموزش داده این حرکت تو که به قشر دانشجو اعتماد کردین تو سطح مدیریت تحسین میکنم ولی این نباید به سو استفاده ختم بشه .\r\nراستی یه نکته اخر : برای خانوم ها این شرکت میتونه امن و خوب باشه چون از نظر محیطی سالم و تقریبا بدون حاشیه هست مگه بعضی از دوستان خودشون دنبال حاشیه باشن \r\n\r\n\r\n\r\n\r\n"
