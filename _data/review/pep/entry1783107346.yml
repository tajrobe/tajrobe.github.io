description: "فرآیند مصاحبه ها رو با عنوان مالک محصول فنی جلو رفتیم و همه چیز اوکی بود تا زمانیکه از منابع انسانی باهام تماس گرفتن برای اعلام آفر حقوق و ست کردن تایم برای امضای قرارداد. زمانیکه که بعد از آفر عنوان رو گفتن شک کردم و ازشون پرسیدم اشتباهی صورت گرفته تو عنوان شغلی که اعلام کردن میرن میپرسن درحالیکه من با شخص فراموشکار پشت خط هم مصاحبه داشتم و عنوان موقعیت شغلی مالک محصول فنی مطرح شده بود ابراز تعجب کردن که برای من هم این ری اکشنشون عجیب بود. با این حال گفتن میرن بپرسن و وقتی مجدد تماس گرفتن گفتن کارها مشابه هست و اون موقعیت شغلی رو با یکی از آشنایانشون پر کردن به تازگی. اولین تجربه من بود که تمام مراحل با عنوان مالک محصول فنی بود و حتی اعلام کرده بودن که منتظر حضور بنده تو تیم هستن ولی نتیجه این شد. و حتی یه جورایی داشتن من رو گسلایت میکردن. جای تاسف و ناراحتی داره هدر دادن زمان افراد و جذب لحظه آخری از آشنایانشون در صورتیکه به بنده تایید رو داده بودن."
