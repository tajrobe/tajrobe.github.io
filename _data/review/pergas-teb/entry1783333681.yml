description: "من به مدت ۸ ماه تو این شرکت مدیر برند بودم و بدترین تجربه‌ی کاربم بود.\r\nمن از این شرکت بسیار بد شنیده بودم و موقع مصاحبه هم عنوان کردم.\r\nمعاونت مارکتینگ آقای رضا ثابت گفتن که همش دروغه و ما خیلی خوبیم و حقوق عقب نیست و پنجشنبه مشکلی نیست اگر نیاین.\r\nوقتی رفتم شرکت دروغ های آقای ثابت یک به یک مشخص شد،به من هم فشار آوردن که برای جذب نیرو دروغ بگم ولی چون من همکاری نکردم با من هم لج کردند و مدام به بهانه های مختلف کسر کار و کم کردن حقوق و محیط کار ناسالم و پرتنش ایجاد کردند.\r\nبا من توافق کرده بودن ماهیانه ۳۵ میلیون بونس( تاکید کردند هر ماه پرداخت میشه), که بعد خودشون حرفشون رو تغییر دادن ۳۰ تومن و الان بعد از ۸ ماه که من از اون شرکت اومدم بیرون رنگ زدن به من بیا تسویه و هیچکدوم از kpi ها هم لحاظ نشده.\r\nدوستان عاقل باشید و تو این شرکت دزد کارنکنین و اگر هم رفتیم قطعا با مارکتینگ و آقای ثابت کار نکنین،ایشون سردسته‌ی همه‌ی اتفاقات ناخوشایند سازمان و مواردی هستن که نمیتونم بگم(میسپارم به ذهن خودتون)\r\n\r\n"
