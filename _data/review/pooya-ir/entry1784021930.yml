description: "سالها توی این شرکت کار کردم\r\nتیم های مختلفی داره که همه توی حوزه بانکی هستند ولی شرکت شناخته شده ای نیست\r\nتیم سخت افزار داره که سخت افزارهای شبیه خودپرداز میسازند\r\nتیم سوئیچ داره که سوئیچ های چند تا بانکو داره توسعه و پشتیبانی میده\r\nتیم ارزی داره که واسط ارزی چندین بانک رو داره انجام میده\r\nتیم حساب های متمرکز داره که هسته مرکزی یکی از بانک های کشوره\r\nفضا کمی قدیمیه و مقاومت هایی برای استفاده از تکنولوژی های روز دنیا وجود داره\r\nاکثرا افراد قدیمی قدرت رو دست گرفتن و معمولا کسی رو راه نمیدن\r\nجدیدا وارد بورس شده و مجبور شده صورت های مالی رو شفاف کنه\r\nحقوق و مزایای متوسط رو پایین نسبت به بقیه شرکت های مشابه می پردازه\r\nسالن غذاخوری روی پشت بومش داره که خیلی جذابه و صبحونه و سالاد میده به کارمندا\r\nمسابقات سالانه برگزار می کنه مثل شطرنج و دارت و تخته\r\nفضا دوستانه است\r\nوام هم یه صندوق قرض الحسنه داره و به بانک ها هم معرفی میکنه ولی خیلی بدرد بخور نیستن\r\nاگه بتونید لینکی اونجا پیدا کنید و از طریق اون وارد بشین معمولا امکان پیشرفت دارید ولی صلاحیت فنی خیلی اونجا ملاک نیست و افراد بدرد بخوری مسئولیت ها رو بعهده نگرفتن، به جز تیم ارزی وکه تیم مدیریتش با بقیه تیم ها فرق داره و آدم های بدردبخوری اونجان\r\nبیمه تکمیلیش هم خیلی اذیت میکنن و خودشون فاکتور رو ازت میگیرن و پرداخت میکنن و عملا بدرد نمی خوره\r\nحقوق هارو کمی دیر(مثلا پنجم ماه) پرداخت می کنن تا توی بانک بخوابونن و خودشون وام بگیرن"
