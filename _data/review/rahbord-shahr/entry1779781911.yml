description: "اگر به بازی مافیا علاقه دارید، راهبرد هوشمند شهر می‌تواند یکی از جدی‌ترین زمین‌های تمرین باشد؛ البته نه از آن مافیاهایی که آخر شب تمام می‌شود، همه می‌خندند و می‌روند خانه. این‌جا بازی وسط ساعت کاری جریان دارد. کارت نقش دست کسی نیست، اما نقش‌ها کاملاً پیداست. کسی رسماً نمی‌گوید مافیا بیدار شود، ولی بعضی‌ها همیشه زودتر از بقیه خبر دارند چه کسی قرار است حذف شود.\r\n\r\nدر بازی مافیا، شهروند فکر می‌کند اگر درست حرف بزند، تناقض‌ها را نشان بدهد و به نفع شهر رأی بدهد، بازی عوض می‌شود. در بعضی سازمان‌ها هم آدم همین تصور را دارد: فکر می‌کند اگر کار کند، اگر ایده بدهد، اگر مسئله‌ای را محترمانه مطرح کند، اگر برای بهتر شدن سیستم وقت بگذارد، بالاخره دیده می‌شود. بعد کم‌کم می‌فهمد مسئله فقط کار نیست. مسئله این است که در کدام حلقه‌ای، چه کسی پشتت ایستاده، چه کسی روایتت را می‌سازد و چه کسی می‌تواند قبل از اینکه حرفت شنیده شود، معنی حرفت را عوض کند.\r\n\r\nراهبرد هوشمند شهر از بیرون یک شرکت رسمی و بانکی به نظر می‌رسد؛ با عنوان‌های شیک، پروژه‌های مهم، محصولاتی مثل اسمارتیز، ساختار مدیریتی، معاونت‌ها، منابع انسانی و کلی واژه‌های مرتب سازمانی. اما از داخل، مخصوصاً وقتی چند وقت در فضا بمانی و روندها را پشت سر هم ببینی، متوجه می‌شوی کنار ساختار رسمی، یک ساختار واقعی‌تر هم هست؛ ساختاری که در چارت دیده نمی‌شود، اما روی آدم‌ها، فرصت‌ها، حذف‌ها، ماندن‌ها و روایت‌ها اثر می‌گذارد.\r\n\r\nشهر روی کاغذ؛ بازی در پشت صحنه\r\n\r\nروی کاغذ، همه‌چیز ساده است. مدیرعامل هست، معاونت‌ها هستند، منابع انسانی هست، تیم فنی هست، مدیر مستقیم هست، مسیر اداری هست. اما تجربه روزمره چیز دیگری نشان می‌دهد. بعضی تصمیم‌ها ظاهراً از مسیر رسمی می‌آیند، ولی ردشان را که بگیری، به رابطه‌ها، رفاقت‌ها، کانال‌های قدیمی، آدم‌های دست‌چین‌شده و روایت‌های پشت‌صحنه می‌رسی.\r\n\r\nدر این فضا، نقش‌ها شبیه بازی مافیاست:\r\n\r\n- شهروندهایی هستند که واقعاً کار می‌کنند، اما قدرت روایت ندارند.\r\n- کسانی هستند که همیشه به مرکز قدرت نزدیک‌اند و از هر رأی‌گیری جان سالم به در می‌برند.\r\n- کسانی هستند که فقط حرف منتقل نمی‌کنند؛ معنی حرف‌ها را هم جابه‌جا می‌کنند.\r\n- منابع انسانی روی کاغذ باید راوی بی‌طرف باشد، اما در عمل همیشه این حس را نمی‌دهد.\r\n- مدیرهایی هستند که حرف‌ها را می‌شنوند، ولی شنیدنشان الزاماً به اقدام تبدیل نمی‌شود.\r\n- و کسانی هم هستند که در ظاهر فقط یک نقش فنی دارند، اما در واقعیت مثل بازوی اجرایی یک شبکه غیررسمی عمل می‌کنند.\r\n    \r\n\r\nمحور غیررسمی قدرت\r\n\r\nیکی از چهره‌های اصلی این فضا **ک.ز** است؛ کسی که عنوان رسمی‌اش در دوره‌های مختلف تغییر کرده، اما آنچه از نزدیک دیده می‌شود، فقط عنوان نیست. مسئله، میزان نفوذ غیررسمی او در تصمیم‌ها، آدم‌ها، ترکیب تیم‌ها و روندهای سازمانی است.\r\n\r\nکنار او، **پیمان خسروی** قرار دارد؛ کسی که در شرکت با نام پیمان شناخته می‌شود، هرچند درباره نام اصلی او میان بچه‌ها گفته می‌شود که جواد است و ترجیح می‌دهد پیمان صدا شود. نقش رسمی او یک نقش فنی است، اما اثر واقعی‌اش در فضای تیمی، فراتر از یک نقش معمولی فنی دیده می‌شود. او فقط کار را جلو نمی‌برد؛ آدم‌ها را هم در مدار خودش نگه می‌دارد.\r\n\r\nدر کنار این دو، **ا.س** هم حضور پررنگی دارد؛ کسی که به‌عنوان فرد نزدیک به ک.ز شناخته می‌شود و نقش او فقط یک نقش اداری ساده به نظر نمی‌رسد. در خیلی از موقعیت‌ها این حس ایجاد می‌شود که بخشی از هماهنگی‌ها، برداشت‌سازی‌ها و جابه‌جایی روایت‌ها از مسیر چنین آدم‌هایی انجام می‌شود؛ آدم‌هایی که شاید روی کاغذ تصمیم‌گیر نهایی نباشند، اما در ساختن فضای ذهنی تصمیم‌گیرها نقش دارند.\r\n\r\n**ا.خ** هم از همان چهره‌هایی است که نامش در چند روایت و چند فضای مسئله‌دار تکرار می‌شود. درباره رفتارها و حاشیه‌های او حرف‌های زیادی در شرکت شنیده می‌شود؛ نه از جنس یک شایعه ساده، بلکه از جنس چیزهایی که وقتی کنار هم قرار می‌گیرند، تصویری نگران‌کننده می‌سازند. مسئله این است که بعضی افراد هرقدر هم اطرافشان حرف و حاشیه باشد، باز هم در حاشیه امن می‌مانند.\r\n\r\nتیم فنی یا تیم دست‌چین؟\r\n\r\nیکی از چیزهایی که در شرکت از نزدیک دیده می‌شود، اهمیت عجیب رابطه در شکل گرفتن تیم‌هاست. طبیعی است که آدم‌ها در کار، همکار قدیمی یا معرف داشته باشند. معرفی نیرو به‌خودی‌خود چیز بدی نیست. خیلی وقت‌ها حتی خوب است؛ چون آدم‌ها از تجربه قبلی همدیگر خبر دارند و اعتماد اولیه راحت‌تر شکل می‌گیرد.\r\n\r\nمسئله از جایی شروع می‌شود که این معرفی‌ها جهت‌دار می‌شود؛ وقتی ورود آدم‌ها فقط برای پر کردن یک نیاز فنی نیست، بلکه برای تقویت یک حلقه، محکم کردن یک شبکه شخصی و ساختن تیمی است که بیشتر از سازمان، به یک نفر وفادار باشد.\r\n\r\nدر مورد پ.خ، این برداشت بین خیلی‌ها وجود دارد که دوست دارد تیم اطرافش دست‌چین خودش باشد. **ا.ی** و **ه.خ** به‌عنوان دوستان قدیمی چندساله او شناخته می‌شوند. **و.ح** هم آشنای نزدیک اوست. درباره بعضی افراد دیگر هم سابقه همکاری قبلی، معرفی از مسیر آشنا، یا ورود از راه شبکه‌های قدیمی مطرح است.\r\n\r\nدر چنین فضایی، کسی که از حلقه نزدیک نباشد، حتی اگر خوب کار کند، همیشه باید بیشتر از بقیه خودش را ثابت کند. اما کسی که داخل حلقه است، خیلی وقت‌ها قبل از اینکه چیزی ثابت کند، پذیرفته شده است.\r\n\r\nسبک مدیریت؛ وقتی کار تبدیل به فرمان می‌شود\r\n\r\nرابطه پ.خ با نیروهای زیرمجموعه و اطرافش، در بسیاری از موقعیت‌ها بیشتر شبیه رابطه آموزشی و فنی نیست؛ بیشتر رنگ و بوی امری و فرمان‌محور دارد. آدم‌ها باید هماهنگ باشند، خبر بیاورند، از خط بیرون نزنند و بیش از حد مستقل دیده نشوند.\r\n\r\nدر چنین مدلی، حتی ارتباط معمولی با دیگران هم می‌تواند حساسیت‌زا شود. اگر کسی با فردی خارج از حلقه گرم بگیرد، اگر مستقیم با مدیری صحبت کند، اگر ایده‌ای مستقل مطرح کند یا اگر از مسیر کنترل‌شده عبور نکند، کم‌کم وارد محدوده توجه می‌شود. نه همیشه با برخورد مستقیم؛ گاهی با سرد کردن اطرافیان، گاهی با تغییر دادن برداشت مدیرها، گاهی با ساختن یک تصویر تازه از آدم.\r\n\r\nدر بازی مافیا به این می‌گویند بازی پشت پرده. در شرکت، اسمش می‌شود هماهنگی، گزارش، برداشت مدیریتی یا ارزیابی.\r\n\r\nمنابع انسانی؛ جایی که باید سرمایه انسانی را ببیند\r\n\r\nبعضی‌ها با منابع انسانی صحبت کردند. نه برای دعوا، نه برای جنجال، نه برای اینکه کسی را زمین بزنند. رفتند چون انتظار داشتند منابع انسانی با آدم‌ها مثل سرمایه انسانی برخورد کند؛ جایی باشد برای شنیدن، فهمیدن، آرام کردن فضا، جلوگیری از فرسایش و نگه داشتن نیرویی که هنوز می‌تواند برای سازمان ارزش بسازد.\r\n\r\nاما چیزی که در عمل دیده می‌شود، همیشه این نیست. گاهی آدم حس می‌کند منابع انسانی بیشتر از اینکه پناه باشد، یک ایستگاه عبور اطلاعات است. آدم حرف می‌زند، توضیح می‌دهد، سعی می‌کند تصویر واقعی‌تری بدهد، اما بعد از مدتی می‌بیند اثر آن گفت‌وگو در تصمیم‌ها و روایت‌هایی ظاهر می‌شود که لزوماً به نفع نیروی انسانی نیست.\r\n\r\nدر این میان، **م.م** به‌عنوان چهره مهم منابع انسانی، نقش حساسی دارد. درباره او این برداشت وجود دارد که به جای ایستادن در نقطه بی‌طرف و حمایتی، بیشتر در امتداد همان شبکه قدرت حرکت می‌کند. مسئله فقط این نیست که تصمیمی گرفته می‌شود؛ مسئله این است که آدم‌ها حس می‌کنند حرف‌هایشان شنیده می‌شود، اما در نهایت به زبان دیگری به سمت همان مرکز قدرت برمی‌گردد.\r\n\r\nتلخی ماجرا همین‌جاست: شهروندها به راوی بازی اعتماد می‌کنند، اما بعد می‌بینند روایت نهایی را کسانی نوشته‌اند که خودشان یک طرف بازی‌اند.\r\n\r\nمدیرعامل؛ شنیدن بدون تغییر دادن بازی\r\n\r\nدرباره **م.ن** برداشت غالب این است که حرف‌ها را می‌شنود. یعنی نمی‌شود گفت هیچ چیز به گوش او نمی‌رسد. اتفاقاً خیلی‌ها با او حرف زده‌اند، مسئله گفته‌اند، نگرانی مطرح کرده‌اند، تصویر داده‌اند. اما شنیدن، همیشه به تغییر منجر نشده است.\r\n\r\nمشکل از جایی شروع می‌شود که موضوعات مهم دوباره به همان مسیرهایی برمی‌گردند که خودشان بخشی از مسئله‌اند. وقتی کسی می‌رود حرف می‌زند و بعد می‌بیند تصمیم باز هم از همان کانال‌های قبلی عبور می‌کند، کم‌کم به این نتیجه می‌رسد که مسیر رسمی بیشتر شبیه یک دور باطل است.\r\n\r\nدر بازی مافیا، گاهی همه شهروندها حرف می‌زنند، اما چون گرداننده بازی در عمل بی‌طرف نیست، نتیجه همان می‌شود که باید بشود.\r\n\r\nوقتی ابتکار عمل تهدید تلقی می‌شود\r\n\r\nدر این شرکت، یک الگوی تکراری دیده می‌شود: اگر کسی فقط کار روتین خودش را انجام بدهد و خیلی دیده نشود، معمولاً دردسر کمتری دارد. اما اگر کسی بخواهد کمی جدی‌تر فکر کند، پیشنهاد بدهد، ایراد ساختاری را نشان بدهد، برای بهتر شدن کارها انرژی بگذارد یا تصویری دقیق‌تر از وضعیت بسازد، ممکن است ناخواسته وارد محدوده حساسیت شود.\r\n\r\nاینجا مسئله شخص خاصی نیست. مسئله یک الگوست. گاهی خروجی خوب به جای اینکه تبدیل به فرصت سازمانی شود، تبدیل می‌شود به سؤال: چرا این آدم دارد دیده می‌شود؟ چرا مستقیم فکر می‌کند؟ چرا از چارچوب نانوشته بیرون زده؟ چرا فقط همان کاری را نمی‌کند که از او خواسته شده؟\r\n\r\nبعد از آن، مسیر آشناست: اول برداشت‌ها عوض می‌شود، بعد اعتماد کم می‌شود، بعد آدم از حلقه ارتباطات کنار گذاشته می‌شود، بعد تصمیم اداری می‌آید. روی کاغذ شاید اسمش چیز دیگری باشد؛ اما از داخل، شبیه حذف آرام است.\r\n\r\nخروج‌ها؛ تصمیم کاری یا رأی‌گیری شبانه؟\r\n\r\nوقتی یک نفر از شرکت خارج می‌شود، شاید بشود گفت تصمیم کاری بوده. وقتی چند نفر با الگوی مشابه کنار گذاشته می‌شوند، دیگر سؤال جدی‌تر می‌شود. مخصوصاً وقتی آدم‌هایی که سؤال می‌پرسند، مستقل‌اند، به حلقه نزدیک وصل نیستند یا سعی می‌کنند مسیر رسمی را امتحان کنند، بیشتر از بقیه در معرض خروج قرار می‌گیرند.\r\n\r\n**م.ق** و ... یکی از اولین نمونه‌های تلخ این روند بود. او وارد مرحله خروج شد، امضا کرد و بعد از ورود به ساختمان منع شد. جزئیاتش هرطور روایت شود، پیامش برای بقیه روشن بود: اگر از بازی بیرون افتادی، حتی شکل خروجت هم می‌تواند تحقیرآمیز باشد.\r\n\r\nبعد از او، نگرانی درباره افراد دیگری هم جدی‌تر شد. **س.م** از قدیمی‌ترین نیروهای شرکت است و سال‌ها در مجموعه مانده، اما همین سابقه هم وقتی بیرون حلقه باشی الزاماً سپر محافظ نیست. **ا.ز** هم در همین فضای فشار و حذف آرام قرار گرفت. درباره **ن.ق** گفته می‌شد مدتی در معرض همین فضا بود، اما مسیر کاری‌اش با پروژه‌ای جدا تغییر کرد و از فشار مستقیم فاصله گرفت.\r\n\r\nدر بازی مافیا، اگر شهروندهای فعال یکی‌یکی حذف شوند، شهر می‌ماند و کسانی که خوب بلدند رأی‌ها را بچرخانند.\r\n\r\nحاشیه‌هایی که هیچ‌وقت واقعاً حاشیه نیستند\r\n\r\nدر شرکت، بعضی روایت‌ها آن‌قدر تلخ و سنگین‌اند که نمی‌شود جزئیاتشان را در یک تجربه کاری عمومی نوشت. نه به‌خاطر اینکه مهم نیستند؛ اتفاقاً به این خاطر که مهم‌اند و نباید با چند خط متن عمومی سبک شوند یا بهانه دست کسی بدهند.\r\n\r\nاما یک چیز را می‌شود گفت: وقتی درباره بعضی رفتارها، بعضی رابطه‌ها، بعضی برخوردها و بعضی آدم‌های همیشه‌درحاشیه‌امن، روایت‌های تکرارشونده شکل می‌گیرد، سازمان نمی‌تواند وانمود کند هیچ چیز نمی‌بیند. حتی اگر کسی نخواهد وارد جزئیات شود، خود تکرار این حس که «بعضی‌ها هر کاری کنند مصون‌اند»، برای خراب شدن اعتماد کافی است.\r\n\r\nاین‌جا مسئله فقط یک اتفاق یا یک نفر نیست. مسئله این است که وقتی فضا طوری باشد که افراد مسئله‌دار همچنان محفوظ بمانند و افراد معترض یا مستقل فرسوده شوند، آدم‌ها کم‌کم یاد می‌گیرند سکوت امن‌تر از حقیقت است.\r\n\r\nرابطه‌ها، تعارض منافع و چیزهایی که همه می‌بینند\r\n\r\nزندگی خصوصی آدم‌ها به خودشان مربوط است. این اصل روشن است. اما وقتی رابطه شخصی وارد محیط کار، جایگاه شغلی، حمایت، چیدمان فیزیکی، امنیت و فرصت‌های سازمانی می‌شود، دیگر فقط موضوع خصوصی نیست.\r\n\r\nدرباره رابطه پ.خ و **م.ک** در شرکت حرف زیاد است. مسئله فقط اصل رابطه نیست؛ مسئله این است که وقتی در یک فضای کاری، نزدیکی شخصی با اثر سازمانی همراه شود، بقیه نیروها طبیعی است احساس بی‌عدالتی کنند. مخصوصاً وقتی چیدمان نشستن، اشراف دیداری، حمایت و جایگاه تیمی هم کنار آن قرار بگیرد.\r\n\r\nشاید هرکدام از این‌ها جداگانه کوچک به نظر برسد. اما در محیطی که رابطه‌محوری و دست‌چینی تیم از قبل حس می‌شود، همین نشانه‌های کوچک برای آدم‌ها معنی بزرگ پیدا می‌کند.\r\n\r\nمسیر ورود آدم‌ها؛ معرفی طبیعی یا ساخت شبکه؟\r\n\r\nهیچ اشکالی ندارد که کسی از مسیر معرفی وارد شرکت شود. در بازار کار، معرفی آدم خوب چیز عجیبی نیست. حتی می‌تواند به نفع سازمان باشد، اگر شفاف، منصفانه و بر پایه شایستگی باشد.\r\n\r\nمسئله از جایی شروع می‌شود که معرفی‌ها تبدیل به ابزار ساخت شبکه می‌شود؛ وقتی آدم‌ها نه فقط برای توانایی، بلکه برای نزدیکی، وفاداری، هماهنگی و تقویت یک نظم غیررسمی وارد می‌شوند. آن‌وقت شرکت کم‌کم به‌جای اینکه تیم بسازد، حلقه می‌سازد.\r\n\r\nدر روایت‌های داخلی، از **ح.** به‌عنوان یکی از کانال‌های بالادستی ورود بعضی افراد یاد می‌شود. نام‌هایی مثل **م.م** و **ک.ز** هم در همین زمینه مطرح‌اند. این‌که آدمی از مسیر یک نفر معرفی شود، به‌خودی‌خود ایراد نیست. ایراد وقتی شروع می‌شود که این مسیرها به شکل سیستماتیک به تحکیم قدرت یک حلقه خاص کمک کند.\r\n\r\nویترین رسمی، تصمیم غیررسمی\r\n\r\nیکی از برداشت‌های جدی در شرکت این است که **ک.ز** بسیاری از کارها را با ویترین **پ.خ** جلو می‌برد. یعنی پ.خ در سطح تیم و عملیات دیده می‌شود، اما قدرت اصلی و حمایت بالادستی از جای دیگری می‌آید. این مدل بسیار خطرناک است، چون اگر کسی اعتراض کند یا آسیب ببیند، ظاهر ماجرا تیمی و فنی نشان داده می‌شود، اما ریشه تصمیم و حمایت در لایه بالاتر است.\r\n\r\nپ.خ برای خیلی‌ها چهره روزمره این فشارهاست؛ اما چنین نقشی بدون سکوت، حمایت یا همراهی بالادستی نمی‌تواند تا این حد دوام بیاورد.\r\n\r\nاگر می‌خواهید وارد این شرکت شوید\r\n\r\nاگر قصد ورود به راهبرد هوشمند شهر را دارید، فقط درباره حقوق، بیمه، پروژه یا عنوان شغلی سؤال نکنید. حتماً بفهمید:\r\n\r\n- تیم واقعاً با چه کسی می‌چرخد؟\r\n- مدیر رسمی شما کیست و تصمیم واقعی دست کیست؟\r\n- چند نفر در یک سال اخیر خارج شده‌اند؟\r\n- مسیر منابع انسانی واقعاً چقدر حمایتی است؟\r\n- اگر سؤال بپرسید، شنیده می‌شوید یا نشانه‌گذاری؟\r\n- رشد با کار اتفاق می‌افتد یا با نزدیک شدن به حلقه درست؟\r\n- وقتی آدمی مستقل فکر کند، فرصت می‌گیرد یا کم‌کم از بازی بیرون می‌رود؟\r\n    \r\n\r\nاین شرکت آدم‌های خوب هم دارد. نیروهای شریف، فنی، زحمت‌کش و سالم کم نیستند. مشکل این است که در بعضی نقطه‌ها، ساختار غیررسمی آن‌قدر قوی می‌شود که آدم‌های خوب یا سکوت می‌کنند، یا فرسوده می‌شوند، یا یکی‌یکی کنار می‌روند.\r\n\r\nجمع‌بندی\r\n\r\nراهبرد هوشمند شهر برای کسی که از داخل نگاه می‌کند، فقط یک شرکت فناوری بانکی نیست. یک نمونه زنده از این است که چطور ساختار رسمی می‌تواند سر جایش باشد، اما تصمیم واقعی جای دیگری گرفته شود. چطور منابع انسانی می‌تواند وجود داشته باشد، اما آدم‌ها احساس حمایت نکنند. چطور مدیر می‌تواند بشنود، اما چیزی عوض نشود. چطور گزارش، ایده و ابتکار عمل می‌تواند به جای فرصت، تبدیل به خطر شود.\r\n\r\nاگر به بازی مافیا علاقه دارید، شاید اینجا برایتان جذاب باشد. فقط فرقش این است که این بازی با کارت و خنده و نقش‌های خیالی تمام نمی‌شود. اینجا ممکن است آدم‌ها با امنیت روانی، اعتبار حرفه‌ای، انگیزه و چند سال از عمر کاری‌شان هزینه بدهند.\r\n\r\nمزایا\r\n\r\n- بیمه تکمیلی\r\n- پرداخت حقوق نسبتاً منظم\r\n- وجود پروژه‌های بانکی و فنی مهم\r\n- امکان یادگیری از سامانه‌های واقعی و پیچیده\r\n- حضور بعضی نیروهای واقعاً خوب، شریف و توانمند\r\n    \r\n\r\nمعایب\r\n\r\n- امنیت روانی پایین در اکثر تیم‌ها\r\n- اثرگذاری شدید شبکه‌های غیررسمی\r\n- رابطه‌محوری و دست‌چینی نیروها\r\n- ضعف منابع انسانی در حمایت واقعی از نیروها\r\n- شنیده شدن حرف‌ها بدون اقدام مؤثر\r\n- تبدیل شدن ابتکار عمل به تهدید\r\n- حذف آرام نیروهای مستقل\r\n- چرخیدن تصمیمات پشت عنوان‌های رسمی\r\n- شائبه تعارض منافع در رابطه‌ها و چیدمان تیم‌ها\r\n- بی‌اعتمادی به مسیرهای رسمی رسیدگی\r\n- و خیلی خیلی موارد دیگر\r\n    \r\n\r\nتوصیه نهایی\r\n\r\nاگر وارد این شرکت می‌شوید، فقط قرارداد را نخوانید؛ نقشه قدرت را هم بخوانید. ببینید چه کسی واقعاً تصمیم می‌گیرد، چه کسی فقط امضا می‌کند، چه کسی روایت می‌سازد، چه کسی اطلاعات جمع می‌کند، چه کسی سکوت می‌کند و چه کسی همیشه از رأی‌گیری جان سالم به در می‌برد.\r\n\r\nچون در بعضی سازمان‌ها، مشکل این نیست که شهروندها کم‌اند؛ مشکل این است که شهر خیلی وقت است دست مافیاست."
date: 1779781911