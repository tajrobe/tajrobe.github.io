description: "سلام\r\nتمام نکاتی که عنوان میکنم تجربه کاری و شخصی من در این مجموعه هست و از هجوگویی و اغراق پرهیز میکنم.\r\nنکته اول اینکه به طور قطع تمام نظرات مثبتی که مشاهده میشه و امتیاز بالا داده شده مستقیما توسط خود مدیر عامل شرکت (آقای م.ش) هست جهت تطهیر و بزک وجهه نامطلوب و فاسد مجموعه.\r\nنکته دوم اینکه اگه کارمند خانم باشید و مجرد و مضاف بر اون اگه خانواده تون در تهران نباشن، مدیر شرکت (با ذهنیت دختر شهرستانی بودن و بی کس و کار بودن) با ادعای علاقه و وعده خواستگاری و ازدواج سعی میکنه شمارو به یکی از خونه های خالی که در تهران برای سرمایه گذاری خریده هدایت کنه، البته جلسه اول خارج از شرکت و در یک کافه و مکان عمومی با هدف اعتمادسازی انجام میشه . نتیجاتا چه با پیشنهاد و تطمیع، چه با تهدید و زور سعی میکنه از خانم ها سواستفاده کنه. خلاصه که خانم ها خیلی مراقب باشین، لطفا.\r\nنکته سوم اینکه ایشون به اصطلاح آقازاده (حیف نون زاده) هست و تمام پروژه ها با رانت و فشار بر مدیران سایر شرکت ها گرفته میشه و اینو زمانی میفهمید که به عنوان کارشناس و پشتیبان سر پروژه ها رفته باشین.\r\nنکته چهارم اینکه پی سنوات و حق و حقوق پایان کارتون رو به تنتون بمالید و وارد این شرکت بشید.\r\n\r\nفعلا تا اینجا حوصله داشتم بگو، شاید در آینده بیشتر بگم"
