description: "سلام\r\nتجربه من از کار کردن تو این شرکت افتضاح بود\r\nبزرگ‌ترین مشکل اینجا مدیریت و نحوه برخوردهاست. رفتارها اصلا حرفه‌ای نیست و به جای اینکه مشکلات درست حل بشن، بیشتر باعث فشار و استرس روی کارمندها می‌شن. بعد از یه مدت حس می‌کنی بیشتر داری تلاش می‌کنی شرایط رو مدیریت کنی تا اینکه واقعاً روی کارت تمرکز کنی.\r\nحجم کار بیش از اندازه بالاست، ولی مسئله فقط زیاد بودن کار نیست؛ اخلاق فوق العاده بد مدیر عامل کلا انرژی آدم رو میگیره و باعث میشه تا آخر اون روز نتونی درست کار کنی.\r\nاز نظر حقوق و مسائل مالی هم تجربه خوبی نداشتم. پرداخت‌ها با تأخیر انجام می‌شد و دو بخشی بودن حقوق هم باعث می‌شد آدم تصویر دقیقی از وضعیت پرداخت‌ها نداشته باشه.\r\nضمنا عیدی ناقص پرداخت میشه و سنوات هم که کلا درسته حسابی پرداخت نمیشه.\r\nبد تر از همه گرفتن سفته سفید امضا در شروع همکاری بود. با استفاده از اون هر وقت کوچکترین اشتباهی می کردی با به اجرا گذاشتن سفته تهدید میشدی و استرس میگرفتی.\r\nدر کل به نظرم به قول دوستی که پایین تر گفته گرسنگی بکشید و وارد این شرکت نشید.\r\nموفق باشید"
