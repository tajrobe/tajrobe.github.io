description: "فرآیند مصاحبه شامل سه مرحله فنی، منابع انسانی و گفتگو با مدیرعامل است.\r\nمصاحبه فنی آنلاین برگزار شد. سؤال‌ها به‌صورت بداهه مطرح می‌شد و ساده بود. برخورد تیم فنی صمیمی و دوستانه بود.\r\nمصاحبه دوم حضوری بود و پیش از جلسه آزمونی برگزار شد که اهم آن معطوف به کار کردن بیش از زمان اداری، تحمل انجام کارهای تکراری، مابعدالطبیعه، دین و سیاست بود.\r\nجلسه با حضور دو تن از مدیران نرم‌افزاری و یک کارشناس منابع انسانی برگزار شد و بیش از ۲٫۵ ساعت طول کشید. اکثر سؤال‌ها به‌شکل وسواس‌گونه‌ای پیرامون فواصل بین همکاری‌ها، طول تحصیل و علت جابه‌جایی بین شرکت‌ها متمرکز بود. این در حالی است که طول تحصیلات من هیچ‌گاه از حد استاندارد بیش از یک سال نبوده و در تجربه اخیر کاری خود بیش از ۲٫۵ سال مشغول بودم. فضای گفت‌وگو پر از بی‌اعتمادی و عدم توازن میان طرفین بود. بی‌توجهی و بی‌میلی یکی از مدیران در سراسر جلسه و در نهایت نشان دادن برگهٔ خروج من به کارشناس منابع انسانی جهت اعلام تلویحی اتمام جلسه و ترک زودهنگام اتاق ناراحت‌کننده بود. در انتها زمان کافی داده شد تا در مورد مدیریت پروژه و تیم هر آنچه می‌خواستم بپرسم."
