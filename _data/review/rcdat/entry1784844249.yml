description: "من چند سال توی این شرکت کار کردم. تجربه من از اینجا این موارد بود:\r\n۱. عدم توجه به علاقمندی ها و توانایی ها و رزومه و عدم تناسب کار محوله با آن ها\r\n۲. برخوردهای نامناسب و طلبکارانه مدیر مستقیم\r\n۳. عدم رعایت احترام و شفاف سازی موقع اتمام همکاری\r\n۴. تبعیض آشکار بین نیروهای خانم و آقا و حتی بین نیروهای خانم در توجه و پیگیری دغدغه هاشون و همچنین کیفیت کارهای محوله.\r\n۵. مدیران مستبد، انتقاد ناپذیر، بی هدف و بی تدبیر. بنده فقط به خاطر بیان دغدغه هام تهدید به قطع همکاری میشدم.\r\n۶. هیچ شایسته سالاری وجود نداره. رییس این شرکت دختر خودشو اورده و از اون طرف بقیه نیروهارو به راحتی تعدیل میکنه. رییس پژوهشکده امنیت سخت افزار زن خودشو کرده مدیر. بعضی کارمندا اختیار دارن دوستای خودشونو اینجا بیارن. کاملا یه محیط پارتی بازی و فامیل بازی. حتی تغییر مدیرانش هم بر پایه زیرآب زنی هست بدون توجه به شایسته سالاری. ما موقع ورودمون یه مدیر خوب داشتیم ک با توطئه برکنارش کردن تا خودشون قدرت بگیرن. مدیر گروه بخش ما هم یه آدم عقده ای طلبکار که هیچ صلاحیتی برای مدیریت نداره و حتی ساده ترین تعامل نمیتونه با افراد گروهش به خصوص خانم ها به طور مناسب انجام بده.\r\n۷. عدم امکان رشد و پیشرفت. عدم امکان تغییر کارها در صورت عدم علاقه\r\n۸. اینجا پروژه های زیادی تصویب میشه، براش بودجه گرفته میشه، هزینه میشه و در نهایت نصفه ول میشه. نمیدونم هدف گرفتن پول و حیف و میل کردنش هست یا چی و هیچ وقت نفهمیدم چرا خیلی از پروژه هاشون به انتها نمیرسه. چیزی که برای کارمند میمونه فقط احساس پوچی و بی هدفی هست.\r\n۹. منابع انسانی افتضاح. تعاملشون صفر. قانونمندی صفر. احترام به کارمند و رعایت اصولی اخلاقی صفر. ادمای دورو میخواین ببینید بیاین منابع انسانی این شرکت.\r\n۱۰. اخراج غیرقانونی. منو بعد از چند سال کار کردن بصورت غیرقانونی بدون ارائه هیچ توضیح و دلیلی اخراج کردن و این کارو با پدرسوختگی تمام انجام دادن. اینطوری که ما از اول سال قرارداد نداشتیم. یهو منو صدا کردن بیا و قرارداد چهار ماهه گذاشتن جلوی من و وقتی پرسیدم چرا موقته توضیح ندادن و اجبارم کردن امضا کنم و بعدش با پیگیری و پرسیدن خودم تازه فهمیدم میخوان اخراجم کنن. اونم بدون هیچ دلیلی ذکر کردن و فقط به بهونه تعدیل نیرو. تازه توی انتخاب افراد هم هیچ عدالتی نبود و منی که سابقه م بیشتر بود و کارم جزو بهترینا بود انتخاب کردن فقط چون با من حال نمیکردن. \r\n۱۱. ضمنا ب دلیل حساس بودن این شرکت ما توی جنگ همش ترس اینو داشتیم که بزنن رو سرمون خراب بشه اونجا.\r\n۱۲. رییس کل این شرکت جلسات زیاد میذاشت برامون که مثلا خودشو خیلی مردمی و دغدغه مند نشون بده ولی اخرش دیدیم داره برا تعدیل ما نقشه میکشه و جلسه میذاره. اصلا ب حرفای قشنگش اعتمادی نبود.\r\nپیشنهاد میکنم هرگز پاتونو به این مجموعه از ریشه خراب نذارید و عمر و انرژی و روح و روان‌و جسم خودتونو تخریب نکنید. "
