description: "شرکت بسیار بسیار ضعیف در سطح مدیریت و کارکنان.چارت سازمانی، حدود اختیارات، رفتار و کنش حرفه ای و منابع انسانی مفاهیم تعریف نشده در این شرکت هستن. دوربین با امکان ضبط صدا که به کارمندان اعلام نمیشه و فرهنگ زیراب زدن فقط نشان دهنده ضعف بسبار زیاد مدیریت و آگاه بودن خودش به مدیریت ناکارمد هست. تو  این شرکت مهارت، تجربه ، متعهد بودن هیچ ارزشی نداره و صرفا باید لینکهای دیگری لا مدیریت داشته باشین. محیط بشدت سمی با مدیر بیسواد و پرادعا که متاسفانه به هیچیک از چهارچوبهای اخلاقی و حرفه ای پایبند نیست.ورود و خروج زیاد پرسنل و عدم پرداخت مزایا را هم اضافه کنید.در انتها اگر برای شخصیت، اعصاب و حرفه تون ارزش قائل هستین حتی به  ارسال رزومه هم برای شرکت  رویین پولاد فکر نکنید."
