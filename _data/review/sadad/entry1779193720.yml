description: "در کل زیاد اهل رعایت حقوق نیرو و اخلاق کاری و اینها نیستن، اگر اینها برات مهمه نرو، پشیمون میشی\r\n\r\nعلی رغم اینکه تا خرداد 1405 قراداد داشتم با سداد، طی جنگ اخیر شب عید منو اخراج کرده بودند و بهم 30 فروردین اطلاع دادن که پایان کار شما یه ماه پیش بوده\r\nمنم طبق تعهدم برای شرکت این مدت جنگ رو نرفتم شهرستان و موندم تهران برای شیفت بندی که داشتیم تو اسفند و فروردین، در ازاش حقوق فروردین ماهم رو ندادن بهم\r\nبه اقای صابر، مدیر اداری مالی، گفتم حداقل یه نامه بدید برم اداره کار یا تامین اجتماعی بگم که منو اخراج کردید تا حقوقم پیگیری کنم، گفتن نامه نمیدیم برو بگو شرکت منو راه نمیده ؟!\r\nگفتم قرادادم رو بدید، گفت مدیرعامل هنوز امضاش نکرده !\r\nگفتم خب حقوق فروردینم رو بدید بهم، گفت برو همونجا که میخوای شکایت کنی بگو حقوقت بهت بدن\r\n\r\nزمان استخدام گفتن هر 6 ماه میتونید یه مصاحبه/ارزیابی مجدد انجام دهید و رتبه کاری و حقوق تون اضافه بشه، ولی طی نزدیک به دو سالی ک اونجا بودم تحقق پیدا نکرد و طی مدتی که اونجا بودم هیچ افزایش حقوقی ندادن بهم، البته من از مسیر ها قانونی درخواست میدادم، شاید نیاز به روش های دیگ داشته که من بی اطلاعم.\r\n\r\nاصلا چیزی به نام فرهنگ سازمانی وجود نداره و هیچ ارزشی برای ابتدایی ترین اصول قانونی و اخلاقی زمان قطع همکاری با نیرو قایل نیستن.\r\n\r\nالبته باید بگم تنها مزیت شرکت به نسبت شرکت های دیگ فشار کاری کم هست\r\nو همکاران اغلب خوبی داشتم توی تیم چک، و علی الخصوص مدیر واحد چک آقای فیروزی، واقعاً انسان شریف و قابل احترامی بودن، ایضاً اکثر همکارانمون توی تیم چک. توی همه جا نیروی نخاله و زیر اب زن هست، توی واحد ما هم بودن\r\n\r\nبرای اینکه بدونید راست میگم، اسم من واسموس هست میتونید برید از پرسنل ساختمان نهم سداد بپرسید"
