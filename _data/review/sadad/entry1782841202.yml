description: "بدترین شرکتی که میتونید برای کار انتخاب کنید : \r\n1. واحد های جدا از هم هست تیم های مختلف که هر واحد مدیر خودش را دارد . روی کار مدیر های واحد هیچ نظارتی نیست یعنی یک مدیر میتواند تا آنجایی که بخواهد بی عدالتی کند و به هیچ کس جوابگو نباشد . علاوه بر این چون پروتکل خاصی برای انتخاب مدیر وجود ندارد افرادی به مدیریت میرسند که نه دوره ی مدیریتی خاصی دیدند و نه تخصص و توانایی این کار رو دارند. \r\n2.محیط کاری به شدت خاله زنک و غیر حرفه ای و پرحاشیه \r\n3.بیمارترین افرادی که در زندگیتون ندیدید رو در این شرکت میتونید ببینید علتش هم این هست که اکثر افراد با پارتی بازی میان و چون شرکت اسم و رسمی داره اکثر افراد منفعت طلب و خودخواه سعی می کنن با وصل شدن به فردی خود را وارد شرکت کنن . این باعث به وجود آمدن یک محیط  به شدت سمی شده. اصطلاحا دور شیرینی مگس جمع میشه.\r\n4.بی عدالتی یسیار شدیدی در بحث حقوق و مزایا وجود دارد.\r\nنکات منفیه این شرکت بسیار زیاد و تمام نشدنی هست و درکل بدترین تجربه کاریه من بود. \r\n\r\n\r\n"
