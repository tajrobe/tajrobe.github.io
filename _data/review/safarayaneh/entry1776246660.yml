description: "خوبی های این مجموعه پرداخت منظم حقوق با مزایا هستش \r\nبدیش اینکه شرایط روانی نامطلومبی داره و اصلا محیط دوستانه ای که برای کار کردن که آرامش داشته باشید وجود نداره. دلیلش هم :\r\n1. فامیل بازی و تبعیض : طرف چیزی بلد نیست ولی مسئولیت بهش می دن\r\n2. ناظر هایی برای شما تعیین میشه که سواد فنی ندارند و نمی تونن زمان بندی درستی بدن و دائما فکر می کنن دارین بهشون کلک میزنین و جنگ اعصاب براتون درست می کنن\r\nنکته مهم : اگر در بخش نرم افزار وزارت معدن مشغول به کار شدین یک پشتیبان خانوم اونجا هست بنام شه...  که با هر رفتار موذیانه ای که بتونه اعصاب و روان شما رو بهم میریزه پس مراقب باشین\r\n\r\n"
