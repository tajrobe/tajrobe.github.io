description: "سرمایکس تحت نظارت و مدیریت مدیر سابق بینظیر بود، فضای دوستانه و برخورد محترمانه، و در هر شرایط و موقعیتی همیشه هوای تمام نیروها رو داشتن، ولی از اواخر سال 404 با تغییر مدیرعامل، به شدت فضا مسموم و شرایط کاری وحشتناک شد.\r\n\r\nبا هزارتا بهونه ی غیرمنطقی از سر و ته حقوقا میزدن، و سال 405 با پایه 404 حقوق رو محاسبه میکردن، تعداد آف ها رو کم کردن، فشار کاری و روانی شدید، حذف وام و مساعده، و در هر بار تغییر روال و کاهش مزایا غیرمستقیم حرف از تعدیل میزدن که اگه رو این روال پیش نرید اخراج میشید! و در ماه های ابتدایی شروع به کار هم چند نیرو تعدیل شدن، که زهر چشم بگیرن از بقیه!\r\nتوهین ها و بی احترامی های مستقیم مدیرعامل به نیروها، استخدام اعضای خانواده و آشناهاشون به جای نیروی متخصص و باتجربه، حذف هدایای مناسبتی، به چشم نیومدن زحمات نیرو و نگاه بالا به پایین، کسری حقوق غیرمنطقی، و به دنبالش افزایش برنامه ریزی شده حجم و فشار کاری!\r\nو حتی وقتی پیگیر حقوقی میشدیم که مشخصا کمتر واریز شده بود (حتی بر مبنای پایه حقوق 404)، دست به سر میشدیم و از یه تایمی به بعد دیگه پاسخ پیاممون رو هم نمیدادن!\r\nو حتی امکان دورکاری رو هم حذف کردن و بدون فراهم کردن شرایط و امکانات برای حضور و رفت و آمد، حضور در محل کار رو اجباری کردن! و طبیعتا خیلی از نیروهای خوب و قدیمی استعفا دادن، و با حجم نارضایتی های وحشتناکی که برای کاربران سایت هم درست کردن بودن، محیط کاری به شدت مسموم و پرتنش شده بود و هیچ اعتراضی هم هیچ وقت بررسی و تایید نمیشد.\r\nبرده داری محض!\r\n"
