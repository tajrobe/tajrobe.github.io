description: "منابع انسانی این شرکت واقعا نیاز به بهبود داره و نیاز به بازنگری نیروها داره،اونجا دقیقا در منابع انسانی چه کاری انجام میدن؟؟\r\nرزومه ها ارسال میشه تایید اولیه میشه ولی تماسی گرفته نمیشه با افرادی که رزومه ارسال کردند،این رفتار برای تمامی پوزیشن های شغلی یکسان انجام میشه و اگر نیرو نمیخواین،چرا اگهی میذارید؟\r\nو جالب تر اینکه پر از فرایند پارتی بازی هست و در آخر اشناها استخدام میشن.\r\nبه‌طوری که تا زمان بسته شدن موقعیت شغلی، وضعیت درخواست بدون تغییر باقی ماند و سپس رزومه رد می شود. به نظر می‌رسد فرآیند ارتباط با متقاضیان و مدیریت درخواست‌ها در بخش منابع انسانی نیاز به بهبود جدی دارد."
