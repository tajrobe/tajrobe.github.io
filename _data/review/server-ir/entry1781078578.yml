description: "تجربه کاری من در این مجموعه به دلیل برخی مشکلات در سطح مدیریت میانی، چندان مثبت نبود. برخی رفتارهای غیرشفاف، تصمیم‌گیری‌های سلیقه‌ای و نبود رویکرد واحد در مدیریت تیم باعث ایجاد نارضایتی در میان کارکنان شده بود. این موضوع باعث می‌شد افراد در بسیاری از مواقع نسبت به وظایف و انتظارات خود دچار ابهام شوند و همین مسئله به مرور بر عملکرد کلی تیم تأثیر منفی گذاشت و همکاری من را نیز تحت تأثیر قرار داد."
