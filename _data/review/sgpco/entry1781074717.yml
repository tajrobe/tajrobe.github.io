description: "تجربه کاری من در این شرکت به شدت تحت تأثیر رفتار یکی از سرپرستان بخش قرار گرفت. متأسفانه این فرد با ایجاد فضای ناسالم، بی‌اعتمادی و حاشیه‌سازی مداوم، محیط کار را برای بسیاری از کارکنان دشوار کرده بود. برخوردهای دوگانه، انتقال نادرست اطلاعات به مدیریت و ایجاد سوءتفاهم بین همکاران، از جمله مسائلی بود که به مرور باعث تضعیف روحیه تیم شد. به جای تمرکز بر کار و پیشرفت، انرژی زیادی صرف مسائل حاشیه‌ای و تنش‌های غیرضروری می‌شد. در نهایت، مجموعه این شرایط به گونه‌ای پیش رفت که منجر به قطع همکاری من با شرکت شد، در حالی که احساس می‌کنم این تصمیم بیش از آنکه بر اساس عملکرد واقعی باشد، تحت تأثیر فضای ایجاد شده توسط این سرپرست بوده است. امیدوارم مدیریت چنین مجموعه‌هایی توجه بیشتری به رفتار و عملکرد مدیران میانی که باعث فساد و خراب کردن برند شرکت شدن، داشته باشند، چرا که نقش بسیار مهمی در سلامت محیط کار و حفظ نیروهای توانمند دارند."
