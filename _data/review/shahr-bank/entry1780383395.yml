description: "سلام\r\nمن بعنوان یکی از پرسنل این بانک به شدت از ورود به این بانک پشیمون هستم این بانک به هیچ عنوان برای پرسنل ارزشی قائل نیست و با پرسنل مثل برده برخورد می کنند اینها نیاز به بانکدار ندارند بیشتر بازاریاب میخان تا بعد از تایم کاری بره توی کوچه و خیابون دستگاههای پوز شرکت آسان پرداخت رو بفروشه و اگر نتونی بعنوان یه متصدی بازاریابی کنی و\r\nجذب منابع داشته باشی پاداش ها و وام ها بهت\r\nتعلق نمیگیره و انقدر اذیتت میکنند تا مجبور به استعفا بشی ، به شدت همه قسمتهاش باند بازیه وهمینطور مجبوری به مدیران نالایق و بیسواد دائما سواری بدی\r\nامیدوارم روزی برسه که بتونم از این بانک خلاص بشم چون واقعا همه پرسنل به شدت ناراضی و ناراحت هستن هم بخاطر مشکلات روحی و روانی و هم مشکلات جسمی که این بانک با مدیریت مدیران نالایقش ایجاد کردند"
