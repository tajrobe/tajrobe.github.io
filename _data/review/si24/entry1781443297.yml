description: "سلام\r\nمن یکی از کارمند های بیمه سامان در ساختمان برج سامان طبقه 8 معاونت اجرایی شرکت بیمه سامان هستم چندین ماه هست معاون اجرایی شرکت بیمه سامان عوض شده و یه آقای از بیمه بازار به اسم علیرضا بیات معاون اجرایی شده است این آدم نه تنها سواد نداره بلکه برای اینکه نشان بدهد آدم باسوادی هست به جز چندین اصطلاح انگلیسی هیچ چیز دیگه ای برای گفتن نداره زمانیکه میخواد باهات صحبت کنه آدمی به شدت چشم ناپاک و هیز هست توی این مدت جز اینکه از بیمه بازار و دیجی کالا و جاهایی که کارکرده نیرو بیاره و استخدام کنه هیچ کار دیگه ای انجام نده \r\nو یه خانمی به اسم وحیده بابایی با خودشون از همون ابتدا آوردن جدا از اینکه ارتباط غیر شرعی و کاری که باهم دیگه دارن خانم به شدت بی اخلاق و بی ادب و به شدت بوی بدی میدهند.\r\nاز شرکت بیمه سامان با این همه سابقه و محیط کاری امنی که این همه سال حفظ کرده بودن برای پرسنلشون بعید بود محیط را خراب کردن به شدت محیط معاونت اجرایی نا سالم شده در این حد که مدیران و کارمندانی که آقای بیات استخدام کردن ویپ میکشند تو شرکت سیگار میکشند. \r\nمعاون جدید در جدید برای اینکه نشان بدهد به روز هست و امروزی در بیشتر جلسات فوش میدهد و به شوخی از پایین تنه صحبت میکند این حال و روز واحد اجرایی شرکت بیمه سامان هست.\r\n"
