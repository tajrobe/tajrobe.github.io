description: "سلام \r\nمن یکی از کارمندان شعبه بیمه سامان هستم که با معاون جدید اجرایی بیمه سامان شده مقام مافوق ما و زیرنظر آن هستیم به شدت آدم چشم ناپاک، بی تربیت هستند نگاه بالا به پایین به کلیه کارمندان دارن هم خودشون هم جانشین شون خانم غیاثی فر اینقدر نگاه بالا به پایین شون زیاد هست که حتی یه کارمند اجازه اینکه اظهار نظر کند را ندارد در ظاهر خانم غیاثی فر چیزی نمی گویند و خودشان را مهربان و خوش برخورد نشان میدهند ولی بعد عدم نیاز کارمند را میزنند و اخراجش میکنند. \r\nبیمه سامان معاونت اجرایی شده سرباز خونه محیطی ناسالم، ناامن، معاون و جانشین معاون به شدت قدرت طلب در حدی که جانشین معاون برای اینکه طرفدار برای خود جمع کند پشت سر معاون شرکت مادام بدگویی میکند و از عدم کفایتش صحبت می کند.\r\nاز مدیرعامل بیمه سامان همچین انتخابی بعید بود فکر نمی کردیم روزی برسد و آقای ضرابیه به معاونین و جانشین هاشون اجازه ظلم کردن به پرسنل شون رو بدهند."
