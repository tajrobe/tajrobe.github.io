description: "برای موقعیت شغلی با من تماس گرفتند، اما نحوه برخورد واحد منابع انسانی بسیار غیرحرفه‌ای بود. و منابع انسانی واقعا درک درستی نداره ، در زمان تماس پشت فرمان بودم و چند بار اعلام کردم که شرایط مناسبی برای صحبت ندارم. با این حال بدون اینکه ابتدا هماهنگی کنند یا بپرسند آیا زمان مناسبی برای مصاحبه است، شروع به پرسیدن تعداد زیادی سؤال فنی کردند.\r\n\r\nوقتی پرسیدم آیا این مصاحبه فنی است، اعلام شد که مصاحبه فنی جداگانه برگزار خواهد شد. با وجود اینکه چندین بار توضیح دادم در حال رانندگی هستم و امکان تمرکز روی سؤالات فنی را ندارم، همچنان سؤال‌ها ادامه پیدا کرد و هر بار گفته می‌شد «این آخرین سؤال است»، اما باز سؤال‌های بیشتری مطرح می‌شد.\r\nو من احترام گذاشتم و جواب دادم‌\r\n\r\nبه نظر من ارزیابی فنی باید با هماهنگی قبلی و در زمان مشخص انجام شود تا داوطلب بتواند در شرایط مناسب پاسخ دهد. انتظار می‌رود واحد منابع انسانی حداقل به شرایطی که داوطلب اعلام می‌کند احترام بگذارد، مخصوصاً زمانی که فرد در حال رانندگی است و ادامه مکالمه می‌تواند خطرآفرین باشد.\r\n\r\nنکته عجیب‌تر این بود که پس از این تماس طولانی نیز هیچ پیگیری یا دعوتی برای مصاحبه فنی انجام نشد. این تجربه برای من نشانه‌ای از بی‌نظمی در فرآیند جذب و استخدام این شرکت بود."
