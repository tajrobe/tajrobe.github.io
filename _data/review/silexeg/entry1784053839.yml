description: "تجربه همکاری با صنایع الکترونیک سایلکس\r\nهشدار! کلاهبرداری! \r\n\r\nحدود سه سال پیش برای موقعیت برنامه‌نویس Embedded در این شرکت مصاحبه داشتم. در آن زمان به من اعلام شد که طی سه ماه دوره آزمایشی فقط مبلغ بسیار کمی پرداخت می‌شود و در صورت تأیید، مابقی حقوق بعداً پرداخت خواهد شد. همان زمان اعلام کردم که تمایلی به همکاری ندارم، چون تجربه قبلی‌ام نشان داده بود شرکت‌هایی که در دوره آزمایشی حقوق را به این شکل پرداخت می‌کنند، معمولاً شرایط کاری مناسبی ندارند.\r\n\r\nسه سال بعد، زمانی که به دنبال کار بودم، نام شرکت را فراموش کرده بودم و به اشتباه برای آن‌ها رزومه ارسال کردم. خودشان با من تماس گرفتند و گفتند که مصاحبه قبلی را به خاطر دارند و خواستند دوباره برای مصاحبه مراجعه کنم.\r\n\r\nدر جلسه مصاحبه، کاملاً شفاف توضیح دادم که دلیل رد همکاری در سه سال قبل، پایین بودن حقوق دوره آزمایشی بوده است. در همان جلسه توافق کردیم که برای دو ماه پایانی سال، حقوق خالص دریافتی من ۴۰ میلیون تومان باشد.\r\n\r\nهمچنین از من خواسته شد که کارت ملی خود را به عنوان ضمانت در اختیار شرکت قرار دهم. در آن زمان تصور نمی‌کردم این موضوع بعدها برایم مشکل ایجاد کند، بنابراین کارت ملی‌ام را تحویل دادم.\r\n\r\nپس از یک ماه کار، به جای مبلغ توافق‌شده(40 میلیون)، تنها ۲۰ میلیون تومان به حسابم واریز شد؛ یعنی نصف مبلغی که درباره آن توافق کرده بودیم. وقتی اعتراض کردم، اعلام کردند که از ابتدا گفته بودند در دوره آزمایشی فقط درصدی از حقوق پرداخت می‌شود و هنوز تأیید نشده‌ام. در حالی که چنین موضوعی در جلسه مصاحبه به من گفته نشده بود.\r\n\r\nعلاوه بر این، اعلام کردند که حقوق من به صورت ساعتی محاسبه شده است؛ در حالی که توافق ما بر حقوق ماهانه با مبلغ مشخص بود، نه قرارداد ساعتی. مسئول استخدام حتی عنوان کرد که «ما می‌توانستیم در دوره آزمایشی هیچ حقوقی به شما پرداخت نکنیم، اما همین مبلغ را هم پرداخت کردیم.»\r\n\r\nهمان روز به طور قاطع اعلام کردم که شرایط اجراشده با توافقی که در جلسه مصاحبه انجام شده بود مطابقت ندارد و تمایلی به ادامه همکاری ندارم. در ابتدا گفتند که مابقی مبلغ را پرداخت خواهند کرد، اما این اتفاق هرگز نیفتاد.\r\n\r\nصبح روز بعد برای پس گرفتن کارت ملی‌ام به شرکت مراجعه کردم. هنگام ورود، نگهبانی از من خواست پشت سیستم ننشینم تا مدیر برسد. همچنین چند نفر از کارکنان مأمور شدند کنار من بمانند تا مدیر حضور پیدا کند. برداشت شخصی من این بود که نگران بودند اطلاعات یا کدهایی که طی آن یک ماه روی آن‌ها کار کرده بودم حذف شود.\r\n\r\nپس از حضور مدیر، ایشان اعلام کردند که از عملکرد من رضایت ندارند و قصد ادامه همکاری ندارند. این در حالی بود که روز قبل خودم اعلام کرده بودم به دلیل رعایت نشدن توافق مالی، دیگر مایل به ادامه همکاری نیستم. وقتی دوباره موضوع پرداخت مابقی حقوق را مطرح کردم، اعلام کردند که همان مبلغ پرداخت‌شده، کل حقوق من بوده و پرداخت دیگری انجام نخواهد شد.\r\n\r\nدر نهایت کارت ملی‌ام را پس گرفتم و شرکت را ترک کردم.\r\n\r\nامیدوارم انتشار این تجربه بتواند به افرادی که قصد همکاری با این شرکت را دارند، برای تصمیم‌گیری آگاهانه‌تر کمک کند."
