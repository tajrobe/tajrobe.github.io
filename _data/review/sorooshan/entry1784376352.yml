description: " همیشه این تصور رو ایجاد میکنن که اگه وارد مجموعه بشید چیزهای زیادی یاد میگیرید و سابقه کار در این شرکت ارزشمنده اما در عمل وقتی از شرکت خارج میشید و بخواید اسم این مجموعه رو به عنوان سابقه کاری مطرح کنید خیلی جاها حتی نمیدونن دقیقا این نرم افزار یا سیستم چی هست.\r\nنرم افزار بسیار فسیل و فرسوده است و واقعا جای تاسف داره برای مشتری هایی که هزینه های سنگین و میلیاردی برای خرید و استفاده از چنین محصولی پرداخت میکنن. از نظر فنی و تجربه کاربری فاصله زیادی با استانداردهای امروزی داره\r\nیکی از مشکلات بزرگ این شرکت نبود واحد منابع انسانی هست. زمانی که بین کارمند و مدیریت یا سرپرستی مشکلی پیش میاد، هیچ فرد یا بخشی وجود نداره که بی طرفانه موضوع رو بررسی کنه یا از حقوق کارکنان دفاع کنه. در نتیجه نیروها در بسیاری از مواقع مجبور هستن مشکلات خودشون رو مستقیما با سرپرست‌ ها حل کنن که متاسفانه همیشه هم به شکل خوبی پیش نمیره.\r\nفضای کاری بخش پشتیبانی اصلا حرفه ای نیست. در مواقعی که مشکلی پیش میاد به جای راهنمایی و حل مسئله برخوردهای تند و عصبی از طرف سرپرستی دیده میشه. بارها پیش میاد که به جای اینکه مشکل با صحبت و آموزش حل بشه، با داد زدن و برخورد نامناسب جواب داده میشه.\r\n حتی در شرایطی که مشغول انجام کار خودتون هستید، رفتارهای پرتنش و برخوردهای غیرحرفه‌ ای سرپرست ها باعث ایجاد فشار روی نیروها میشه و با وجود حجم و فشار کار زیاد داخل این شرکت این نوع رفتارها فشار کار رو چندین برابر میکنه \r\nهر دو سرپرست بخش پشتیبانی از نظر اخلاق کاری جزو ضعیف ترین افرادی بودن که در دوران کاری خودم باهاشون برخورد داشتم. نگاه بالا به پایین و رفتار غیرحرفه‌ ای و نبود احترام کافی باعث میشه نیروهای پشتیبانی در مدت کوتاهی از شرکت جدا بشن. \r\nجالب اینجاست که حتی مدیریت هم ظاهرا توانایی یا تمایل برای برخورد با این مشکلات رو نداره.\r\nیکی دیگه از مشکلات نحوه پرداخت حقوق هست. حقوق هر ماه با تاخیر پرداخت میشه و در ۵ یا ۶ مرحله واریز میشه . بیمه نیروها با حداقل مبلغ وزارت کار رد میشه که با توجه به میزان مسئولیت و حجم کاری که از نیروها انتظار میره موضوع قابل توجه ای هست."
