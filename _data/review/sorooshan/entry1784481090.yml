description: "با توجه به تجربه ی چند ساله ای که توی این شرکت داشتم میتونم بگم که این شرکت فقط مناسب افراد حرفه ای و با تجربه هستش و نیروهای قدیمی با تجربه ی کاری بالا خیلی زیاد داره\r\nمشتریان بزرگ و مهمی داره که باعث شده رو به جلو باشه و از افرادی استقبال به همکاری کنه که واقعا توانمند و بروز هستند \r\nبه پرسنلی که دنبال دانش و پیشرفت باشه خیلی اهمیت میدن\r\nاگر دنبال پیشرفت و کسب تجربه و همکاری با مجموعه های بزرگ و مهم هستید این شرکت واقعا مناسب هستش\r\nولی اگر دنبال یک کار سبک برای گذراندن وقت هستید اصلا پیشنهاد نمیکنم بهتون چون اذیت میشید \r\n\r\nتنها مشکلی که داره پرداختیاش هستش که از همون اول استخدام میگن که توی چند نوبت پرداخت انجام میشه"
