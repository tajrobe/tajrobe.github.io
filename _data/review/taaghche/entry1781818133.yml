description: "طاقچه در بخشهای مختلف آدم‌های خوبی داره که همکاری باهاشون لذتبخشه اما به طور کلی مدیریتش افتضاحه. رشد و کسب مقام در گروی فامیل‌بازی و پاچه‌خواریه. باجناق مدیرعامل با دو سه سال تجربه cto شده و زنش هم لید یکی دیگه از تیم‌هاست. کسی که شرکت بهش عنوان دیرکتور پروداکت رو داده حتی دو سال سابقه‌ی کار پروداکتی نداره و فیچرهای بلااستفاده‌ای بالا میاره که به خاطرشون ماه‌ها از ایم فنی زمان گرفته و همه رو اذیت میکنه برای این کارای بی‌نتیجه. مدیرعامل احتمالا فکر میکنه یه سفره‌ای پهنه و لازم نیست در تصمیماتش عدالت رو لحاظ کنه اما نمیدونه که داره کل تیم فنی رو از داخل خراب و فرسوده میکنه و به برند آسیب میزنه. فقط برای بچه‌های فنی دعا میکنم همین."
