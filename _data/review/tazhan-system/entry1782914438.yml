description: "تجربه‌ام رو در خصوص روال مصاحبه می‌نویسم :\r\nاز منابع انسانی تماس گرفتند و خواستند برای مصاحبه‌ی منابع انسانی زمان‌بندی کنیم، یک روز و ساعتی انتخاب شد برای مصاحبه. \r\nمصاحبه سر وقت و به صورت آنلاین انجام شد. \r\nمیزبان یک نفر بود\r\nبرخورد خوب بود\r\nسوال‌ها نرمال بودند\r\n\r\nهمان‌روز نتیجه رو اعلام کردند و برای یک روز دیگه در هفته بعد قرار گذاشتند برای مصاحبه فنی :\r\nمیزبان یک نفر بود\r\nمصاحبه فنی با تاخیر برگزار شد\r\nآنلاین بود ولی بدون تصویر (شبیه مصاحبه تلفنی)\r\nبدون مقدمه و معرفی! \r\nصدا شدیدا قطع و وصل میشد\r\nفقط 4 تا سوال پرسیده شد و تمام شد (شاید 10 دقیقه)\r\nبین مصاحبه به صورت غیرحرفه‌ای گفتند : \"با شرکتی که چند سال پیش باهاشون کار کردی صحبت کردم چون در فلان موقعیت شغلی بودی اینجا هم همون روال رو باید ادامه بدی!!!\". البته این حرف کذب بود (ع.گ) (آ.ب.ق) \r\nبعد از ظهر هم نتیجه رو اعلام کردند."
