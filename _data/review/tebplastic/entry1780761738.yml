description: "این هلدینگ دارای شرکت های زیر مجموعه ای هست (مانند طب کاران پلیمر، ویرا مدرن، ویرا تک و ...) که هر کدوم به صورت کاملا متفاوت و از نظر سیستمی تا حدودی مستقل کار می‌کنند، سیاست های حفظ سرمایه انسانی شرکت مادر خیلی بهتر از شرکت های زیر مجموعه هست و نسبت به شرکت های زیر مجموعه ارزش بیشتری برای کار کردن دارد. اما نکته قابل توجه پتانسیل رشد و توسعه شرکت های زیر مجموعه هست که برای مثال شرکت طب کاران پلیمر که مسیولیت اصلیش توزیع و پخش محصولات طب پلاستیک هست، طی سال های گذشته پیشرفت خوبی داشته و افراد زیادی ظرف مدت خیلی کوتاه از سمت های کارشناسی و ... به سمت های بالاتر مثل سرپرستی، ریاست و حتی مدیریت رسیدند و این میتونه موقعیت خیلی خوبی برای افرادی باشه که رشد موقعیتی شغلی براشون اولویت بالایی داره. بنده تجربه کاریم داخل طب کاران پلیمر رو براتون شرح میدم\r\nحفظ سرمایه های انسانی ذره ای اهمیت ندارد برای این مجموعه و از آگهی های موجود داخل سایت های کاریابی کاملا مشخص هست که نیرو های کار(به جز تعداد خیلی کم) از این مجموعه خیلی زود استعفا میدهند و این مجموعه همیشه در حال جذب نیرو برای جایگزین می باشد. بدقولی های پی در پی، عدم امنیت شغلی، بی احترامی های شدید مدیران به کارکنان ،رفتار سمی تعدادی مدیر میانی،روابط بارز غیرکاری و غیراخلاقی اشخاص بانفوذ با زیردست ها، اصلی ترین دلیل ریزش دائمی نیروهای این شرکت هست.\r\nاز نظر بنده واحد های مالی و فروش به دلیل مدیریت نسبتا قوی تر این واحدها، اوضاع بسیار بهتری نسبت به بقیه واحد ها دارند و پیشنهاد میکنم تنها در صورتی که برای مدت زمان کوتاهی به دنبال کار هستید و در قبال بی احترامی زودرنج نیستید، این مجموعه رو انتخاب کنید.\r\nارادت"
