description: "در این شرکت عملاً امنیت شغلی وجود ندارد و هر زمان که بخواهند ممکن است بدون دلیل مشخص به شما اعلام کنند که از فردا دیگر نیازی به حضورتان نیست. همچنین پشت سر کارکنان صحبت می‌شود و فضای حرفه‌ای مناسبی در مجموعه حاکم نیست.\r\n\r\nنرخ جابه‌جایی نیروها بسیار بالاست؛ به‌طوری که بسیاری از کارکنان پس از مدت کوتاهی مجموعه را ترک می‌کنند یا بدون دلیل قانع‌کننده از ادامه همکاری با آن‌ها جلوگیری می‌شود. به نظر می‌رسد بخش زیادی از این مشکلات ناشی از کم‌تجربگی و عدم بلوغ مدیریتی باشد.\r\n\r\nسخت‌گیری‌های غیرمنطقی حتی در مواردی مانند گفت‌وگوی عادی بین کارکنان مشاهده می‌شود و فضای کاری تا حد زیادی سمی و فرسایشی است. در بسیاری از مواقع نیز شرایط روحی و رفتار مدیران مستقیماً بر جو محیط کار تأثیر می‌گذارد و باعث ایجاد تنش برای کارکنان می‌شود.\r\n\r\nمن در مدت همکاری خود نکته مثبت قابل توجهی در این مجموعه مشاهده نکردم. پیشنهاد می‌کنم برای وقت و انرژی خود ارزش قائل شوید و پیش از همکاری یا سپردن پروژه به این مجموعه، با دقت بیشتری تحقیق کنید. احتمالاً پس از مدتی همکاری، خودتان نیز به صحت این موارد پی خواهید برد."
