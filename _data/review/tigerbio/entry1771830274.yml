description: "پیامها رو میخوندم اینجا تا به حال ندیدم کسی اشاره کنه که اینترنت همیشه ملی هست توی تایگر :))) در واقع اومدن یک سیستم درون شرکتی درست کردن که فقط سایت هایی که اجازه میدن رو بتونی باز کنی. به دو روش این کار رو میکنن. یک اینکه یک مرورگر خودشون نوشتن که توش دسترسی همه سایتها بسته است مگر اینکه ازشون بخوای یک سایت خاص رو دسترسی بدن بر حسب نوع کارت، و دو اینکه یه افزونه برای گوگل کروم نوشتن که اون هم همین کارو میکنه. ضمنا علاوه بر این که میتونن دسترسی شما رو محدود کنن میتونن لاگ اون مرورگر و افزونه رو هم چک کنن و ببینن توی چه سایتهایی رفتی و بازخواستت کنن. جالبه نه؟ خلاصه اگه میخوای هر روز اینترنتت ملی باشه حتماااااا برو در تایگر استخدام شو."
