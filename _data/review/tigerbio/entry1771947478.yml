description: "اسمش‌ شرکته ولی شما بگید خانه‌ ی دیکتاتوری وفایی و خانواده\r\nدر‌ راس ام پدر پیر و خرفت خانواده قرارداره که بخاطره سنش مغزش پردازش نمیکنه کار‌کنه ولی‌  تامیتونه سرک میکشه تو کاره بقیه که بگه منم هستم. مثلا دارید کار میکنید و تمرکز کردید وارد میشه و سلام کردن (مگه دکتر‌ حسابی آخه تو پیرمرد پر حاشیه؟؟؟) یا میاد بالا بهت گیر میده چرا الان داری سیگار میکشی و سره کارت نیستی و تحقیر پشت تحقیر و مقایسه با نیروهای چینی  و ژاپنی که اونا ۱۰ ساعت کار میکنن و فقط ده دقیقه ناهار میخورن و ادامه ی کار. اگه انقد نیروی چینی دوست داری از اونور بیار خب. آهان حواسم نبود باید به دلار حقوق بدید و شما همین ریالشم تو چندین پارت میدین همونم سره تاخیر و سیگار و پوشش و رفتن به دستشویی فلان طبقه و غیره کلی ازش کسر میکنید و در آخر کارمند ی چیزی ام بهتون بدهکار میشه‌.\r\nبی منطق ترین آدم شرکت همین ایشونه.\r\nحالا میرسیم به پسرناخلف خانواده\r\nکسی که فقط بلده صدا ببره بالا و پشت دوربین بشینه رصد کنه و از پدرش تو سری بخوره که چرا شرکت خوب مدیریت نمیکنه\r\nدوستان اینا از قانون همه چیزایی ک به نفعشونه تاکید دارن و چیزایی که به ضررشونه رو دور انداختن بطور مثال مرخصی ۲/۵ روزتون درماه شما فقط ۲روز دارید که همونم باید از ۴۵نفر امضا و اثرانگشت بگیرید و اگر والاحضرت اجازه دادن بعد تشیف ببرید(اینم درنظربگیرید مرخصی ام باشید همچنان تماس کاری باهاتون گرفته میشه)\r\nتاخیر بیش ازیکساعت ضریب بشدت بالایی میگیره مثلا یکی از بچه ها یهو ۳۴ ساعت تاخیر و ۳تومن کسراز حقوق خورد\r\nالان ک نزدیک عید مراقب رفتارتون باشید چون کوچیک ترین اشتباهی میتونه باعث این شه که عیدی و حقوق به شما داده نشه اما بعده عید که موقع بستن قرارداد جدید همگی فرشته مهربون میشن و به مدت دوالی سه هفته شرکت ایده آل میشه و بعد روز از نو\r\nاب و چایی و سرویس بهداشتی حداقل امکاناتی که هرشرکتی بی منت داره ولی این خراب شده کلا دوسه تا آبسردکن داره که سالهاست فقط تانکر آب از شیر پر میکنن و سالی یه بار نمیرن از بیرون بخرن\r\nچایی ساعت ۱۰صبح دم میشه و تا عصر رو تفاله ها آب ریخته میشه. اینم بدونید که اشغال ترین چایی که اصن تو عمرتون ندیدو میخرن و همونم زحمت نمیکشن عین آدمیزاد هروقت تموم شد دم کنن\r\nسرویس بهداشتی بوی تعفن میده و یه روز درمیون چاه گرفته میشه و مثل دزدا یواشکی بایدبرید طبقات دیگه و همسر مدیریت که بشه مدیرمنابع انسانی ببینه جر واجرتون میکنه\r\nعمر عزیزتونو اینجا هدر ندید"
