description: "من نمیخوام مثل بقیه بد صحبت کنم یا مسائل رو گنده کنم\r\nچون قبلا اینجا کار کردم فقط میخوام مودبانه و در کمال ادب انتقاد کنم امیدوارم مدیران مجموعه این متن رو ببینند چون تو تایمی که اونجا کار کردم به هر دلیلی انتقاداتمو بیان نکردم\r\nبه نظر من چند انتقاد به این مجموعه وارده\r\n1.احترام نذاشتن به پرسنل و حریم شخصی : مدوام چک کردن دوربین ها و گوش دادن به صداها و رفتار با پرسنل مثل یه کودک واقعا ازار دهندس. درسته که باید تو تایم کار، کار کرد اما محیط خشک و بسته باعث بازدهی کم پرسنل میشه مخصوصا تو شرایط الان که هر ادمی هزارتا مشکل داره. تو شرکت میگفتن زیاد بالا نرید، گوشی دستتون نبینیم، بالا چایی نخورید،بالا غذا نخورید، تو محیط سر بسته پشت بوم سیگار نکشید،باهم زیاد حرف نزنید و.... تمام این رفتار ها باعث بی اعتمادی و نارصایتی پرسنل و فرار از مجموعه و خالی کردن حرصشون اینجا میشه. باید به پرسنل احترام گذاشت. \r\n2.مدیریت یکسری از افرادی که به درد مدیریت نمیخورن و فقط باعث ایجاد تفرقه و اعصاب خوردیای شدید تو شرکت میشن جون خودشون خیلی بی اعصاب و بد دهن هستن دوستانی که اونجا بودن میدونن که افرادی اونجا مدیرن که تو محیط کار بخاطر مشکلات باهات دعوا میکنن فحش میدن به در و دیوار میکوبن دوربین نباشه کتکتم میزنن. بعد بیرون شرکت میگن من دیوونم چیکار کنم؟؟خب این ادما به نظرم اصلا به درد مدیریت نمیخورن و از اون دسته ادمای سمیی هستن که باعث فرار پرسنل میشن و فک نمیکنم حتی یک نفر تو اون شرکت ازشون خوب میگفت. به نظرم باید این ادما از قدرت کنار گذاشته بشن واقعا شاید 50 درصد قصیه حل بشه\r\n3.حقوق کم:شرکت تایگر برای کسب تجربه و پیشرفت علمی و کاری جای بشدت خوبیه و خیلی برای اینده کاری، نه مالی، مناسبه. اما از نظر مالی اصلا و ابدا مناسب نیست. تقریبا میتونم بگم به هر بهانه‌ای میخوان از حقوق شما کم بکنن. البته واقعا به موقع پرداخت انجام میشه\r\nمن از کار کردن اونجا راضی بودم به عنوان یک سکوی پرتاب ولی پر از اعصاب خوردی. \r\nبازهم میگم که این شرکت برای کسب تجربه کاری و علمی بشدت مناسبه\r\nبه نظرم باید مدیران مجموعه این مورد رو قبول کنند که شرایط مدیریت نسل جدید با نسل قدیم متفاوته. و سبک مدیریت رو تغییر بدن\r\nمن از اقایان وفایی بدیی ندیدم و ازشون مچکرم بابت ایجاد فرصت برای بی تجربه ها . اما از ادم های اطرافشون و نزدیک بهشون بسیار دیدم و تاثیرات بدی روی ایشان و پرسنل گذاشتن\r\n"
