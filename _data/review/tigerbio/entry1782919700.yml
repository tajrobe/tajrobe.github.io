description: ".\r\nاگر واقعاً از مجموعه تایگر آسیب دیدید، فحش دادن و ناله کردن هیچ تأثیری نداره. اگه قرار بود با فحش و اعتراض‌های احساسی چیزی عوض بشه، تا الان هزار بار اتفاق افتاده بود.\r\n\r\nاگه می‌خواید واقعاً نتیجه بگیرید، تجربه‌هاتون رو بنویسید. هر چیزی که دیدید، شنیدید یا باهاش درگیر بودید و فکر می‌کنید درست نبوده رو مطرح کنید. مخصوصاً توی بخش تجربه ک\r\nاری بنویسید تا فقط یک نفر نباشه که این مسائل رو می‌بینه؛ هر کسی که بعد از شما میاد حق داره بدونه با چه فضایی روبه‌رو میشه.\r\n\r\nلازم نیست همه چیز رو خودتون ثابت کنید. اگر موردی هست که بهش شک دارید یا اطلاعاتی ازش دارید، مطرحش کنید و مشخص کنید که تجربه یا برداشت شخصی شماست. شاید افراد دیگه‌ای مدارک بیشتری داشته باشن یا بتونن اون موضوع رو تأیید کنن.\r\n\r\nاگه واقعاً دنبال اثرگذاری هستید، به جای دعوا و توهین، واقعیت‌ها رو منتشر کنید. تجربه‌های واقعی بیشتر از هر فحش و جنجالی حرف می‌زنن"
