description: "سلام \r\nتجربه مصاحبه ام با توسن رو دوست داشتم در میون بزارم. مصاحبه اول تلفنی بود و مسئول واحد تماس گرفتن. بعد از اون یه مصاحبه حضوری با منابع انسانی و بازهم مسئول واحد. مصاحبه سوم اسما فنی بود که ایمیل زدن راجع به این مطالب امادگی داشته باشید ... و اما زمانی که تو جلسه رفتم... ۵ نفر دور یه میزمیشینن و پشت هم ازت سوال میکنن. که حس خوشایندی نیست. انگار بهت پوزخند میزنن . این  مورد رو توی چندین تجربه دوستان دیگه در ویکی تجربه خونده بودم و تاییدش میکنم به شخصه. جالبتر اینکه حتی یک سوال در مورد موضاعات فنی و تخصصی که گفته بودن نپرسیدن. سوالات بیشتر شخصی و روانشناسی بود. درکل روند مصاحبه رو با اون ایمیلی که فرستادن منحرف کردن"
