description: "مشکلاتی که توسن (گاندی) داره صادقانه اینجا مینویسم:\r\n\r\n1- طبقات معمولا پر سر و صدا هستن, افرادی لات با ادبیات زننده و چاله میدونی و با استفاده از الفاظ رکیک همش مزاحم دیگران میشن و حسابی شرایط بدی هستش و مدیران هم انگار خواب تشریف دارن؟؟؟ (مخصوصا طبقه سوم)\r\n2- کیفیت سخت افزار, میز و صندلی فاجعه و همگی خراب هستن. اصلا برای شما دوزار ارزش قایل نیستن که تجهیزات نو بهت بدن!\r\n3- ده ها نفر رو کنار هم ردیف کردن و میزها بهم چسبیده هستن. هیچ پرایویسی نداری و باید دماغ به دماغ همکارت بشینی...\r\n4- شرکت از نظر فنی هیچ برنامه و الگویی نداره و پروژه ها هم بصورت هیئتی مدیریت میشن. امکان برگشت کارها و زمانبندی مسخره وجود داره.\r\n5- شاید چند ماه یا چند سال تو شرکت باشی ولی هیچ ارزشی برای توانمندیهای فنی شما قایل نیستن!\r\n\r\nاینهایی که نوشتم واقعا مشکلات اساسی توسن هستن که اگر رفع نشه این خروج نیرویی که شرکت داره همیشه هست و بیشتر هم خواهد شد.\r\nبنظر من منابع انسانی باید ورود کنه و افراد سمی رو تو شرکت تنبیه کنن تا جو آرام مجدد به شرکت برگرده!!!"
