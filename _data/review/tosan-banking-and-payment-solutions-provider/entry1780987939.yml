description: "قبلا این شرکت خوب بود ، الان منابع انسانی به شدت افتضاح شده ،منابع انسانی بسیار غیر حرفه ای هست و رزومه هایی که ارسال میشه اکثرا در حالت بررسی شده نگه می دارند و تا زمانی که پوزیشن شغل باز هست،نه رد میزنند و نه تایید و در حالت بررسی شده نگه می دارند ،اصلا بررسی نمی کنند ،منابع انسانی معلوم نیست اونجا چیکار میکنه دقیقا.\r\nو مجددا همون شغل ها رو دوباره اگهی میذارن،تماما رزومه ها مرتبط هست حاضر نیستن وقت بذارن و بررسی کنند و تماس بگیرند\r\nهیچ کس هم که رسیدگی نمیکنه\r\nفقط کافی است مدیر عامل خودش به یک اسم دیگه رزومه ارسال کنه،ببینه که این ها دقیقا چجوری دارن کار می کنند."
