description: "خوبه باز یکی اومد نوشت خیییلی شلوغه و چاله میدونی حرف میزنند، ولی خب کی شلوغ میکنه؟ توجه کردید؟ همه که شلوغ نمیکنند ...یک عده که کلا معضل هستند تو شرکت! مزاحم بقیه هستند، سر سفره آماده نشستند دو تا چیز اونجا یاد گرفتند چون قبلش هیچ جا نبودند، حالا فکر میکنند کسی هستند و خودشون رو محق میدونند!\r\n\r\nیک عده هم تو کار آویزونن و واسه خودشون گروه داخلی راه میندازند. با مدیرا رابطشون خوبه و با بچه هایی که کار میکنند زیرآبشونو جوری میزنند که نگم .. یک کار ساده هم بهشون اساین میکنند با زمان دلبخواه، همه تسک ها رو done میکنند و همیشه هم گزارششون ۱۰۰ درصد!!! خوبه دیگه همه فکر میکنند کارشون رو خوب انجام میدن، نگو اصلا کار ندارن، ولی همیشه چونه ارتقا دارن و طلبکارن که خب باید به ما یاد بدید که بریم ارتقا‌ بهشون بالاخره ارتقا هم میدن، ولی هیج وقت تو بحران های شرکت، کاری انجام ندادن، اونا خودشونو میکشن کنار، وایمیسن پروژه رو یک آدم درستی که انجام داد، میان وسط تازه، که ما هم هستیم و اینا! اون بنده خدا رو سرنگون میکنند و پروژه رو مثلا با منت و هزار تا امتیاز که کار دارن، دو تا باگ فیکس کنند روش!!! یعنی دیوونه میشی با اینا. \r\n\r\nیعنی منتظرن تا بنده خدایی که کلی کار کرده، یک غلط ازش در بیاد، یک اشتباه کوچیک، مدت ها کمین کرده بودند و منتظر این لحظه بودند، این ققققدر این اشتباه رو بزرگش میکنند تا زیرشو بکشن. \r\n\r\nاین قدر دیدم، طرف راحت زیرآب مدیر رو هم زده 😵‍💫. زیرآب میزننا. جلو مدیر، جلو بچه های تیم های دیگه، زیر آب اونی که کار میکنه رو میزنند! از بس حسود و عقده ای هستند! مشکل اون  شنونده و مدیر هم هست که حرف اینا رو قبول میکنه، حتی نمیاد با طرف چک کنه، این چیزایی که میگن واقعیت داره؟ خدا بخیر بگذرونه."
