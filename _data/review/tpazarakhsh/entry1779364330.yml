description: "سلام و عرض ادب\r\nفقط میتونم بگم مسخره ترین شرکتی که دیدم همینجا بود. از فامیل بازی گرفته که یک مشت آدم بی سواد و بدرد نخور تا منابع انسانی که مهد کودک و اشتباه گرفته با شرکت.وعده های دروغ از پاداش و غیره.\r\nرییس شرکت که ادمی به شدت دهن بین و انجام کار بدون فکر کردن. و مشاوره دهنده هایی که از نظر سوادی کاملا صفر.\r\nشرکتی نابود شده که همه چیش به هم ریخته . از پرداخت حقوقش که هیچوقت سروقت نیست تا بقیه موارد.\r\nای تی شرکت که دست پسر عقب موندش هستش که کلا فقط لاس زدن با دخترارو بلده نه کار دیگه ای.\r\nبه طور کلی امیدوارم هیچوقت راهتون به این شرکت مزخرف نخوره."
