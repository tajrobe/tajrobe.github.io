description: "با سلام،\r\n\r\nاین نامه، نه از سر کینه، که از سر مسئولیت اخلاقی و حرفه‌ای نگاشته می‌شود تا پرده از یک استراتژی پنهان اما کاملاً مشهود در مدیریت این مجموعه بردارد. متأسفانه پس از یک دهه خدمت، به این نتیجه روشن رسیده‌ام که این سازمان نه با منطق بقا، بلکه با منطق حذف گران‌قیمت‌ها و جایگزینی با ارزان‌قیمت‌ها اداره می‌شود.\r\n\r\nنکته اول: بهانه‌ای به نام جنگ، اقدامی به نام تصفیه حساب اقتصادی\r\nدر اوج شرایط سخت اقتصادی و جنگی، زمانی که تیم‌های باتجربه با تمام وجود برای حفظ بقای سازمان جان‌کندن، ناگهان سناریوی «چابک‌سازی» و «مدیریت بحران» بهانه‌ای شد برای اخراج دسته‌جمعی نخبگان و متخصصان قدیمی. این اقدام نه یک راهکار مدیریت بحران، که یک توطئه حساب‌شده برای خالی کردن سازمان از نیروهای گران‌قیمت و باانگیزه بود. در کمال تعجب، به فاصله چند هفته پس از این اخراج‌های به‌ظاهر اجباری، نه تنها حجم کاری کاهش نیافت، بلکه جای خالی آن نیروها با نیروهای بی‌تجربه، بدون تخصص و با حقوق‌های ناچیز پر شد!\r\n\r\nاین یعنی یک چیز: ابزار قرار دادن معیشت کارگران در پوشش جنگ؛ یعنی سوءاستفاده از شرایط مملکت برای حذف افرادی که حرفی برای گفتن داشتند و استخدام افرادی که بهای کمی دارند و اعتراضی ندارند.\r\n\r\nنکته دوم: ارزش‌گذاری معکوس؛ تجربه قربانی ارزانی\r\n\r\nدر این سازمان، به وضوح شاهد یک نظام ارزش‌گذاری وارونه هستیم. هرچه تخصص و سابقه نیرو بالاتر است، سریع‌تر در لیست دشمنان بی سواد قرار می‌گیرد و هرچه نیرو بی‌سوادتر، کم‌تجربه‌تر و وابسته‌تر باشد، جایگاه محکم‌تری در ساختار پیدا می‌کند. این یعنی نیروی متخصص به عنوان یک \"هزینه\" دیده می‌شود، نه یک \"سرمایه\".\r\n\r\nبرای مثال، مدیریت منابع انسانی (که خود با فردی غیرمتخصص و فاقد هرگونه دانش حقوق کار و روانشناسی صنعتی پر شده است)، نه تنها نقشی در حفظ نیروهای کارآمد ندارد، بلکه تبدیل به ابزاری برای تسهیل این اخراج‌های غیرمنطقی و پنهان‌کاری در زمینه بیمه و دستمزد شده است. او وظیفه دارد چهره سازمان را در مقابل نیروهای جدید حفظ کند و در پشت صحنه، به حذف سیستماتیک متخصصان بپردازد.\r\n\r\nنکته سوم: چرا این سازمان هرگز پیشرفت نمی‌کند؟\r\n\r\nپاسخ روشن است؛ این سازمان به جای تکیه بر دانش و پشتکار، بر چاپلوسی، فامیل‌سالاری و ارزان‌ترین گزینه‌ها متکی شده است. نتیجه‌اش شده است:\r\n\r\nاز بین رفتن سرمایه اجتماعی: نیروهایی که سال‌ها تجربه انباشته بودند، با ذلّت اخراج شدند.\r\n\r\nافت کیفی فاجعه‌بار: جایی که ارزان‌ترین نیرو جایگزین متخصص می‌شود، کیفیت به سرعت سقوط می‌کند و اشتباهات فنی، هزینه‌های سنگین‌تری بر سازمان تحمیل می‌کند.\r\n\r\nشکست اعتماد: کارکنان جدید نیز به زودی می‌فهمند که اینجا جای رشد نیست و در اولین فرصت، همین سرنوشت برایشان تکرار خواهد شد.\r\n\r\nجمع‌بندی: این سازمان دیگر \"به‌دردِ\" یک نیروی متخصص نمی‌خورد\r\n\r\nاین سازمان با این رویه، نه تنها به سرمایه‌های انسانی خود خیانت کرد، بلکه آینده خودش را نابود کرد. نیروی متخصصی که امروز اخراج شود، فردا در شرکت رقیب، مشاور یا همکار خواهد شد و سازمان شما را در بازار شکست خواهد داد. این همان خودزنی مدیریتی است که مرگ تدریجی یک مجموعه را رقم می‌زند.\r\n\r\nمن با افتخار از این ده سال تجربه، اما با سرافکندگی از این یک سال آخر که شاهد بازی با زندگی آدم‌ها بودم، این سازمان را ترک می‌کنم. اینجا نه جای حرفه‌ای‌هاست و نه جای انسان‌های باوجدان."
