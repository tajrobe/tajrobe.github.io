description: "محیطی به‌شدت سمی، جولانگاه انتصابات فامیلی و فقدان امنیت روانی**\r\n\r\n«اگر در حال بررسی این مجموعه برای همکاری هستید، این نقد را که  \r\nبا توجه به  با حضور چند ماهه در این مجموعه و‌نظرات و‌صحبت های  افراد جدید و قدیم  نوشته شده را به عنوان هشداری جدی در نظر بگیرید»\r\nی \r\nشرکت به‌وضوح در بن‌بست مدیریت خانوادگی گرفتار شده و محیطی را ساخته است که در آن، جایگاه‌ها نه بر اساس تخصص، بلکه بر اساس نسبت‌ه\r\nا خانوادگی تقسیم شده است.\r\nمشکلات بنیادین این مجموعه که باید پیش از ورود بدانید عبارتند از:\r\n\r\n۱. **انتصابات فامیلی و ناکارآمدی مطلق:** مدیریت ارشد، تمامی پست‌های کلیدی را به بستگان خود سپرده است؛ افرادی که فاقد کمترین دانش یا تجربه تخصصی در حوزه‌های مربوطه هستند. به‌عنوان مثال، واگذاری مدیریت «پشتیبانی» به فردی که تنها مهارتش بی‌ادبی و وقت‌گذرانی است، یا سپردن «توسعه وب» به کسی که حتی الفبای برنامه‌نویسی را نمی‌داند، و همچنین گماشتن فردی بی‌تجربه در «منابع انسانی» که تنها هنر وی ایجاد حاشیه و مدیریت سلیقه‌ای است،واگذاری «مدیریت فناوری اطلاعات» به شخصی که هیچ تجربه ای در این حوزه ندارد و مهمترین ضربه به شرکت از این افراد می باشد،افراد بدون هیچ تجربه به عنوان کاردان یا کارشناس، مستقیم به پست مدیریتی انتصاب داده شده اند \r\nای متخصص و دلسوز زده است. دیدنِ اگویای وضعیت فاجعه‌بار مجموعه است.\r\n\r\n۲. **محیط کاری غیرایمن و آزاردهنده:** متأسفانه فضای حاکم، به‌ویژه از سوی نزدیکان مدیریت، به‌شدت غیرحرفه‌ای و مسموم است. رفتارهای نامتعارف و دخالت‌های لحظه‌ای در کار کارکنان، برخوردهای فیزیکی و کلامی ناپسند با پرسنل خانم و ایجاد جو ناامن، از ویژگی‌های روزمره این مجموعه است. سکوت یا حمایت از این رفتارها، عملاً محیط را برای کارِ با آرامشِ هر شخصی، غیرممکن کرده است.\r\n\r\n۳. **سلسله‌مراتبِ ویران:** مدیریت ارشد با دخالت مستقیم در امورِ تمامی واحدها و نادیده گرفتن مدیران گروه، باعث ایجاد بی‌نظمی ساختاری شده است. کارمند عملاً بین دستورات متناقضِ مدیریت ارشد و مدیرانِ بی‌تجربه (فامیلی) سرگردان است.\r\n\r\n۴. **تعدیل نیروهای متخصص و بی‌ثباتی معیشتی:** شرکت به بهانه شرایط اقتصادی و جنگ، دست به حذف نیرو\r\nهخراج ناعادلانه بهترین متخصصان فنی، تنها به دلیل عدم سرسپردگی به بازی‌های فامیلی، دردناک است. پرداخت حقوق‌ها نیز به صورت نامنظم و قطره‌چکانی انجام می‌شود؛ گویی مدیریت، کارکنان را نه شرکای حرفه‌ای، بلکه کارگران روزمزدی می‌داند که باید برای حق‌الزحمه‌شان منت بکشند.\r\n\r\n۵. **زیرساخت‌های فنی رو به زوال:** به دلیل جایگزینی متخصصان با افراد بی‌سواد، زیرساخت‌ها مملو از باگ و قطعی‌های مکرر است. جلسات بررسی مشکلات نیز نمایشی است و هدفش صرفاً پوشاندنِ سوءمدیریتِ افرادِ فامیل است، نه حل مشکلات فنی.\r\n\r\n**سخن آخر:**\r\nدر این مجموعه، «تخصص» هیچ ارزشی ندارد و تنها راهِ دوام، «زیرآب‌زنی» و همراهی با بازی‌های ناسالم این جماعت است. کسانی که دلسوزانه برای مجموعه زحمت کشیدند، با یک پیام اخراج شدند و به زندگی‌شان لطمه وارد شد.نظرات ثبت شده در این سایت واقعی می باشد \r\n\r\nتوصیه دوستانه به تمام جویندگان کار این است: با ورود به این مجموعه، به شخصیت حرفه‌ای و آرامش روانی خود توهین نکنید. عمر خود را در جایی که مدیریتِ مهدکودک‌گونه‌اش جز تیشه زدن به ریشه مجموعه کاری نمی‌کند، هدر ندهید. این شرکت به معنای واقعی کلمه، «بن‌بستِ پیشرفت» است.»\r\nلازم بذکر‌است نظرات تکراری مثبت که در این سایت می باشد توسط فرد بی تجربه در منابع انسانی درج شده \r\nکه حتی در این امر نیز توانایی نداشته امد "
