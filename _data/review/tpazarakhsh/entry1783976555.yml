description: "با سلام به همه دوستان،\r\n\r\nبه‌شدت توصیه می‌کنم حتی اگر بی‌کار هم ماندید، وارد این شرکت نشید. این حرف را بعد از چند ماه کار در آنجا و با اطمینان کامل میگم.\r\n\r\nمدیریت این شرکت در حد یک مهدکودک است.\r\n\r\nمنابع انسانی: دختر مدیرعامل! یک ادم بیسواد که موقع مصاحبه بسیار حرف های شیرین میزنه ولی وارد که میشید تازه میفهمید چه کلاه گنده ای سرتان رفته و فقط یک جمله داره تو هر شرایطی میگه (شرایط جامعه، جنگه، مشتریا پول نمیدن)\r\n\r\nمدیریت فنی (IT): پسر مدیرعامل که با دختران شرکت لاس میزنه هرکی بیش تر پا بده بیشتر لاس میزنه باهاش و هواشو داره و شوخی های جنسی و....\r\n\r\nمدیر مالی: داماد و دختر مدیرعامل.\r\n\r\nمدیر پشتیبانی، روسای گروه‌ها و مدیر برنامه‌نویسان: برادر مدیرعامل و چند نفر دیگر از فامیل‌های نزدیک که همگی افراد بی‌ادب و فحاش و پرخاشگر هستن که کل هنرشون داد زدن و مسخره کردن کارمندان هست ولی خودشان هیچ هنر خاصی ندارن.\r\n\r\nحقوق را قبلاً هر ۴۵–۵۰ روز می‌دادند، الان شده هر ۲ ماه یکبار، آن هم با بهانه‌های واهی مثل جنگ و مشکلات بانکی به گفته (منابع انسانی که مشخصا دختر مدیر عامل). تا وقتی پول ندهند، با حرف‌های قشنگ کارشان را پیش می‌برند، اما وقتی بالاخره حقوق را میده، آنقدر اذیتتان می‌کنند که پشیمان شوید.\r\n\r\nمدیرعامل آدمی دروغ‌گو  هست؛ هم به مشتریان دروغ میگه ، هم به کارمندای خودش. در این شرکت فقط کافی است صبح بروید جلوی دفتر مدیریت و پشت سر دیگران حرف بزنید تا تبدیل به کارمند نمونه شید حتی در مواردی مدیر به همراه جذب نیرو برای اون فرد یا جایگزین کردن یکی از مدیرایی دیگه که کمتر تونسته زیراب بزنه\r\n\r\nتوجه ویژه به دختران: حتماً مراقب خودتان باشید، چون افراد بیمار (به‌ویژه پسر مدیریت) در این شرکت زیاد هستند.\r\n\r\nجالب اینجاست که برای استخر، گل و گیاه  پول هست، اما برای حقوق کارمندان نه! حقوق را هم یکجا نمی‌دهند، بلکه به صورت اقساط ۱۰ میلیونی پرداخت می‌کنند. بیمه بسیاری از کارمندان قطع در این ماه قطع شده و حتی بعد از 50روز حقوق نگرفتن.\r\n\r\nهر اعتراضی هم بکنی، می‌گویند: «خوش آمدید!» درست مثل کارمندای قبلی که ناگهان ساعت ۱۲ شب لیست اخراجی‌ها را می‌فرستادند و میگن  فردا نیایید.\r\n\r\nخلاصه اینکه اینجا جز روح و روان خسته و قسط‌های عقب‌افتاده چیزی عایدتان نمیشه. اگر برای سلامت روان‌تان ارزش قائل هستید، هرگز وارد این مهدکودک با مدیران بیمار و اسکیزوفرنیک نشید؛ مدیرانی که نه با سواد و شایستگی، بلکه با رانت فامیلی و چاپلوسی به این جایگاه رسیده‌اند.\r\n\r\nما از این خرابه خلاص شدیم، امیدوارم شما هم زودتر نجات پیدا کنید."
