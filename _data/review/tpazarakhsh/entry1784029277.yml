description: "من حدود 10 12 سال پیش تو این شرکت کار میکردم با خوندن نظرات بعضی از نظرات از همون سال ها تو شرکت مونده ولی اون زمان یک سری مدیر گروه هایی بودن که طرف کارمندا بودن مثل علی بالنده بابک حاتمی که این دوتاروهم بدون اینکه احترامی بهشون گذاشته بشه رفتن البته یادمه زمانی که بالنده از شرکت رفت کسایی که باهاش کار میکردن هم همگی با هم رفتن دو سه تا برنامه نویس خوبم داشت مثل اسکندری و خلاصه شعار و ویانی البته یه مدیر داشتن روانی بود نچسب عالم. ولی اون زمان خانوم زیاد تو شرکت نبود فقط اقا استخدام میکردن اون زمانم مشکل حقوق بود و میبینم همچنانم هست پسرش از همون قبل که تو شرکت فیلم خاکبرسری نگاه میکرد و جابجا میکرد تا الانم انگار ادامه داده اون زمان مدیریت اینجوری نبود یه اتاق بود طبقه اول درش باز بود تا کسی میومد مدیر عامل داد میزد کررررریییییییمییییییییییی بگو فلانی بیاد بعد میرفتی تو اتاق یه صندلی بود پاره که روش یه فرش بود چارزانو میشست بعد مجبور بودی مدیرعامل نگاه کنی یا دستش تو دماغش بود یا میکرد زیر بغلش در میورد بو میکرد اون زمان که دعوا میشد به طرف هم مانیتور و کیبورد پرت میکردن تو تمام اتاقا دوربین کار گذاشته بودن مدیر عاملش اینقدر بیکار بود 24 مانیتور نگاه میکرد مبادا کسی یه لحظه کار نکنه تو واحد مالیش و قرارداداش  یکی بود تو واحد معروف بود به لینچان آذرخش دوتا برادراشم که انگار سمت گرفتن با تعریفی که بقیه کردن یکیشون کاپشن زرد که کثافت میبارید ازش تنش میکرد یکیشم کاپشن قرمز مثل پت و مت  حتی اون زمانم از بچه های شرکت دزدی میشد میرفتن میگفتن دوربین و چک کن کی بود به دروغ میگفتن دوربین ذخیره نمیکنه و اگر که این شرکت با اون مدیریت به جایی رسیده مدیون کارمندای قبلی که الان بعیده حتی مدیر عامشلم نام اون کارمندا یادش مونده باشه و همینم که حالا هست مدیون کسایی مثل بالنده و حاتمیه و..."
