description: "امیدوارم تجربه کاریم براتون کارآمد باشه\r\n\r\nاگر هنوز وارد این شرکت نشدید و این سایت و می بینید باید بهتون بگم فقط در صورتی براتون خوبه که یا منبع درآمد دیگه ای داشته باشید یا از جای دیگری ساپورت مالی بشیدو یا اینکه بی تجربه باشید بیاید اینجا سابقه کاری جمع کنید و در غیر این صورت یه باخت بزرگ محسوب میشه براتون\r\n\r\nحقوق تازگیا رسیده به هر 2 ماه یه بار اونم نه بطور کامل بلکه بصورت خورد خورد یه جوری پرداخت میشه که نفهمید حقوقتون چه شکلی شده بیمه هم که قطع شده\r\n\r\nمحیط غیر حرفه ای و غیر اصولی\r\n\r\nتوانایی پرداخت حقوقم ندارن ولی هر روز اگهی استخدام میدن برای نیرو نمیدونم با کدوم پول میخوان حقوق نیرو جدید بدن\r\n\r\nهیچ مزایایی ندارند حتی نیاز اولیه کارگر مثل حقوق و بیمه هم بزور پرداخت میشه \r\n\r\nاز همه مهم تر مدیرعامل یجوری تو فضا سیر میکنه که از یه ادم عادی بعیده دقیقا مثل مهد کودکه\r\n\r\nبه جای نگهداشت نیرو فقط به فکر پز و دیزاین شرکته جدیدشونن\r\n\r\nبه جای خرج ادا اطفار نمیاد حق و حقوق مردم و بده آه و نفرین مردمو از گردن خودش باز کنه\r\n\r\n\r\n\r\nدر کل یه خوبی داره فقط اونم اینکه برید شرکت دیگه ای کار کنید قدر اونجارو می دونید و متوجه نکات مثبتش میشید\r\n\r\nچون هیچ شرکتی رو نداریم که همه ی نکات منفی رو باهم داشته باشه به جز اینجا\r\n\r\nجایی که    یه کولر درستم ندارن تو این گرما ادم سگپز نشه\r\n\r\nولی محیط دوستانه ست و با حاشیه ی پرسنل حسابی سرتون گرم میشه\r\n\r\nاصلا خیلیا بخاطر همین حواشی موندگار شدند\r\n\r\nشما که پول ندارید چرا نیرو میگیرید؟ گند زدین تو زندگی کلی ادم ها\r\n\r\nدین اون همه ادم که کار میکنه رو گردن تک تکتونه از رییس شرکت گرفته تا مدیر مالی مدیر پشتیبانی مدیر منابع انسانی که بیشتر شبیه منابع حیوانی میمونه\r\nتک تک قسطایی که عقب میفته پول جریمش گردنتونه\r\nتک تک کسایی که مریض میشن میرن بیمارستان بیمشون قطع شده پولشو ازاد میدن گردنتونه\r\nکسی که مریضه حتی پول یه دونه قرصم نداره بده اه و نفرینش گردنتونه\r\nتک تک کسایی که میرن خونه با این حقوق دادنتون شرمنده زن و بچشون میشن اه و نفرین خانواده ها گردنتونه\r\n\r\nمن موندم چه شکلی جواب این همه ادمو اون دنیا میخوایید بدید رییس شرکتی که اعتقاد داری میری کربلا همون امام حسین بزنه به کمرت\r\n\r\nخانم محترم منابع انسانی مگه شما موقع استخدام نگفتی شرکت وام میده شرکت حقوقش حداکثر تا هفده هر ماه از موقعی که من استخدام شدم شما یکبارم نشده هفدهم که هیچی 30 حقوق بدی شما که عرضه نداشتی حقوق بدی برای چی استخدام میکنید برای چی مردومو بدبخت میکنی برای چی دروغ میگید\r\n\r\nبرای چی هر روز اگهی استخدام میزنید ولی عرضه حقوق دادن ندارید شما نمیخواد استخدام کنی برو اول حقوق کارمنداتو بده بعد استخدام کن که مردومو بدبخت نکنی همینجوری اه و نفرین همه کارمندا برای عاقبت خودتون خریدید دیگه نکنید یکم خجالت  بکشید یکم شرم کنید\r\nفقط بلدید اُرد ناشتا بدید\r\nبی عرضه ها"
