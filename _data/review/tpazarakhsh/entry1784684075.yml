description: "من نظرات و خوندم\r\nلامصبا بزارید منم بگم \r\nبه نظرم یکم بی انصافی نوشته \r\nشما همه چیز و انداختین گردن مدیر \r\nمن هنوز تو این شرکت مشغولم \r\nآخر پیام میگم  اسمم چیه 😉\r\n\r\nچنتا مورد میگم بعد یک تذکر \r\n\r\nآقای شیبانی مدیر  ، آدمیه که نمیدونه داره چیکار می‌کنه \r\nدرکی از کار نداره چون نمیتونه بفهمه کار چطور انجام میشه میاد و کار و وارد رفاقت می‌کنه \r\nاون نمیتونه درک کنه که مدیر هاش هم اینو میفهمن و بهش دروغ میگن و سواستفاده میکنن \r\n\r\nیه دوری بزنیم تو  آذر ، خش \r\nسرپرست مدیر های میانی که سعید شلم نام داره چون همیشه خوابه و همیشه با پشتیبان ها دعوا می‌کنه دمبل میزنه راکی تنظیم بازار \r\nاگه تونستی ۳ دقیقه و ۲۶ ثانیه باهاش حرف بزنی و داد نزنه جایزه داری اضافه کاری هم تایید نمیکنه هرگز می‌خوام براش وی بخرم شاید باهم دوست شدیم 😅\r\n\r\n\r\nسرپرست برنامه نویس هاش که برادرشه امیر دودو ، چشم ناپاک داره دیگه خودتون تا تهش و برید \r\nتیک و تاک میزنه با دخترا و زنا خانم سمیرا می‌تونه شهادت بده آخه لامصب چی دیدی تو خودت با این قیافه و هیکلت 😂 \r\n\r\nپسرش مدیر ای تی (مهدی عاقا خیلی خوب بود 😂)  اگه باهاش دوست نباشی و حتی فکر کنه دوستش نیستی می‌ره تمام اطلاعات سیستمت و پاک می‌کنه بعد که کارت انجام نمیشه میری پیش مدیر،  جالب میشه ، وقتی به مدیر بگی مدیر هیچی نمیگه باز زیر آبی می‌ره ، شیرین عقل واقعی و مدیر میگه تقصیر خودته حتما که اطلاعاتت پاک شده ( یا مسیح مقدس 😂)\r\nتنبیه برای کارمندان و تشویق برای خودشون فقط 😂 ، بعد می‌ره ک .ربلا آخه یکبار از خودت سوال کن من عدالت دارم ؟ \r\nمدیر برنامه نویسی حسین دراز ، رفته مصاحبه که تو دو دقیقه اول مصاحبه بهش گفتن پاشو برو بیرون، مصاحبه بانک کشاورزی رد شده چند وقت پیش فقط تو دو دقیقه اول ، این آدم رکورد زده تو سرعت رد شدن مصاحبه بهتره مدیر ازش بپرسه چرا رفتی مصاحبه ؟  تو که حقوقت سر وقته ،  ریز ریز بهت میماسه چرا داری در میری 😁بعد تو این شرکت شده مدیر ، آدم دراز آخه عقل داره مگه \r\n\r\nحالا ببین باقی مدیر ها هم همین هستن ولی واقعا ارزش حرف زدن ندارن وقت هدر نمی‌دم \r\n\r\nمن میبینم نظرات و خود مدیر میخونه و ناراحت میشه گل من طاقت بیار 😉\r\n\r\nمن بهت توهین نمیکنم آقای شیبانی من میبینم قدم هاتو تو مسیر مسجد ساعت ۱۲، میدونم عشق کربلا و مکه هستی و این کارا \r\n\r\nاما بدون اگه اصلاح نشی در هم کوبیده میشی \r\n\r\nک رب . لا و م ک ه تو بچه های مردم هستن که حقوقشون و نمی‌دی \r\nمیری حقوق سرپرست ها رو میدی بچه های مردم قسط دارن مستاجر هستن  آخه انصافه من برم اسنپ بعد ماموریت \r\n\r\nبچه های خدمات که مثل سگ کار میکنن دو نفرن ۴ طبقه آخه انصافه\r\nهمیشه خسته هستن \r\nدلم میسوزه براشون \r\n\r\n\r\n\r\nخودت تغییر کن یا استعفا بده \r\n\r\nشجاعت داشته باش و بپذیر \r\n\r\nاز رگ گردن بهت نزدیک تریم \r\n\r\nاعمالت و میبینیم \r\n\r\nتو کل شرکت ۲۰ نفر کار میکنن بقیه فقط هستن \r\nبستنی های مگنومی که با آب چاه درست شدن\r\nانسان های بی ریشه و بی ارزش و پست و  پاچه خوار \r\n\r\nرفتی ۷۰۰ میلیون پول گل و گیاه دادی حقوق مردم و ندادی \r\n\r\nاین ن.م.ا.ز.. چیه این حق و ناحق کردن چیه \r\n\r\n\r\n\r\nاگه میخوای بیا تو این شرکت لطفا اول مطمئن شو سر شدی بی حسی شلی بعد بیا چون آدم عاقل تو این شرکت میپوکه \r\n\r\n\r\n\r\nستاد آدم سازی ( بخندید زحمت کشا ) 😁\r\n\r\nاز سایت تجربه کاری بسیار ممنونم"
