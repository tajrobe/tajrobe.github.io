description: "ابتدا عرض کنم که شرکت والکس در واقع هلدینگ هستش و چندین بیزینس لاین جداگانه رو شامل می‌شه.از همین رو دقت بفرمایید که مدیریت و شرایط هر یک هم متفاوتن و موارد مشاهده شده محدود به تیم و مدیر شخص بنده هست و الزاما قابل تعمیم به تمامی پوزیشن‌های شرکت نیست. \r\nضمن تشکر از خواننده بابت توجه به این نکته،‌ ابتدا نکات قابل بهبود مجموعه رو ذکر می‌کنم و با ذکر نکات قوتش نظرم رو تمام می‌کنم.\r\nدر توصیف سازمان می‌شه گفت به طور کلی در حال یادگیری هستش و هنوز بالغ نشده و از همین جهت مشکلات قابل توجهی داره.به‌عنوان مثال انتخاب مدیران بر اساس صرف توانایی یا تجربه‌شون نیست، لدر و ارزیابی عملکرد و فرایندهای دقیق وجود نداره، سازمان اینتگریت و شفاف نیست، اطلاع‌رسانی‌های عمومی به نحو درست انجام نمی‌شن، و بازگویی صفات منفی فرد و یا توهین غیرمستقیم حین عدم حضورش امر رایجیه.\r\nاستراتژی‌های سازمان دقیق چیده نمی‌شن و در نتیجه ممکنه در یک ماه تعداد زیادی جذب داشته باشن و ماه بعد همگی رو تعدیل کنن(دقت بفرمایید که عدم امنیت شغلی واقعا مساله جدی‌ای در این سازمان هست و در صورتی که براتون مهمه پیشنهاد می‌کنم در جای دیگری اشتغال بفرمایین)، ساختمان محل خدمت تغییر کنه،‌ فردی به مدیریت فنی منصوب بشه در حالی که دانش فنی لازم رو دارا نیست، مدیری عدم توجه خودش برای بازرسی کار رو با سرزنش باقی تیم جبران کنه و یا سعی کنه با ارتباطات خودش ضعف تصمیم‌گیری، مدیریتی یا فنی رو پنهان کنه و مواردی از این دست.\r\nهمچنین تمام حقوق پکیج یکجا پرداخت نمیشه و بخشیش در هر ماه در بازه‌ی دیرتری پرداخت می‌شه.(فرایند تسویه هم بسیار کند انجام می‌شه و ممکنه باقی‌مانده رو در چند قسط پرداخت کنن و چندین ماه طول بکشه و نیاز به پیگیری مدام از سمت شما هم داره. البته عموما فرایندهای اچ‌اری هماهنگی ضعیفی در اینجا دارن.)\r\nساختمان میرزای شیرازی که محل استقرار والکس در زمان نگارش این پیامه، اپارتمانی ۵ طبقه، کمی دلگیر و غیربهینه برای محیط سازمانیه که در اغلب طبقاتش دود سیگار در هوا پخشه.ساختمان دارای پارکینگ برای کارکنان نیست(صرفا مدیران ارشد و رده‌بالا دارای پارکینگ هستن)و در محل پرترافیکی قرار داره اما دسترسی مناسبی به مترو و بی‌ارتی و خطوط اتوبوس داره. همچنین پس از خاموشی هوا تردد پیاده در این محل کمی ناامن به‌نظر می‌رسه ضمن اینکه درب اصلی شرکت پس از ساعت کاری اداری بسته می‌شه و در صورتی که بخواهید منتظر اسنپ بمونین می‌بایست در کنار خیابان صبر بفرمایید. (دورکاری هم در شرکت پذیرفته نیست.) موارد جزئی‌تری مثل اتاق استراحت، داروهای رایج، ناهار و میان‌وعده هم وجود ندارن البته هزینه اندکی برای کمک‌هزینه ناهار پرداخت می‌شه و در ساعات ابتدایی روز صبحانه به تعداد محدود هم برقراره. \r\nبنده مدت زیادی با مجموعه همکاری نداشتم و بنابراین نظر محکمی درباره‌ی رشد و یا افزایش حقوق نمی‌تونم بدم، اما فکرمی‌کنم این موارد بر اساس توانایی فرد پیش نمی‌رن. همینطور در صورتی که فکر می‌کنید نیاز به حضور روزانه در کنار افرادی با اشتیاق زیادی برای کارشون، بهبود فرایندها و درگیری کامل با بیزینس دارید، فکر می‌کنم این شرکت بهترین سازمانی که می‌تونید انتخاب کنید نباشه و در کل دیدگاه غالب در شرکت به اعضا، نزدیک به مدل سنتی یک کارمند هست. \r\nاز نکات مثبت مجموعه می‌شه به این اشاره داشت که ورود و خروج کارکنان ثبت نمی‌شه و ساعت کاری شناوره، تجهیزات و امکانات مورد نیاز کار به‌خوبی در اختیارشون قرار می‌گیره و محصولی که در حال توسعه‌ش هستند هم شایسته تقدیره، حقوق رایج بازار پرداخت می‌شه، بیمه کامل و سر موعد پرداخت می‌شه و بیمه‌ی تکمیلی مناسبی هم برای کارکنان در نظر گرفته می‌شه. \r\nخوبه دقت بشه که مجموعه در حال رشد و بهبوده و در صورت پیاده‌سازی پاره‌ای از اصلاحات مثل تخصیص صحیح مدیران، تلاش برای افزایش راندمان کارکنان، نظارت دقیق‌ و جزئی‌ و شفاف‌تر بر افراد و تصمیم‌ها به شرکت بهتری تبدیل می‌شه."
