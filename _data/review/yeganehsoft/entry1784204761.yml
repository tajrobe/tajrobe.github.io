description: "خودتون برید توی سایتشون ببینید، این شرکت به چند شاخه کاری یه سرکی کشیده و تو هیچ کدومم متمرکز و موفق نیست. از گرفتن پروژه اسکن مدارک، تا فروش تجهیزات اداری. و در کنارش با خودشون گفتن چهار تا برنامه نویس میگیریم یه نرم افزاری هم برامون بنویسن! و چون درآمد اصلیشون از نرم افزار نیست بی هیچ دلیلی قبلا چند بار تیم فنی رو به یک باری تعطیل و همه رو بیکار کردند. \r\nدر پرداخت حقوق مشکل دارند و مدام به تعویق میندازن. خود مالی قبلا گفته پول نداریم اگه لازم دارید یه مبلغ کمی مساعده بنویسید اگه داشتیم میدیم !\r\nهیچ گونه شفافیت در محاسبات حقوق وجود نداره. فیش حقوقی جزو افسانه هاست. کاملا ناگهانی میبینی همون حقوقی که با تاخیر فراوان دادند از مبلغ درستش کمتره، و وقتی از مالی شرکت بپرسی خب چجوری حساب کردی که به این عدد رسیدی شدیدا بهشون بر میخوره و حتی وقتی ثابت میشه اشتباه کردن همچنان به برخورد توهین آمیزشون ادامه میدن.\r\nبستن قرارداد با نیروی جدید و نیروهای قدیمی رو در ابتدای هر سال ماه ها طول میدن که اگه نظرشون عوض شد یک دفعه بگن از فردا نیا! وقتی هم در مورد قرارداد ازشون سوال کنی نمیگن نمیبندیم، استراتژیشون اینه که بگن فعلا این هفته درگیر فلان مشکل اداری هستیم یه ده روز صبر کنید، بعد میگن حالا تا آخر ماهم صبر کنید، حالا فلانی سر شلوغه نمیرسه پرینت بگیره ده روز دیگه هم صبر کنید و ... تا همینجوری شیش ماه طولش بدن"
