<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>
      {% if page.title %}{{ site.name }} در {{ page.title }}{% else %}{{
      site.name }}{% endif %}
    </title>
    {%- include meta.html -%}
    <link rel="icon" href="{{ site.baseurl }}/images/favicon.png" />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ site.baseurl }}/assets/style.css"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.name }}"
      href="{{ site.baseurl }}/feed.xml"
    />
    {%- seo -%}
  </head>

  <body class="site" style="font-family: 'Vazirmatn', sans-serif">
    <header
      class="flex items-center justify-between px-6 py-4 w-full mx-auto"
    >
     <div class="max-w-7xl mx-auto w-full flex flex-col md:flex-row items-center justify-between gap-4">
		<a href="/" class="flex items-center gap-2">
			<img
			  src="/assets/apple-touch-icon.png"
			  alt="Logo"
			  class="hero__logo"
			  style="height: 50px"
			/>
			<h1 class="text-lg font-bold">تجربه‌های کاری</h1>
		  </a>
		  <nav class="flex md:gap-6 sm:gap-1 text-sm items-center">
        <a href="/donate" class="hover:text-[#F04923]">حمایت از پروژه</a>
			  <a href="/browser-extension" class="hover:text-[#F04923]">افزونه کروم</a>
			  <a href="/about" class="hover:text-[#F04923]">درباره ما</a>
		  </nav>
	 </div>
    </header>
    {{ content }}
    <footer class="footer">
      <div class="container">

            target="_blank"
